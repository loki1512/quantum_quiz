<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adv VQE Part 1 — Quantum Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050a12; --surface:#0a1525; --border:#1a3050;
    --accent:#fb7185; --accent-dim:#e11d48; --gold:#f0c040;
    --green:#39e07a; --red:#ff5566;
    --text:#c8dff0; --text-dim:#6a8aaa; --text-bright:#e8f4ff;
    --mono:'Space Mono',monospace; --serif:'Crimson Pro',Georgia,serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:18px;line-height:1.7;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}

  .bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(251,113,133,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(251,113,133,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
  .bg-glow{position:fixed;z-index:0;pointer-events:none;border-radius:50%;filter:blur(130px)}
  .bg-glow-1{width:700px;height:700px;background:radial-gradient(circle,rgba(180,30,60,.13),transparent 70%);top:-250px;left:-250px}
  .bg-glow-2{width:500px;height:500px;background:radial-gradient(circle,rgba(251,113,133,.07),transparent 70%);bottom:0;right:-150px;animation:bgPulse 9s ease-in-out infinite alternate}
  @keyframes bgPulse{from{opacity:.5}to{opacity:1}}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,10,18,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:11px 28px;display:flex;align-items:center;gap:16px}
  .home-btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:2px;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .home-btn:hover{color:var(--accent);border-color:rgba(251,113,133,.4)}
  .bar-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;min-width:110px}
  .progress-track{flex:1;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(251,113,133,.5)}
  .score-tag{font-family:var(--mono);font-size:10px;color:var(--gold);white-space:nowrap;min-width:55px;text-align:right}

  .stage{position:relative;z-index:1;width:100%;max-width:660px;padding:110px 24px 60px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:36px 36px 28px;animation:cardIn .32s cubic-bezier(.4,0,.2,1)}
  @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .card.out{animation:cardOut .22s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes cardOut{to{opacity:0;transform:translateY(-14px)}}

  .card-header{display:flex;align-items:center;gap:10px;margin-bottom:22px}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .card-kind{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase}
  .card-num{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-left:auto}

  .preview-dot{background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .preview-kind{color:var(--accent)}
  .section-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);opacity:.6;margin-bottom:10px}
  .preview-body{font-family:var(--serif);font-size:1.08rem;font-style:italic;color:var(--text);line-height:1.75;margin-bottom:28px}

  .question-dot{background:var(--gold);box-shadow:0 0 8px var(--gold)}
  .question-kind{color:var(--gold)}
  .question-body{font-family:var(--serif);font-size:1.1rem;color:var(--text-bright);line-height:1.65;margin-bottom:22px}

  .options{display:flex;flex-direction:column;gap:9px;margin-bottom:6px}
  .option{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;color:var(--text);font-family:var(--serif);font-size:.97rem;text-align:left;line-height:1.5;width:100%;transition:border-color .14s,background .14s,color .14s}
  .option:hover:not(:disabled){border-color:rgba(251,113,133,.5);background:rgba(251,113,133,.05);color:var(--text-bright)}
  .option:disabled{cursor:default}
  .opt-letter{font-family:var(--mono);font-size:10px;color:var(--text-dim);border:1px solid var(--border);border-radius:2px;padding:2px 7px;flex-shrink:0;margin-top:2px;transition:all .14s}
  .option:hover:not(:disabled) .opt-letter{border-color:var(--accent);color:var(--accent)}
  .option.opt-correct{border-color:var(--green);background:rgba(57,224,122,.09);color:var(--text-bright)}
  .option.opt-correct .opt-letter{border-color:var(--green);color:var(--green);background:rgba(57,224,122,.15)}
  .option.opt-wrong{border-color:var(--red);background:rgba(255,85,102,.09);color:var(--text-bright)}
  .option.opt-wrong .opt-letter{border-color:var(--red);color:var(--red);background:rgba(255,85,102,.15)}
  .option.opt-reveal{border-color:rgba(57,224,122,.4);background:rgba(57,224,122,.04)}
  .option.opt-reveal .opt-letter{border-color:var(--green);color:var(--green)}

  .result-dot-correct{background:var(--green);box-shadow:0 0 8px var(--green)}
  .result-dot-wrong{background:var(--red);box-shadow:0 0 8px var(--red)}
  .result-kind-correct{color:var(--green)}
  .result-kind-wrong{color:var(--red)}
  .chosen-row{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:4px;border:1px solid;margin-bottom:12px;font-family:var(--serif);font-size:.97rem;line-height:1.5}
  .chosen-row.correct{border-color:var(--green);background:rgba(57,224,122,.08);color:var(--text-bright)}
  .chosen-row.wrong{border-color:var(--red);background:rgba(255,85,102,.08);color:var(--text-bright)}
  .chosen-row.reveal{border-color:rgba(57,224,122,.4);background:rgba(57,224,122,.05);color:var(--text-bright)}
  .row-icon{flex-shrink:0;font-size:.95rem;margin-top:1px}
  .exp-wrap{margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
  .exp-label{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .exp-label::before{content:'◈'}
  .exp-text{font-size:.93rem;color:var(--text);font-style:italic;line-height:1.65}

  .btn-row{display:flex;justify-content:flex-end;margin-top:26px}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:11px 24px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:8px}
  .btn:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px rgba(251,113,133,.35)}
  .btn .arr{transition:transform .18s}
  .btn:hover .arr{transform:translateX(4px)}

  .intro{text-align:center;animation:cardIn .35s ease}
  .intro-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px}
  .intro-tag::before,.intro-tag::after{content:'';display:block;width:28px;height:1px;background:var(--accent)}
  .intro h1{font-family:var(--serif);font-weight:300;font-size:clamp(1.9rem,5vw,3rem);color:var(--text-bright);line-height:1.2;margin-bottom:14px;letter-spacing:-.01em}
  .intro h1 em{color:var(--accent);font-style:normal;font-weight:600}
  .intro p{font-size:.9rem;color:var(--text-dim);font-family:var(--mono);margin-bottom:36px;line-height:1.7;max-width:420px;margin-left:auto;margin-right:auto}

  .summary{text-align:center;animation:cardIn .4s ease}
  .sum-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
  .sum-score{font-family:var(--serif);font-weight:300;font-size:clamp(3.5rem,12vw,5.5rem);color:var(--text-bright);line-height:1;margin-bottom:6px}
  .sum-score span{color:var(--accent)}
  .sum-pct{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:28px}
  .sum-msg{font-size:1.03rem;font-style:italic;color:var(--text);line-height:1.7;max-width:440px;margin:0 auto 36px}
  .sum-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn-reset{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 28px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer;transition:all .2s}
  .btn-reset:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px rgba(251,113,133,.35)}
  .btn-home{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 28px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:3px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .btn-home:hover{border-color:var(--text-dim);color:var(--text)}
</style>
</head>

<script>
const L=['A','B','C','D'];
const data=[
  /* ── Part 1: Qubits & Superposition ── */
  {s:"Part 1 · Qubits & Superposition",p:"We initiate our study by contrasting classical computing with quantum computing. In classical computing, the fundamental unit of information is binary and mutually exclusive.",q:"What is the defining characteristic of a quantum bit (qubit) prior to measurement?",o:["It rapidly oscillates back and forth between 0 and 1.","It genuinely exists in both the zero and one states simultaneously.","It functions as a classical bit but bypasses the CPU for faster processing.","It stores information exclusively as continuous waves of energy."],a:1,e:"Unlike a classical bit which is strictly either zero or one, a qubit fundamentally exists in both states at once until it is measured."},
  {s:"Part 1 · Qubits & Superposition",p:"Building on the concept of existing in multiple states simultaneously, we must represent this mathematically.",q:"How is the mathematical state (ψ) of a qubit in superposition defined?",o:["As a sequential addition of multiple classical bits.","As a superposition of the zero state and the one state, modified by coefficients α and β.","As a logarithmic scale of state zero.","As an absolute value of state one."],a:1,e:"Mathematically, the qubit state ψ is defined as a superposition of the zero state and the one state, with specific coefficients (α and β) attached to each."},
  {s:"Part 1 · Qubits & Superposition",p:"The coefficients α and β in our superposition state are not arbitrary numbers; they are strictly governed by the orthogonality principle of quantum states.",q:"What mathematical rule must the coefficients α and β satisfy?",o:["α + β = 1","α × β = 1","The sum of the squares of these coefficients (α² + β²) must equal 1.","The square root of their sum must equal 0."],a:2,e:"The orthogonality principle dictates that the sum of the squares of these coefficients must equal one, representing a total probability of 100%."},
  {s:"Part 1 · Qubits & Superposition",p:"Now that we know α² + β² = 1, we must understand what these squared values physically represent in our experiments.",q:"If we have a quantum state ψ, what does the value α² directly correspond to?",o:["The physical mass of the qubit.","The exact probability of measuring the state ψ in the zero state.","The speed at which the quantum gate operates.","The thermal decoherence rate."],a:1,e:"The value α² represents the probability of finding the measured state ψ as a zero, while β² is the probability of measuring it as a one."},
  {s:"Part 1 · Qubits & Superposition",p:"While a qubit can hold vast superpositions, a fundamental physical limitation occurs the moment we attempt to observe or read it.",q:"What happens to the qubit's superposition the moment a measurement is taken?",o:["The superposition doubles in capacity.","The measurement destroys the superposition, forcing the qubit to collapse entirely into either a zero or a one.","The qubit permanently splits into two separate bits.","The superposition becomes temporarily invisible but resumes after reading."],a:1,e:"Measurement forces a qubit to collapse to either state zero or state one, permanently destroying the superposition behavior."},
  {s:"Part 1 · Qubits & Superposition",p:"Because qubits can exist in superposition rather than single binary states, a system of multiple qubits scales information differently than classical bits.",q:"How does the amount of information carried by n qubits scale compared to classical bits?",o:["Linearly (2n).","Quadratically (n²).","Exponentially, carrying 2ⁿ amplitudes simultaneously.","Logarithmically (log₂(n))."],a:2,e:"A system of n qubits carries exponentially more information, capable of holding 2ⁿ number of amplitudes at the same time."},

  /* ── Part 2: The Bloch Sphere ── */
  {s:"Part 2 · The Bloch Sphere",p:"To intuitively visualize the state of a single qubit, physicists and engineers use a three-dimensional spherical coordinate system.",q:"What is the name of the intuitive visualization tool used to map the state of a single qubit?",o:["The Hilbert Plane","The Dirac Sphere","The Bloch Sphere","The Quantum Torus"],a:2,e:"The Bloch sphere is a highly important intuitive visualization tool used to represent the quantum operations and state of a single qubit."},
  {s:"Part 2 · The Bloch Sphere",p:"When looking at the Bloch sphere, the absolute top and absolute bottom of the sphere correspond to our classical binary equivalents.",q:"What do the North Pole and South Pole of the Bloch sphere represent, respectively?",o:["The plus state and minus state.","State zero and state one.","Entangled state and disentangled state.","Alpha and Beta."],a:1,e:"On the Bloch sphere, the north pole points to state zero, and the south pole points to state one."},
  {s:"Part 2 · The Bloch Sphere",p:"A single qubit state can be plotted as a point anywhere on the surface of the Bloch sphere. We define this point using two specific coordinate angles.",q:"What are the two spherical coordinate angles used to define the exact position of the state ψ on the Bloch sphere?",o:["Alpha and Beta","X and Y","Theta (θ) and Phi (φ)","Omega (ω) and Gamma (γ)"],a:2,e:"The parameters theta (θ) and phi (φ) dictate the qubit's degree of freedom and define exactly where the state ψ resides on the sphere."},
  {s:"Part 2 · The Bloch Sphere",p:"Moving away from the poles, we can position our state directly on the 'equator' of the Bloch sphere.",q:"If a qubit state is located exactly on the equator of the Bloch sphere, what does this imply about its measurement probabilities?",o:["It will definitely be measured as zero.","It has collapsed and cannot be measured.","It has exactly a 50% probability of being zero and a 50% probability of being one.","It is an invalid state that requires quantum error correction."],a:2,e:"A state on the equator sits exactly halfway between the poles, meaning it consists of exactly 50% of state zero and 50% of state one."},

  /* ── Part 3: Quantum Gates ── */
  {s:"Part 3 · Quantum Gates",p:"To manipulate a qubit's state and move it around the Bloch sphere, we must apply operators analogous to classical logic gates.",q:"What is the primary mathematical function of a quantum gate applied to a single qubit?",o:["It duplicates the qubit.","It acts as a rotation matrix that rotates a vector along the Bloch sphere.","It permanently collapses the qubit into a classical bit.","It measures the θ angle."],a:1,e:"Quantum gates function as rotation matrices that take the vector representing the state and rotate it around the Bloch sphere."},
  {s:"Part 3 · Quantum Gates",p:"While classical logic gates frequently destroy information, quantum gates obey a strict physical rule.",q:"What is the biggest fundamental difference between classical gates and quantum gates?",o:["Quantum gates can only process state one.","Quantum gates are completely reversible operations.","Quantum gates require zero energy to function.","Classical gates rotate vectors faster than quantum gates."],a:1,e:"The biggest difference is that quantum operations are entirely reversible, allowing you to always reverse the rotation and go back to the original state."},
  {s:"Part 3 · Quantum Gates",p:"One of the most famous classical gates is the NOT gate, which flips a 0 to a 1. In quantum computing, we have a direct analog.",q:"Which quantum gate directly flips a state zero to a state one?",o:["The Z gate","The Hadamard (H) gate","The X gate","The RZ gate"],a:2,e:"Much like the classical NOT gate, applying the quantum X gate on state zero leads directly to state one."},
  {s:"Part 3 · Quantum Gates",p:"To leverage quantum advantages, we must be able to generate superpositions from baseline states.",q:"If you apply a Hadamard (H) gate to a qubit in state zero, what is the resulting state?",o:["State one.","An equal superposition of state zero and one, also known as the plus (+) state.","A completely collapsed classical state.","State minus (-)."],a:1,e:"Applying a Hadamard gate on state zero creates an equal superposition of zero and one on the equatorial plane, known as the plus state."},
  {s:"Part 3 · Quantum Gates",p:"Some gates do not alter the probabilities of measuring 0 or 1, but rather change the internal mathematical 'sign' or phase of the superposition.",q:"How does the Z gate affect a qubit in state one?",o:["It flips it back to state zero.","It changes its phase sign to minus one (−1).","It creates an equal superposition.","It does absolutely nothing to state one."],a:1,e:"While the Z gate does nothing to the zero state, it acts as a phase flip by changing the sign of the state one to minus one."},

  /* ── Part 4: Rotation Gates & Parameters ── */
  {s:"Part 4 · Rotation Gates & Trainable Parameters",p:"The X, H, and Z gates apply fixed, predetermined mathematical rotations. However, modern algorithms require more flexible tools.",q:"What sets 'rotation gates' apart from fixed rigid gates like X or H?",o:["They can only rotate a state by 180 degrees.","They have no predefined angle and allow rotation by a variable, specific angle θ.","They are exclusively used for classical bits.","They destroy the superposition upon application."],a:1,e:"Rotation gates have no predefined angle, allowing the user to tune the rotation around an axis by a chosen angle θ."},
  {s:"Part 4 · Rotation Gates & Trainable Parameters",p:"Rotation gates are defined by the specific 3D axis on the Bloch sphere around which they rotate the state vector.",q:"What does the gate notation 'RX' signify?",o:["A measurement operation on the X axis.","A rotation by a certain angle θ strictly about the X axis.","A fixed 90-degree flip.","A reversible extraction gate."],a:1,e:"RX indicates a rotation by a certain angle θ about the X axis."},
  {s:"Part 4 · Rotation Gates & Trainable Parameters",p:"These variable angle θ values act like tunable knobs on a radio, giving us continuous control over the state.",q:"In the context of Variational Quantum Algorithms (VQAs), what functional role do these continuous θ parameters play?",o:["They are constant values that cannot be altered.","They act as the 'trainable parameters' optimized by classical computers.","They act as the measurement threshold.","They determine the total number of qubits in the hardware."],a:1,e:"These continuous θ values serve as the trainable parameters that form the foundation of variational circuits, adjusted to find the best state."},

  /* ── Part 5: Entanglement ── */
  {s:"Part 5 · Entanglement & the CNOT Gate",p:"Single qubit superpositions are powerful, but the true exponential power of quantum computing relies on linking multiple qubits together through a two-qubit gate.",q:"What is the primary purpose of the CNOT gate?",o:["To measure two qubits simultaneously.","To disentangle states.","To facilitate quantum entanglement between two qubits.","To copy the superposition of one qubit onto another."],a:2,e:"The CNOT gate is a highly fundamental two-qubit gate used to reach entangled states, which is an ultimate goal of utilizing quantum mechanical principles."},
  {s:"Part 5 · Entanglement & the CNOT Gate",p:"The physical mechanism of the CNOT gate involves an asymmetric relationship between its two input qubits.",q:"How does the CNOT gate determine whether to flip the target qubit?",o:["It flips the target qubit randomly.","It flips the target qubit only if the control qubit is in state zero.","It flips the target qubit only if the control qubit is in state one.","It flips both qubits if they are in equal superpositions."],a:2,e:"The control qubit dictates the operation; the target qubit gets flipped if and only if the control qubit is one."},
  {s:"Part 5 · Entanglement & the CNOT Gate",p:"Using a Hadamard gate followed by a CNOT gate yields one of the most famous phenomena in physics.",q:"What is the definition of two qubits being deeply 'entangled'?",o:["The qubits share the exact same physical coordinates.","Knowing something about one qubit instantly gives you known information about the state of the other qubit.","The qubits have been measured and collapsed into identical classical bits.","The qubits are repelling one another magnetically."],a:1,e:"Entanglement implies a deep correlation; knowing the state of one qubit guarantees you already know the state of the other, without actively searching."},
  {s:"Part 5 · Entanglement & the CNOT Gate",p:"The most famous maximally entangled two-qubit state can be prepared starting from the |00⟩ state.",q:"What exact sequence of gates takes the |00⟩ state to the maximally entangled Bell state (|00⟩ + |11⟩)?",o:["An X gate on both qubits.","A Z gate on qubit 1, followed by an H gate on qubit 2.","A Hadamard gate on the first qubit, followed by a CNOT gate acting on both.","An RX gate on qubit 1, followed by an RZ gate on qubit 2."],a:2,e:"Applying a Hadamard to the first qubit brings the state to |00⟩ + |10⟩, and applying the CNOT entangles them into the |00⟩ + |11⟩ Bell state."},
  {s:"Part 5 · Entanglement & the CNOT Gate",p:"Entanglement correlations display behavior that defies classical intuition.",q:"If two qubits are in a maximally entangled Bell state, what happens to their correlation if they are separated by an enormous physical distance?",o:["The correlation degrades linearly with distance.","The correlation breaks immediately once they leave the quantum processor.","The correlation holds no matter how far apart they are.","The correlation reverses so measuring a 0 yields a 0 on the other."],a:2,e:"Entanglement correlation holds strong no matter how far apart the physical qubits are separated."},

  /* ── Part 6: Circuits & Measurement ── */
  {s:"Part 6 · Quantum Circuits & Measurement",p:"We've established that measurement destroys our fragile superpositions and entanglements.",q:"What is the central philosophy behind designing a successful quantum algorithm?",o:["To measure the qubits as frequently as possible to track their progress.","To extract as much information as possible while the system is in the superposition state, before the final measurement.","To immediately convert all qubits back to classical bits.","To avoid using entanglement entirely."],a:1,e:"Because measurement collapses the quantum state to classical information, algorithms must be meticulously designed to extract information during the superposition phase prior to measurement."},
  {s:"Part 6 · Quantum Circuits & Measurement",p:"As we string multiple X, H, CNOT, and rotation gates together in a specific sequence, we build a larger functional structure.",q:"What is the formal term for a specific sequence of compiled quantum gates?",o:["A Quantum Array","A Quantum Circuit","A Bloch Grid","A State Vector"],a:1,e:"A sequence of quantum gates stitched together forms a quantum circuit."},

  /* ── Part 7: The Ansatz ── */
  {s:"Part 7 · The Ansatz & Parameterized Circuits",p:"In traditional algorithms, quantum circuits use rigid, fixed gates where the output is always identical for a given input. In Variational Quantum Algorithms, we introduce a new type of circuit.",q:"What do we call a quantum circuit that contains tunable rotation parameters (θ) as free variables?",o:["An Ansatz (or Parameterized Quantum Circuit)","A Rigid State Circuit","A Classical Turing Circuit","A Barren Plateau"],a:0,e:"A circuit featuring tunable rotation parameters is known as a parameterized quantum circuit, or an Ansatz."},
  {s:"Part 7 · The Ansatz & Parameterized Circuits",p:"As θ acts as a free variable, adjusting it directly changes the behavior of the circuit.",q:"In an Ansatz, what happens to the output state ψ(θ) as the variable θ is continuously altered?",o:["The output state remains perfectly static.","The output state changes accordingly to explore a family of quantum states.","The circuit immediately decoheres.","The hardware forces θ back to zero."],a:1,e:"Because θ is a free variable, the output state ψ(θ) dynamically changes as θ changes, allowing it to define and explore a parameterized family of quantum states."},
  {s:"Part 7 · The Ansatz & Parameterized Circuits",p:"'Ansatz' is a term originally borrowed from the German language.",q:"What does the word 'Ansatz' literally translate to in the context of scientific problem-solving?",o:["Absolute Truth","An approach or an educated guess","A fixed mathematical proof","A mechanical failure"],a:1,e:"The word comes from German ('Ansätze') and translates to an approach or an educated guess regarding the form of the solution."},

  /* ── Part 8: Hilbert Space ── */
  {s:"Part 8 · Hilbert Space",p:"To understand why we need to make an 'educated guess', we must look at the massive space where our answer lives — the full quantum state space.",q:"What is the scientific name for the full 2ⁿ dimensional quantum state space we are searching through?",o:["Einstein Space","Newtonian Space","Hilbert Space","Turing Space"],a:2,e:"The full quantum state space containing all 2ⁿ dimensions for n qubits is known as the Hilbert space, named after David Hilbert."},
  {s:"Part 8 · Hilbert Space",p:"The Hilbert space grows exponentially. For a 20-qubit system, there are roughly a million possible quantum states. We are essentially looking for a needle in an impossibly large haystack.",q:"How does an Ansatz solve the 'needle in the haystack' problem of searching the massive Hilbert space?",o:["By searching every single state simultaneously using brute force.","By restricting our search to a very manageable, smaller subspace.","By eliminating all superpositions entirely.","By asking a classical computer to map the entire space first."],a:1,e:"Instead of blindly searching the vast exponential space, the Ansatz artificially restricts our search to a highly manageable, defined subspace."},
  {s:"Part 8 · Hilbert Space",p:"While a small Ansatz with very few θ parameters restricts the search to a highly manageable space, there is a distinct risk.",q:"What is the primary risk of using an Ansatz with too few parameters?",o:["The circuit will run too slowly.","The true solution might not lie within that heavily restricted subspace.","It consumes too much memory on the classical computer.","It causes the qubits to entangle uncontrollably."],a:1,e:"While a small subspace is fast to search, there is a huge chance that the true solution simply does not exist within that confined space out of a million possible states."},
  {s:"Part 8 · Hilbert Space",p:"If our solution isn't in the small subspace, the intuitive countermeasure is to dramatically increase the number of trainable parameters to cast a wider net.",q:"What major drawback emerges when we increase the number of trainable parameters to create a larger subspace?",o:["The landscape becomes impossible to simulate visually.","The hardware begins to physically heat up.","The circuit becomes significantly harder for the classical optimizer to train and optimize.","The θ values become fixed and locked."],a:2,e:"The fundamental trade-off (the 'no free lunch' rule) is that while adding more parameters expands your subspace, it makes the system much harder to train and optimize."},
  {s:"Part 8 · Hilbert Space",p:"Theoretically, if one were to add an incredibly massive number of parameters, you could span the exact dimension of the full Hilbert Space.",q:"Why don't we simply use an Ansatz massive enough to span the entire Hilbert space to guarantee we find the solution?",o:["Because it is mathematically intractable and defeats the entire purpose of using an Ansatz.","Because the qubits would reject the θ values.","Because Hilbert space does not contain the solutions for chemistry problems.","Because entanglement limits the number of parameters to exactly 10."],a:0,e:"Spanning the entire Hilbert space by brute force is completely intractable. Avoiding this intractable search is the entire reason we rely on an Ansatz in the first place."},
  {s:"Part 8 · Hilbert Space",p:"Therefore, the art of variational quantum algorithms relies on a delicate balancing act.",q:"What represents a well-designed, successful Ansatz?",o:["One that eliminates all gates except the X gate.","One that covers just enough of the Hilbert space to contain the answer, while keeping the parameter count highly manageable.","One that uses an infinite number of parameters.","One that relies entirely on classical processing for the gates."],a:1,e:"Choosing the right Ansatz means finding the balance: covering enough of the Hilbert space to find the solution, while keeping the parameters low enough to remain manageable for the optimizer."},

  /* ── Part 9: Hardware Efficient Ansatz ── */
  {s:"Part 9 · The Hardware Efficient Ansatz",p:"When choosing an Ansatz, your first decision depends on how much prior domain knowledge you have about the problem. If you know very little, you default to a 'Generic' Ansatz.",q:"What is the primary defining characteristic of a Hardware Efficient Ansatz (HEA), the most common generic ansatz?",o:["It strictly uses only problem-specific chemical equations.","It is compiled purely using the native basis gates that are easiest for that specific quantum hardware to run.","It requires absolutely no tunable θ parameters.","It is designed to run exclusively on classical hardware."],a:1,e:"A generic Hardware Efficient Ansatz limits its circuit to the native basis gates that the specific hardware provider (like IBM or a trapped ion platform) natively executes best."},
  {s:"Part 9 · The Hardware Efficient Ansatz",p:"Native basis gates vary dramatically by physical architecture. IBM's superconducting qubits prefer different baseline microwave pulses than trapped ion lasers.",q:"In a typical Hardware Efficient Ansatz block, what repetitive architectural pattern is most frequently utilized?",o:["Measurement, followed by resetting to zero, and repeating.","A layer of rotation gates (like RY/RZ), a layer of entangling gates (like CNOT), and repeat.","A continuous sequence of strictly Hadamard gates.","Classical AND gates mixed with Quantum Z gates."],a:1,e:"The repeating pattern used to build a hardware efficient circuit is almost always a layer of rotation gates, followed by a layer of entangling gates, repeated sequentially."},
  {s:"Part 9 · The Hardware Efficient Ansatz",p:"Because the HEA uses exactly the gates the machine natively loves, it does not require complex translation or compilation overhead.",q:"What is the primary physical advantage of using a Hardware Efficient Ansatz on today's noisy (NISQ) quantum hardware?",o:["It requires a very deep circuit, which protects against noise.","It requires shallow circuits, making it highly robust against hardware noise and easy to implement.","It perfectly models the molecular bonds of water.","It bypasses the need for entanglement."],a:1,e:"Because it uses native gates, the HEA results in very shallow circuits (low depth), making it ideal for running on today's noisy quantum hardware."},
  {s:"Part 9 · The Hardware Efficient Ansatz",p:"However, designing an Ansatz blind to the problem context introduces a severe handicap.",q:"What is the main disadvantage of the Hardware Efficient Ansatz?",o:["It uses completely unproven mathematical principles.","It relies entirely on domain knowledge you might not have.","It has no domain knowledge built into it, wasting parameters exploring entirely irrelevant quantum states.","It cannot handle continuous θ variables."],a:2,e:"Because the HEA applies a generic repeating pattern with zero domain knowledge, it wastes valuable parameters blindly searching irrelevant states of the Hilbert space."},

  /* ── Part 10: Problem-Inspired Ansatz ── */
  {s:"Part 10 · The Problem-Inspired Ansatz",p:"Conversely, if we are simulating a specific physical system such as a molecule, we can heavily bias our Ansatz design based on what we already know about physics.",q:"What do we call an Ansatz that is intentionally designed to respect the structure, symmetries, and particle conservation laws of a specific problem?",o:["A Hardware Efficient Ansatz","A Problem-Inspired Ansatz","A Barren Ansatz","A Random Walk Ansatz"],a:1,e:"A Problem-Inspired Ansatz uses domain expertise to explicitly build the structure of the problem (like particle number or symmetries) directly into the quantum circuit."},
  {s:"Part 10 · The Problem-Inspired Ansatz",p:"Because the Problem-Inspired Ansatz is laser-focused on the relevant corners of the Hilbert space, it operates highly efficiently.",q:"What is a major advantage of the Problem-Inspired Ansatz regarding its parameter count?",o:["It requires zero parameters.","It needs fewer parameters and often converges faster because the search space is highly constrained to relevant states.","It allows parameters to be randomly guessed.","It uses infinitely many parameters but trains them instantly."],a:1,e:"Because it avoids irrelevant states, it requires fewer parameters and usually converges much faster than a generic Ansatz."},
  {s:"Part 10 · The Problem-Inspired Ansatz",p:"However, a Problem-Inspired Ansatz is mathematically complex, utilizing custom theoretical operators rather than simple hardware-native pulses.",q:"What happens when you attempt to compile and run a Problem-Inspired Ansatz on actual, current noisy hardware?",o:["It runs instantly with zero depth.","The complex operators compile into deeper, much longer circuits, introducing significantly more noise.","The hardware physically rejects the circuit.","The continuous parameters are locked at zero."],a:1,e:"Complex problem-inspired operators do not map 1:1 with hardware gates. Compiling them requires long combinations of native gates, resulting in deeper circuits that are highly susceptible to noise."},
  {s:"Part 10 · The Problem-Inspired Ansatz",p:"Comparing these two paradigms highlights a direct trade-off graphic. We map 'Problem Knowledge' against 'Circuit Depth'.",q:"On the trade-off graph comparing Ansatz types, where does the Hardware Efficient Ansatz sit?",o:["High problem knowledge, high circuit depth.","High problem knowledge, low circuit depth.","Low problem knowledge, low circuit depth.","Low problem knowledge, high circuit depth."],a:2,e:"The HEA sits at the bottom-left of the trade-off graph, characterized by low problem knowledge (generic) and low circuit depth (shallow/native)."},

  /* ── Part 11: Expressibility & Trainability ── */
  {s:"Part 11 · Expressibility & Trainability",p:"To formally evaluate the quality of any Ansatz, we assess two competing theoretical properties.",q:"What metric defines 'how many different states a given Ansatz can fundamentally reach'?",o:["Trainability","Expressibility","Superposition Density","Entanglement Volume"],a:1,e:"Expressibility is the property that measures how large of a subspace the Ansatz spans and how many states it can potentially reach."},
  {s:"Part 11 · Expressibility & Trainability",p:"The competing property addresses the practical reality of our classical computers finding the correct θ angles.",q:"What metric dictates 'how easy it is for an optimizer to navigate the parameter landscape to find the solution'?",o:["Reversibility","Trainability","Expressibility","Collapse Rate"],a:1,e:"Trainability defines how easily an optimization algorithm can navigate the θ parameters to reach the minimum or target state."},
  {s:"Part 11 · Expressibility & Trainability",p:"Expressibility and Trainability are diametrically opposed in a tug-of-war.",q:"As we drastically increase the number of parameters in our circuit, what generally happens to the relationship between Expressibility and Trainability?",o:["Both increase simultaneously.","Expressibility goes up, but Trainability goes down.","Expressibility goes down, but Trainability goes up.","Both collapse to zero."],a:1,e:"Adding parameters naturally increases expressibility (reaching more states), but makes the mathematical landscape overwhelmingly complex, causing trainability to plummet."},

  /* ── Part 12: Barren Plateaus & Design Goals ── */
  {s:"Part 12 · Barren Plateaus & Design Goals",p:"Pushing Expressibility too high results in a catastrophic failure mode in the optimization landscape, where the gradient becomes completely flat.",q:"What is the technical term for the completely flat optimization landscape caused by having far too many parameters?",o:["The Superposition Valley","Barren Plateaus","The Hilbert Sink","The Decoherence Zone"],a:1,e:"Too many parameters result in a flat landscape mathematically devoid of gradients, a severe roadblock known as barren plateaus."},
  {s:"Part 12 · Barren Plateaus & Design Goals",p:"Knowing this, algorithm developers spend immense time iterating their designs to avoid barren plateaus.",q:"What is the ultimate architectural goal when designing an Ansatz?",o:["To maximize Expressibility without any regard for Trainability.","To maximize Trainability by using exactly one parameter.","To find the specific 'sweet spot' that grants enough expressibility without fatally compromising trainability.","To eliminate parameters entirely and use fixed gates."],a:2,e:"A good Ansatz aims for the sweet spot: maintaining sufficient expressibility to solve the problem while remaining trainable enough for classical algorithms to process."},
  {s:"Part 12 · Barren Plateaus & Design Goals",p:"Now that we have established how the quantum state is generated through θ parameters, we must ask: how do we actually know which θ values to pick?",q:"In a Variational Quantum Algorithm, what component is responsible for searching through and updating the free θ variables?",o:["The quantum superposition state itself.","A classical optimizer algorithm.","The CNOT gate.","The Bloch Sphere equator."],a:1,e:"A classical optimizer loop is responsible for searching over the θ free variables, attempting to find the best configuration for the family of states."},
  {s:"Part 12 · Barren Plateaus & Design Goals",p:"The classical optimizer needs a mathematical target to evaluate whether a certain set of θ variables is 'good' or 'bad.' This will be the main focus of our next lecture.",q:"What metric does the classical optimizer attempt to minimize in the upcoming hybrid quantum-classical loop?",o:["The number of qubits.","The hardware temperature.","The cost function.","The speed of light."],a:2,e:"As we transition into the next lecture, we will see that the classical optimizer updates θ to optimize and minimize defined cost functions."},
  {s:"Part 12 · Barren Plateaus & Design Goals",p:"In order to calculate this cost function, we must translate our final quantum state ψ(θ) into a tangible numerical value representing the physical system's energy or objective.",q:"What physical quantities, calculated from the quantum circuit's output, will feed directly into the cost function to close the hybrid loop in Lecture 2?",o:["Measurement phase vectors","Hamiltonian Expectation Values","Decoherence ratios","Superposition alphas"],a:1,e:"The next session will heavily focus on taking the parameterized output and calculating Hamiltonian expectation values, which define the cost function that drives the entire hybrid quantum-classical loop."},
];

let qi=0,step='intro',score=0,answered=0;
const slot=document.getElementById('slot'),fill=document.getElementById('prog-fill'),barLbl=document.getElementById('bar-label'),scorEl=document.getElementById('score-tag');

function updateBar(){
  fill.style.width=(answered/50*100)+'%';
  scorEl.textContent=score+' / 50';
  barLbl.textContent=step==='intro'?'Adv VQE · Part 1':step==='summary'?'Complete':`Q${qi+1} of 50`;
}
function swap(fn){
  const cur=slot.firstChild;
  if(cur){cur.classList.add('out');setTimeout(()=>{slot.innerHTML='';fn();},220);}
  else fn();
}
function showIntro(){
  step='intro';updateBar();
  const d=document.createElement('div');d.className='intro';
  d.innerHTML=`
    <div class="intro-tag">Module 04 · 50 Questions</div>
    <h1>Advanced VQA —<br><em>Part 1: Fundamentals &amp; Architectures</em></h1>
    <p>From qubits and the Bloch sphere through quantum gates, entanglement, and the Ansatz design trade-offs.</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn" onclick="startQuiz()">Begin <span class="arr">→</span></button>
    </div>`;
  slot.appendChild(d);
}
function startQuiz(){qi=0;score=0;answered=0;swap(()=>showPreview());}
function showPreview(){
  step='preview';updateBar();
  const d=document.createElement('div');d.className='card';
  d.innerHTML=`
    <div class="card-header">
      <span class="dot preview-dot"></span>
      <span class="card-kind preview-kind">Preview</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    <div class="section-label">${data[qi].s}</div>
    <div class="preview-body">${data[qi].p}</div>
    <div class="btn-row"><button class="btn" onclick="swap(showQuestion)">Question <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}
function showQuestion(){
  step='question';updateBar();
  const item=data[qi];
  const d=document.createElement('div');d.className='card';
  const optHtml=item.o.map((o,oi)=>`<button class="option" id="opt${oi}" onclick="pick(${oi})"><span class="opt-letter">${L[oi]}</span><span>${o}</span></button>`).join('');
  d.innerHTML=`
    <div class="card-header">
      <span class="dot question-dot"></span>
      <span class="card-kind question-kind">Question ${qi+1} of 50</span>
    </div>
    <div class="question-body">${item.q}</div>
    <div class="options">${optHtml}</div>`;
  slot.appendChild(d);
}
function pick(oi){
  const item=data[qi];
  document.querySelectorAll('.option').forEach(b=>b.disabled=true);
  const correct=item.a;
  document.querySelectorAll('.option')[correct].classList.add(oi===correct?'opt-correct':'opt-reveal');
  if(oi!==correct) document.querySelectorAll('.option')[oi].classList.add('opt-wrong');
  setTimeout(()=>swap(()=>showResult(oi)),480);
}
function showResult(oi){
  const item=data[qi];const ok=oi===item.a;
  if(ok)score++;answered++;step='result';updateBar();
  const d=document.createElement('div');d.className='card';
  const dotCls=ok?'result-dot-correct':'result-dot-wrong';
  const kindCls=ok?'result-kind-correct':'result-kind-wrong';
  let rowsHtml=`<div class="chosen-row ${ok?'correct':'wrong'}"><span class="row-icon">${ok?'✓':'✗'}</span><span>${item.o[oi]}</span></div>`;
  if(!ok) rowsHtml+=`<div class="chosen-row reveal"><span class="row-icon">✓</span><span><strong>Correct:</strong> ${item.o[item.a]}</span></div>`;
  const isLast=qi===49;
  d.innerHTML=`
    <div class="card-header">
      <span class="dot ${dotCls}"></span>
      <span class="card-kind ${kindCls}">${ok?'Correct!':'Incorrect'}</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    ${rowsHtml}
    <div class="exp-wrap">
      <div class="exp-label">Explanation</div>
      <div class="exp-text">${item.e}</div>
    </div>
    <div class="btn-row"><button class="btn" onclick="advance()">${isLast?'See Results':'Next'} <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}
function advance(){
  if(qi===49){swap(showSummary);return;}
  qi++;swap(showPreview);
}
function showSummary(){
  step='summary';updateBar();
  const pct=Math.round(score/50*100);
  const msgs=[
    [80,"Outstanding. From the Bloch sphere to barren plateaus, you have mastered the full foundational architecture of Variational Quantum Algorithms."],
    [60,"Excellent work. The core qubit mechanics and Ansatz trade-offs are clear. Revisit the Expressibility/Trainability section and Hilbert space on your next pass."],
    [40,"Good progress. Focus on Parts 8–12 — the Hilbert space, Ansatz types, and the Expressibility/Trainability tug-of-war are the heart of this lecture."],
    [20,"A solid start. Go back to the beginning and trace each concept step by step — the chain from qubits to Ansatz to barren plateaus is logical and tight."],
    [-1,"This material is foundational but dense. Take it one part at a time — each pass reveals the deeper architecture connecting qubits to the VQA loop."]
  ];
  const msg=msgs.find(([t])=>pct>t)[1];
  const d=document.createElement('div');d.className='summary';
  d.innerHTML=`
    <div class="sum-tag">Module 04 Complete · Adv VQE Part 1</div>
    <div class="sum-score">${score}<span>/50</span></div>
    <div class="sum-pct">${pct}% correct</div>
    <div class="sum-msg">${msg}</div>
    <div class="sum-btns">
      <a class="btn-home" href="index.html">← All Modules</a>
      <button class="btn-reset" onclick="swap(showIntro)">↺ Retake</button>
    </div>`;
  slot.appendChild(d);
}
showIntro();
</script>
