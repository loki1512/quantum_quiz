<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Intro to PennyLane — Quantum Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050a12; --surface:#0a1525; --border:#1a3050;
    --accent:#a3e635; --accent-dim:#65a30d; --gold:#f0c040;
    --green:#39e07a; --red:#ff5566; --blue:#38bdf8;
    --text:#c8dff0; --text-dim:#6a8aaa; --text-bright:#e8f4ff;
    --mono:'Space Mono',monospace; --serif:'Crimson Pro',Georgia,serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:18px;line-height:1.7;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}

  .bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(163,230,53,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(163,230,53,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
  .bg-glow{position:fixed;z-index:0;pointer-events:none;border-radius:50%;filter:blur(130px)}
  .bg-glow-1{width:700px;height:700px;background:radial-gradient(circle,rgba(80,130,10,.13),transparent 70%);top:-250px;left:-250px}
  .bg-glow-2{width:500px;height:500px;background:radial-gradient(circle,rgba(163,230,53,.06),transparent 70%);bottom:0;right:-150px;animation:bgPulse 9s ease-in-out infinite alternate}
  @keyframes bgPulse{from{opacity:.5}to{opacity:1}}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,10,18,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:11px 28px;display:flex;align-items:center;gap:16px}
  .home-btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:2px;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .home-btn:hover{color:var(--accent);border-color:rgba(163,230,53,.4)}
  .bar-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;min-width:100px}
  .progress-track{flex:1;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(163,230,53,.5)}
  .score-tag{font-family:var(--mono);font-size:10px;color:var(--gold);white-space:nowrap;min-width:55px;text-align:right}

  .stage{position:relative;z-index:1;width:100%;max-width:680px;padding:110px 24px 60px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:36px 36px 28px;animation:cardIn .32s cubic-bezier(.4,0,.2,1)}
  @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .card.out{animation:cardOut .22s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes cardOut{to{opacity:0;transform:translateY(-14px)}}

  .card-header{display:flex;align-items:center;gap:10px;margin-bottom:22px}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .card-kind{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase}
  .card-num{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-left:auto}

  /* PREVIEW */
  .preview-dot{background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .preview-kind{color:var(--accent)}
  .section-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);opacity:.6;margin-bottom:10px}
  .preview-body{font-family:var(--serif);font-size:1.08rem;font-style:italic;color:var(--text);line-height:1.75;margin-bottom:28px}

  /* QUESTION */
  .question-dot{background:var(--gold);box-shadow:0 0 8px var(--gold)}
  .question-kind{color:var(--gold)}
  .question-body{font-family:var(--serif);font-size:1.08rem;color:var(--text-bright);line-height:1.65;margin-bottom:22px}

  /* CODE badge */
  .code-dot{background:var(--blue);box-shadow:0 0 8px var(--blue)}
  .code-kind{color:var(--blue)}
  .code-badge{display:inline-block;font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--blue);border:1px solid rgba(56,189,248,.3);border-radius:2px;padding:2px 8px;margin-bottom:14px}

  /* MCQ OPTIONS */
  .options{display:flex;flex-direction:column;gap:9px;margin-bottom:6px}
  .option{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;color:var(--text);font-family:var(--serif);font-size:.97rem;text-align:left;line-height:1.5;width:100%;transition:border-color .14s,background .14s,color .14s}
  .option:hover:not(:disabled){border-color:rgba(163,230,53,.5);background:rgba(163,230,53,.05);color:var(--text-bright)}
  .option:disabled{cursor:default}
  .opt-letter{font-family:var(--mono);font-size:10px;color:var(--text-dim);border:1px solid var(--border);border-radius:2px;padding:2px 7px;flex-shrink:0;margin-top:2px;transition:all .14s}
  .option:hover:not(:disabled) .opt-letter{border-color:var(--accent);color:var(--accent)}
  .option.opt-correct{border-color:var(--green);background:rgba(57,224,122,.09);color:var(--text-bright)}
  .option.opt-correct .opt-letter{border-color:var(--green);color:var(--green);background:rgba(57,224,122,.15)}
  .option.opt-wrong{border-color:var(--red);background:rgba(255,85,102,.09);color:var(--text-bright)}
  .option.opt-wrong .opt-letter{border-color:var(--red);color:var(--red);background:rgba(255,85,102,.15)}
  .option.opt-reveal{border-color:rgba(57,224,122,.4);background:rgba(57,224,122,.04)}
  .option.opt-reveal .opt-letter{border-color:var(--green);color:var(--green)}

  /* CODE INPUT */
  .code-guide{font-family:var(--mono);font-size:.78rem;color:var(--text-dim);line-height:1.6;margin-bottom:14px;padding:10px 14px;border-left:2px solid rgba(56,189,248,.4);background:rgba(56,189,248,.04);border-radius:0 3px 3px 0}
  .code-guide strong{color:var(--blue);display:block;margin-bottom:4px;font-size:.75rem}
  .code-input-wrap{position:relative;margin-bottom:14px}
  .code-input{width:100%;background:#020810;border:1px solid var(--border);border-radius:4px;padding:14px 16px;font-family:var(--mono);font-size:.88rem;color:var(--accent);line-height:1.5;outline:none;transition:border-color .14s;resize:none;min-height:52px}
  .code-input:focus{border-color:rgba(163,230,53,.5);box-shadow:0 0 0 1px rgba(163,230,53,.15)}
  .code-input.input-correct{border-color:var(--green);color:var(--green)}
  .code-input.input-wrong{border-color:var(--red);color:var(--red)}
  .code-input.input-correct:focus,.code-input.input-wrong:focus{box-shadow:none}
  .check-btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;padding:9px 20px;border:1px solid rgba(163,230,53,.5);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer;transition:all .18s;margin-bottom:6px}
  .check-btn:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 16px rgba(163,230,53,.3)}
  .check-btn:disabled{opacity:.4;cursor:default}
  .code-feedback{font-family:var(--mono);font-size:.8rem;padding:8px 12px;border-radius:3px;border:1px solid;margin-bottom:4px;display:none;line-height:1.5}
  .code-feedback.show{display:block}
  .code-feedback.fb-correct{border-color:rgba(57,224,122,.4);background:rgba(57,224,122,.07);color:var(--green)}
  .code-feedback.fb-wrong{border-color:rgba(255,85,102,.3);background:rgba(255,85,102,.07);color:var(--red)}
  .code-answer-reveal{font-family:var(--mono);font-size:.82rem;color:var(--text-dim);margin-bottom:6px;display:none}
  .code-answer-reveal.show{display:block}
  .code-answer-reveal span{color:var(--accent)}

  /* RESULT / EXPLANATION */
  .result-dot-correct{background:var(--green);box-shadow:0 0 8px var(--green)}
  .result-dot-wrong{background:var(--red);box-shadow:0 0 8px var(--red)}
  .result-kind-correct{color:var(--green)}
  .result-kind-wrong{color:var(--red)}
  .chosen-row{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:4px;border:1px solid;margin-bottom:12px;font-family:var(--serif);font-size:.97rem;line-height:1.5}
  .chosen-row.correct{border-color:var(--green);background:rgba(57,224,122,.08);color:var(--text-bright)}
  .chosen-row.wrong{border-color:var(--red);background:rgba(255,85,102,.08);color:var(--text-bright)}
  .chosen-row.reveal{border-color:rgba(57,224,122,.4);background:rgba(57,224,122,.05);color:var(--text-bright)}
  .row-icon{flex-shrink:0;font-size:.95rem;margin-top:1px}
  .code-block{font-family:var(--mono);font-size:.85rem;background:#020810;border:1px solid var(--border);border-radius:3px;padding:10px 14px;color:var(--accent);margin-bottom:12px}
  .exp-wrap{margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
  .exp-label{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .exp-label::before{content:'λ'}
  .exp-text{font-size:.93rem;color:var(--text);font-style:italic;line-height:1.65}

  /* BUTTON */
  .btn-row{display:flex;justify-content:flex-end;margin-top:26px}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:11px 24px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:8px}
  .btn:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px rgba(163,230,53,.35)}
  .btn .arr{transition:transform .18s}
  .btn:hover .arr{transform:translateX(4px)}

  /* INTRO */
  .intro{text-align:center;animation:cardIn .35s ease}
  .intro-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px}
  .intro-tag::before,.intro-tag::after{content:'';display:block;width:28px;height:1px;background:var(--accent)}
  .intro h1{font-family:var(--serif);font-weight:300;font-size:clamp(1.9rem,5vw,3rem);color:var(--text-bright);line-height:1.2;margin-bottom:14px;letter-spacing:-.01em}
  .intro h1 em{color:var(--accent);font-style:normal;font-weight:600}
  .intro p{font-size:.9rem;color:var(--text-dim);font-family:var(--mono);margin-bottom:24px;line-height:1.7;max-width:440px;margin-left:auto;margin-right:auto}
  .intro-legend{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
  .legend-item{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:10px;color:var(--text-dim)}
  .legend-dot{width:8px;height:8px;border-radius:50%}

  /* SUMMARY */
  .summary{text-align:center;animation:cardIn .4s ease}
  .sum-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
  .sum-score{font-family:var(--serif);font-weight:300;font-size:clamp(3.5rem,12vw,5.5rem);color:var(--text-bright);line-height:1;margin-bottom:6px}
  .sum-score span{color:var(--accent)}
  .sum-pct{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:28px}
  .sum-msg{font-size:1.03rem;font-style:italic;color:var(--text);line-height:1.7;max-width:440px;margin:0 auto 36px}
  .sum-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn-reset{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 28px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer;transition:all .2s}
  .btn-reset:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px rgba(163,230,53,.35)}
  .btn-home{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 28px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:3px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .btn-home:hover{border-color:var(--text-dim);color:var(--text)}
</style>
</head>
<body>
<div class="bg-grid"></div>
<div class="bg-glow bg-glow-1"></div>
<div class="bg-glow bg-glow-2"></div>

<div class="topbar">
  <a class="home-btn" href="index.html">← Home</a>
  <div class="bar-label" id="bar-label">PennyLane Intro</div>
  <div class="progress-track"><div class="progress-fill" id="prog-fill"></div></div>
  <div class="score-tag" id="score-tag">0 / 50</div>
</div>

<div class="stage"><div id="slot"></div></div>

<script>
const L=['a','b','c','d'];

/* ── DATA ── */
/* type:'mcq' | type:'code'
   mcq  → {s, p, q, o:[], a:index, e}
   code → {s, p, q, guide, ans:[], e}   ans[] = list of acceptable normalized answers */
const data=[
  /* ── Concept 1: Intro to PennyLane ── */
  {type:'mcq',s:"Concept 1 · Introduction to PennyLane",p:"PennyLane has evolved into a full-stack quantum programming library, but it started with a specific niche.",q:"What was PennyLane originally introduced to do?",o:["Quantum Machine Learning","Classical database management","High-energy physics simulations"],a:0,e:"PennyLane was initially introduced as a tool for quantum machine learning, though it now supports general simulations, optimization, and chemistry."},
  {type:'mcq',s:"Concept 1 · Introduction to PennyLane",p:"Xanadu is the company that created PennyLane. Understanding the creators helps us understand the software's goals.",q:"What is the primary mission of Xanadu?",o:["To solely develop open-source quantum software","To build quantum computers that are useful and available, alongside software","To manufacture classical graphics processing units (GPUs)"],a:1,e:"Xanadu is a full-stack company whose mission is to build both the physical quantum hardware and the software required to make it useful."},
  {type:'mcq',s:"Concept 1 · Introduction to PennyLane",p:"PennyLane is designed for accessibility and ecosystem growth.",q:"How is the PennyLane codebase licensed and distributed?",o:["It is open-source, allowing you to view the code and build startups on it","It is proprietary and requires a paid license for any use","It is restricted to academic institutions only"],a:0,e:"PennyLane is an open-source library, and Xanadu actively encourages users to build applications, tutorials, and startups on top of it."},
  {type:'mcq',s:"Concept 1 · Introduction to PennyLane",p:"Hardware is scaling, but we don't always need a physical quantum processor to run quantum algorithms.",q:"What tool allows you to run and test PennyLane code without physical quantum hardware?",o:["High-performance simulators, like the Lightning suite","Classical compilers like GCC","You cannot run PennyLane without hardware"],a:0,e:"You can run things on high-performance simulators like Lightning, which is vital for learning and developing algorithms before testing on actual hardware."},
  {type:'code',s:"Concept 1 · Introduction to PennyLane",p:"To begin coding, we need to bring the library into our Python environment.",q:"Write the single command-line instruction to install PennyLane in a cloud notebook like Google Colab.",guide:"Use the exclamation mark prefix followed by pip install and the package name.",ans:["!pip install pennylane"],e:"Running this command will install the PennyLane software package locally or in a cloud notebook environment."},

  /* ── Concept 2: Importing and Setup ── */
  {type:'mcq',s:"Concept 2 · Importing & Setup",p:"Once installed, we must import the library to use its functions. Historically, some people use the alias `qml` due to its origins.",q:"What alias does the instructor use in this lecture to emphasize 'quantum programming'?",o:["`pl`","`qp`","`qml`"],a:1,e:"The instructor imports PennyLane as `qp` to stand for 'quantum programming', reflecting its broad use beyond machine learning."},
  {type:'code',s:"Concept 2 · Importing & Setup",p:"We must load PennyLane into our script using the instructor's preferred alias.",q:"Write the exact single line of Python code to import PennyLane using the alias `qp`.",guide:"Use the standard Python import statement with the 'as' keyword.",ans:["import pennylane as qp"],e:"This sets up our namespace so all PennyLane functions can be accessed via `qp`."},
  {type:'mcq',s:"Concept 2 · Importing & Setup",p:"It is often useful to check your library version to ensure compatibility with tutorials.",q:"Which function prints out your specific installed version of PennyLane?",o:["`qp.info()`","`qp.about()`","`qp.version()`"],a:1,e:"Calling `qp.about()` prints detailed information about the PennyLane installation and version."},
  {type:'code',s:"Concept 2 · Importing & Setup",p:"Let's verify our setup is working correctly.",q:"Write the single line of Python code to output the PennyLane installation information.",guide:"Call the function on the `qp` namespace that prints about/version info.",ans:["qp.about()"],e:"This function verifies that the library was successfully imported and shows the current version details."},

  /* ── Concept 3: Quantum Functions and Qubits ── */
  {type:'mcq',s:"Concept 3 · Quantum Functions & Qubits",p:"PennyLane is designed to be deeply integrated with Python.",q:"In PennyLane, what fundamental Python structure is used to define a quantum circuit?",o:["A standard Python function (`def`)","A Python Class","A C++ struct"],a:0,e:"A quantum circuit in PennyLane is simply a Python function (often called a quantum function) that contains quantum gates inside."},
  {type:'mcq',s:"Concept 3 · Quantum Functions & Qubits",p:"When defining operations inside your quantum function, you must target specific qubits.",q:"What unique terminology does PennyLane use to refer to qubits?",o:["Nodes","Wires","Registers"],a:1,e:"PennyLane calls qubits 'wires' because they visually resemble horizontal wires in circuit diagrams."},
  {type:'mcq',s:"Concept 3 · Quantum Functions & Qubits",p:"To apply gates, you must index your wires correctly.",q:"If you draw a two-qubit circuit, how are the wires numbered from top to bottom?",o:["Top is 1, bottom is 2","Top is 0, bottom is 1","Top is 1, bottom is 0"],a:1,e:"PennyLane numbers wires from top to bottom starting at 0, mirroring Python's standard zero-based indexing."},
  {type:'mcq',s:"Concept 3 · Quantum Functions & Qubits",p:"We use keyword arguments to direct our gates to the correct qubit.",q:"How do we specify that a gate should apply to the very first wire?",o:["`target=0`","`qubit=0`","`wires=0`"],a:2,e:"The keyword argument `wires` is used in PennyLane to bind a gate operation to a specific qubit index."},
  {type:'code',s:"Concept 3 · Quantum Functions & Qubits",p:"Let's apply our first gate! We want to rotate the state of the first qubit around the X-axis by an angle of 0.1.",q:"Write the single line of code to apply a PennyLane RX gate with an angle of 0.1 to wire 0.",guide:"Use the `qp` alias. The function name is lowercase `rx`. First argument is the angle, then the `wires` keyword.",ans:["qp.rx(0.1, wires=0)","qp.RX(0.1, wires=0)"],e:"The `qp.rx` gate takes the rotation angle as its first parameter and applies the operation to the targeted wire."},
  {type:'mcq',s:"Concept 3 · Quantum Functions & Qubits",p:"Quantum mechanics tells us that small operations yield small state changes. Our qubits always initialize in the 0 state.",q:"What happens physically to the qubit when you apply a very small rotation like RX(0.1)?",o:["It flips entirely to the 1 state.","The state barely rotates, resulting in a very high probability of still measuring 0.","It enters a perfect 50/50 superposition."],a:1,e:"Because the initial state is |0⟩, a tiny angle rotation does not move the state far, leaving the probability of measuring 0 very high."},

  /* ── Concept 4: Multi-Qubit Gates and Measurement ── */
  {type:'mcq',s:"Concept 4 · Multi-Qubit Gates & Measurement",p:"Single-qubit gates are great, but quantum computing requires interaction between qubits to generate entanglement.",q:"Which two-qubit gate does the instructor introduce to operate on multiple wires simultaneously?",o:["The RX gate","The RY gate","The CNOT gate"],a:2,e:"The CNOT gate requires two wires to run, creating a dependency between a control and target qubit."},
  {type:'code',s:"Concept 4 · Multi-Qubit Gates & Measurement",p:"We want to entangle our first two wires.",q:"Write the single line of code to apply a CNOT gate with wire 0 as control and wire 1 as target.",guide:"Use `qp.CNOT`. Pass a square-bracket list `[0, 1]` to the `wires` argument.",ans:["qp.CNOT(wires=[0,1])","qp.CNOT(wires=[0, 1])"],e:"Multi-qubit gates take a list of indices. The first is typically the control, and the second is the target."},
  {type:'mcq',s:"Concept 4 · Multi-Qubit Gates & Measurement",p:"After applying all gates, a quantum circuit requires a specific final step. You cannot 'peek' inside the circuit mid-execution.",q:"What must always be included at the very end of a PennyLane quantum function?",o:["A `print` statement","A quantum measurement return","An infinite loop"],a:1,e:"In quantum computing, information must be extracted via measurement, which serves as the return value of the Python function."},
  {type:'mcq',s:"Concept 4 · Multi-Qubit Gates & Measurement",p:"There are several ways to measure a circuit, but the lecture highlights one that outputs the statistical likelihood of results.",q:"Which measurement function extracts the likelihood of measuring the 0 and 1 states?",o:["`qp.state()`","`qp.probs()`","`qp.counts()`"],a:1,e:"The `qp.probs()` function returns the probability measurement for the basis states."},
  {type:'code',s:"Concept 4 · Multi-Qubit Gates & Measurement",p:"Let's complete our quantum function with the correct return statement.",q:"Write the single line of code to return the basic probability measurement at the end of the circuit.",guide:"Use the `return` keyword followed by `qp.probs()` with no arguments inside.",ans:["return qp.probs()"],e:"Returning `qp.probs()` outputs an array representing the likelihood of observing each possible quantum state."},

  /* ── Concept 5: Circuit Visualization ── */
  {type:'mcq',s:"Concept 5 · Circuit Visualization (Drawing)",p:"Before sending code to a quantum computer, it is highly useful to verify its structure visually.",q:"What PennyLane function utilizes Matplotlib to draw your circuit diagrams?",o:["`qp.draw_mpl`","`qp.show_circuit`","`qp.plot`"],a:0,e:"`qp.draw_mpl` creates a high-quality graphical representation of your quantum function using Matplotlib."},
  {type:'code',s:"Concept 5 · Circuit Visualization (Drawing)",p:"Suppose our defined function is named `circuit` and takes no arguments.",q:"Write the single line of code to draw this circuit using Matplotlib.",guide:"Pass the function name `circuit` to `qp.draw_mpl(...)`, then call the result with empty parentheses `()`.",ans:["qp.draw_mpl(circuit)()"],e:"You pass the quantum function to `draw_mpl`, and then call it with the arguments the circuit expects — in this case, none."},
  {type:'mcq',s:"Concept 5 · Circuit Visualization (Drawing)",p:"By default, the drawing might not show the exact parameters of your rotation gates.",q:"How can you customize the drawing to display the gate angles up to one decimal place?",o:["Set `show_angles=True`","Add `decimals=1` to the draw call","Use `precision=1`"],a:1,e:"Adding `decimals=1` forces the drawer to render the rotation values directly on the circuit diagram."},
  {type:'mcq',s:"Concept 5 · Circuit Visualization (Drawing)",p:"Sometimes, a circuit might have wires initialized that don't immediately have gates applied to them, hiding them from the drawing.",q:"How do you force the drawer to display all wires in the circuit, even empty ones?",o:["Set `show_all_wires=True`","Set `display_empty=True`","Use the `full_system` flag"],a:0,e:"Passing `show_all_wires=True` ensures the full wire register is drawn, including idle qubits."},
  {type:'code',s:"Concept 5 · Circuit Visualization (Drawing)",p:"We want a complete visualization of our `circuit` with all idle wires forced to render.",q:"Write the single line of code to draw `circuit` while showing all wires.",guide:"Pass `circuit` and `show_all_wires=True` to `qp.draw_mpl`, then call the result with `()`.",ans:["qp.draw_mpl(circuit, show_all_wires=True)()"],e:"This configuration gives you a complete overview of the full initialized quantum system, including idle qubits."},

  /* ── Concept 6: Devices ── */
  {type:'mcq',s:"Concept 6 · Devices (The Backends)",p:"A Python function full of gates cannot execute itself. It needs an execution backend.",q:"In PennyLane terminology, what do we call the backend execution environment (hardware or simulator)?",o:["A QPU instance","A device","An executor"],a:1,e:"Backends are called devices, and PennyLane provides a unified `qp.device` interface to instantiate them."},
  {type:'mcq',s:"Concept 6 · Devices (The Backends)",p:"For testing small circuits locally without massive memory overhead, the built-in standard simulator is ideal.",q:"Which device is recommended for beginners and can handle up to 15–20 qubits smoothly?",o:["`lightning.qubit`","`GPU.qubit`","`default.qubit`"],a:2,e:"The `default.qubit` is a lightweight, general-purpose simulator perfect for starting out with PennyLane."},
  {type:'code',s:"Concept 6 · Devices (The Backends)",p:"We need to set up our execution environment before running any circuit.",q:"Write the single line of code to instantiate the standard simulator and assign it to the variable `dev`.",guide:"Use `qp.device(...)` with the string `'default.qubit'` and assign the result to `dev`.",ans:["dev = qp.device('default.qubit')","dev = qp.device(\"default.qubit\")"],e:"This sets up our local CPU-based simulator backend, ready to be linked to a quantum function."},
  {type:'mcq',s:"Concept 6 · Devices (The Backends)",p:"Setting up devices can sometimes require strict parameter definitions, but PennyLane builds in flexibility.",q:"What is unique about how `default.qubit` handles the number of wires if you do not manually specify them?",o:["It automatically reads your circuit to instantiate the exact number of wires you need.","It defaults to an infinite loop.","It crashes your notebook."],a:0,e:"The default simulator can automatically infer and instantiate the needed qubits without requiring the `wires=` argument upfront."},
  {type:'mcq',s:"Concept 6 · Devices (The Backends)",p:"If your workload scales up, you will eventually outgrow the default simulator.",q:"Which high-performance simulator explicitly requires you to define the number of wires during instantiation?",o:["`qiskit.aer`","`lightning.qubit`","`default.qubit`"],a:1,e:"The `lightning.qubit` device is highly optimized but requires you to provide the `wires` argument upon creation."},

  /* ── Concept 7: QNodes ── */
  {type:'mcq',s:"Concept 7 · QNodes (The Glue)",p:"We have a device (`dev`) and a quantum function (`circuit`). They exist separately until we combine them.",q:"What special PennyLane object acts as the 'glue' connecting a quantum function to a device?",o:["A QNode","A TensorNode","A CircuitLink"],a:0,e:"A QNode acts as an encapsulation, directly binding the quantum circuit instructions to the specified backend device."},
  {type:'mcq',s:"Concept 7 · QNodes (The Glue)",p:"There are two valid programming paradigms for constructing a QNode. The manual way treats it like standard object instantiation.",q:"How do you manually instantiate a QNode?",o:["Using the uppercase syntax `qp.QNode(circuit, device)`","Using `circuit.connect(device)`","Using `device.run(circuit)`"],a:0,e:"You can explicitly wrap the circuit and device together using the `qp.QNode` class constructor."},
  {type:'code',s:"Concept 7 · QNodes (The Glue)",p:"Let's practice the manual method of binding our circuit to a device.",q:"Write the single line of code to manually create a QNode named `qnode1` using `circuit` and `dev`.",guide:"Use `qp.QNode(...)` with a capital Q and N. Pass `circuit` first, then `dev`.",ans:["qnode1 = qp.QNode(circuit, dev)"],e:"This passes the function and backend into the constructor, creating an executable object that is ready to run."},
  {type:'mcq',s:"Concept 7 · QNodes (The Glue)",p:"While manual creation works, Python offers a cleaner syntax that the instructor identifies as the 'preferred way'.",q:"Which Python syntax is heavily preferred for converting a function directly into a QNode?",o:["A lambda wrapper","A Python decorator (`@qp.qnode`)","Class inheritance"],a:1,e:"Decorators are placed directly above the function definition to automatically modify the function into a QNode bound to the provided device."},
  {type:'code',s:"Concept 7 · QNodes (The Glue)",p:"We are about to define a new `def circuit():` and want to bind it to `dev` immediately using the cleaner Pythonic approach.",q:"Write the single decorator line that goes right above the function definition.",guide:"Use `@` followed by `qp.qnode` (lowercase) and pass `dev` as the argument.",ans:["@qp.qnode(dev)"],e:"Adding this decorator tells PennyLane that the function below should always execute on the specified device when called."},
  {type:'mcq',s:"Concept 7 · QNodes (The Glue)",p:"Understanding modularity in PennyLane is crucial for writing clean code.",q:"Can a single pure Python quantum function be reused across multiple different QNodes attached to different devices?",o:["True — a function can act as a template for multiple different QNode instances.","False — each function is permanently locked to one device."],a:0,e:"A single quantum function can act as a template. You can pass it into different `qp.QNode` instances attached to different hardware or simulators."},
  {type:'mcq',s:"Concept 7 · QNodes (The Glue)",p:"Once a function is decorated with `@qp.qnode(dev)`, its behavior changes fundamentally.",q:"What happens when you directly call a decorated QNode function in Python (e.g., `circuit()`)?",o:["It merely prints the circuit diagram.","It automatically compiles, runs on the device, and returns the measurement results.","It saves the circuit to a file."],a:1,e:"The QNode abstracts away the execution. Calling it executes the operations on the backend and returns the defined measurement."},
  {type:'mcq',s:"Concept 7 · QNodes (The Glue)",p:"Static circuits have limited use. We often want dynamic circuits controlled by classical parameters.",q:"If your quantum function takes arguments like `def circuit(x, y):`, how do you pass those values when executing the QNode?",o:["`circuit.run(x, y)`","You supply them exactly as you would a standard Python function: `circuit(x, y)`","You cannot pass classical arguments to a QNode."],a:1,e:"Because QNodes seamlessly integrate with Python, you just pass your parameters inside the parentheses of the function call."},
  {type:'code',s:"Concept 7 · QNodes (The Glue)",p:"Our `circuit` is a QNode requiring two rotational angles — one for RX and one for RY.",q:"Write the single line of code to execute the circuit with angles 0.1 and 0.2.",guide:"Call `circuit(...)` like a regular Python function, passing `0.1` and `0.2` as positional arguments.",ans:["circuit(0.1, 0.2)"],e:"This triggers the backend to apply `RX(0.1)` and `RY(0.2)` respectively and measures the output."},
  {type:'mcq',s:"Concept 7 · QNodes (The Glue)",p:"After running the circuit, you receive your results.",q:"If you ran a single-qubit circuit returning `qp.probs()`, what format will the returned result take?",o:["A single string containing '0'","A numerical array showing the likelihood of measuring 0 and the likelihood of measuring 1","A complex matrix"],a:1,e:"The probability measurement returns an array containing the distinct probabilities of all computational basis states."},

  /* ── Concept 8: Templates and Data Embedding ── */
  {type:'mcq',s:"Concept 8 · Templates & Data Embedding",p:"Manually writing individual gates for deep algorithms can become extremely tedious.",q:"What built-in feature does PennyLane provide to automatically construct larger, predefined blocks of gates?",o:["Templates","Macros","Auto-Builders"],a:0,e:"Templates are ready-to-use functions that generate common quantum circuit structures, such as optimization layers or data embeddings."},
  {type:'mcq',s:"Concept 8 · Templates & Data Embedding",p:"A major challenge in Quantum Machine Learning is putting classical data into the quantum system.",q:"Which specific template does the instructor use to map binary classical data into quantum states?",o:["QAOA Embedding","Amplitude Embedding","Basis Embedding"],a:2,e:"Basis embedding directly converts a list of binary features into the corresponding computational basis state on the qubits."},
  {type:'code',s:"Concept 8 · Templates & Data Embedding",p:"We need to encode the classical binary data [1, 1, 0] into our circuit.",q:"Write the single line of code to embed these features across wires 0, 1, and 2 using the Basis Embedding template.",guide:"Use `qp.BasisEmbedding(...)`. Pass `[1,1,0]` as the first argument, then `wires=[0,1,2]`.",ans:["qp.BasisEmbedding([1,1,0], wires=[0,1,2])","qp.BasisEmbedding([1, 1, 0], wires=[0, 1, 2])","qp.basis_embedding([1,1,0], wires=[0,1,2])","qp.basis_embedding([1, 1, 0], wires=[0, 1, 2])"],e:"The template applies the necessary X-gates to initialize the qubits into the correct state to represent the binary data."},
  {type:'mcq',s:"Concept 8 · Templates & Data Embedding",p:"Templates act as black boxes, making the code clean but hiding the internal mechanics.",q:"What tool allows you to break down a template into its individual constituent operations to see what is happening underneath?",o:["A decompose transform","A reverse template","The `.breakdown()` function"],a:0,e:"The `qp.transforms.decompose` function converts high-level templates into standard basic gates, revealing the underlying operations."},
  {type:'mcq',s:"Concept 8 · Templates & Data Embedding",p:"If you apply a decompose transform to the BasisEmbedding of the data [1, 1, 0], you can see the true physical operations.",q:"What specific operations does the drawing reveal on the first two wires to create the [1, 1, 0] state?",o:["Two Hadamard gates","Two Pauli-X gates","Zero operations"],a:1,e:"To flip the initial |0⟩ states to |1⟩ on the first two wires, the embedding inherently applies an X (NOT) gate to each of those wires."},

  /* ── Concept 9: Design Philosophy ── */
  {type:'mcq',s:"Concept 9 · The Power of PennyLane's Design",p:"True full-stack computing requires classical and quantum systems to work together smoothly.",q:"Is a PennyLane quantum function limited strictly to quantum operations?",o:["Yes, you cannot include standard classical math inside a quantum function.","No, it can validly contain both classical processing and quantum gates."],a:1,e:"A QNode circuit can safely merge quantum gates and classical processing together, offering immense flexibility for hybrid algorithm design."},
  {type:'mcq',s:"Concept 9 · The Power of PennyLane's Design",p:"Developers often wonder how PennyLane compares to other libraries like Qiskit.",q:"How does the instructor characterize the relationship between PennyLane and Qiskit?",o:["They are complementary — Qiskit was built for IBM hardware while PennyLane was built to be hardware-agnostic.","They are competitors that fundamentally cannot be used together.","PennyLane is solely a subset of Qiskit."],a:0,e:"The platforms complement each other. PennyLane brings deep integration with machine learning and multiple hardware vendors, while Qiskit excels in its native IBM ecosystem."},
  {type:'mcq',s:"Concept 9 · The Power of PennyLane's Design",p:"Understanding when to utilize quantum computing is critical for scientific validity.",q:"Does the instructor suggest that quantum computation is strictly better for all computing problems?",o:["Yes, quantum will completely replace classical computation.","No, quantum acts as a complement for specific applications, and fair classical comparisons must always be made."],a:1,e:"Quantum isn't better for everything. Finding the precise domain where quantum models outshine classical counterparts is a core aspect of current research."},

  /* ── Concept 10: Learning Resources ── */
  {type:'mcq',s:"Concept 10 · Learning Ecosystem & Resources",p:"Once you grasp these fundamentals, it is time to dig deeper on your own.",q:"Which resource does the instructor name as their 'favorite learning resource' that contains interactive theory and practice challenges?",o:["The PennyLane Forum","The PennyLane Codebook","The Xanadu Github"],a:1,e:"The Codebook offers a structured, interactive journey moving seamlessly from pure quantum theory to coding execution."},
  {type:'mcq',s:"Concept 10 · Learning Ecosystem & Resources",p:"Learning quantum programming is a massive journey, and community support is vital.",q:"Where does the instructor invite students to go to ask questions and discuss PennyLane algorithms?",o:["The PennyLane Discussion Forum","Directly messaging Xanadu's CEO","Stack Overflow exclusively"],a:0,e:"The PennyLane discussion forum is heavily moderated by community managers and developers, making it the best place to find expert assistance."},
];

/* ── STATE ── */
let qi=0, step='intro', score=0, answered=0;
const slot=document.getElementById('slot'),
      fill=document.getElementById('prog-fill'),
      barLbl=document.getElementById('bar-label'),
      scorEl=document.getElementById('score-tag');

function updateBar(){
  fill.style.width=(answered/50*100)+'%';
  scorEl.textContent=score+' / 50';
  barLbl.textContent=step==='intro'?'PennyLane Intro':step==='summary'?'Complete':`Q${qi+1} of 50`;
}
function swap(fn){
  const cur=slot.firstChild;
  if(cur){cur.classList.add('out');setTimeout(()=>{slot.innerHTML='';fn();},220);}
  else fn();
}

/* ── NORMALIZE code answers ── */
function normalizeCode(s){
  return s.trim().replace(/\s+/g,' ').replace(/"/g,"'");
}
function checkCode(input, acceptable){
  const norm=normalizeCode(input);
  return acceptable.some(a=>normalizeCode(a)===norm);
}

/* ── INTRO ── */
function showIntro(){
  step='intro';updateBar();
  const d=document.createElement('div');d.className='intro';
  d.innerHTML=`
    <div class="intro-tag">Module 09 · 50 Questions</div>
    <h1>Intro to Quantum Programming<br>with <em>PennyLane</em></h1>
    <p>From installation and imports through devices, QNodes, templates, and data embedding. Includes live code-input questions — type real Python to score!</p>
    <div class="intro-legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--gold)"></div>Multiple Choice</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--blue)"></div>Code Input — type a line of Python</div>
    </div>
    <div class="btn-row" style="justify-content:center">
      <button class="btn" onclick="startQuiz()">Begin <span class="arr">→</span></button>
    </div>`;
  slot.appendChild(d);
}
function startQuiz(){qi=0;score=0;answered=0;swap(()=>showPreview());}

/* ── PREVIEW ── */
function showPreview(){
  step='preview';updateBar();
  const item=data[qi];
  const d=document.createElement('div');d.className='card';
  const typeBadge=item.type==='code'
    ?`<span class="code-badge">✎ Code Input</span><br>`:'';
  d.innerHTML=`
    <div class="card-header">
      <span class="dot preview-dot"></span>
      <span class="card-kind preview-kind">Preview</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    <div class="section-label">${item.s}</div>
    ${typeBadge}
    <div class="preview-body">${item.p}</div>
    <div class="btn-row"><button class="btn" onclick="swap(showQuestion)">Question <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}

/* ── QUESTION ── */
function showQuestion(){
  step='question';updateBar();
  const item=data[qi];
  const d=document.createElement('div');d.className='card';
  if(item.type==='mcq'){
    const optHtml=item.o.map((o,oi)=>`
      <button class="option" onclick="pickMCQ(${oi})">
        <span class="opt-letter">${L[oi]}</span><span>${o}</span>
      </button>`).join('');
    d.innerHTML=`
      <div class="card-header">
        <span class="dot question-dot"></span>
        <span class="card-kind question-kind">Question ${qi+1} of 50</span>
      </div>
      <div class="question-body">${item.q}</div>
      <div class="options">${optHtml}</div>`;
  } else {
    d.innerHTML=`
      <div class="card-header">
        <span class="dot code-dot"></span>
        <span class="card-kind code-kind">Code Input — Q${qi+1} of 50</span>
      </div>
      <div class="question-body">${item.q}</div>
      <div class="code-guide"><strong>// Guide</strong>${item.guide}</div>
      <div class="code-input-wrap">
        <textarea class="code-input" id="code-in" rows="1" placeholder="Type your Python here…" spellcheck="false" autocorrect="off" autocapitalize="off"></textarea>
      </div>
      <button class="check-btn" id="check-btn" onclick="checkAnswer()">Check →</button>
      <div class="code-feedback" id="code-fb"></div>
      <div class="code-answer-reveal" id="code-reveal"></div>`;
    setTimeout(()=>{
      const ta=document.getElementById('code-in');
      if(ta){
        ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();checkAnswer();}});
        ta.focus();
      }
    },50);
  }
  slot.appendChild(d);
}

/* ── MCQ answer ── */
function pickMCQ(oi){
  const item=data[qi];
  document.querySelectorAll('.option').forEach(b=>b.disabled=true);
  const correct=item.a;
  document.querySelectorAll('.option')[correct].classList.add(oi===correct?'opt-correct':'opt-reveal');
  if(oi!==correct) document.querySelectorAll('.option')[oi].classList.add('opt-wrong');
  setTimeout(()=>swap(()=>showResult('mcq', oi===correct, item.o[oi], oi===correct?null:item.o[item.a])),480);
}

/* ── Code check ── */
let codeChecked=false;
let codeCorrect=false;
function checkAnswer(){
  if(codeChecked) return;
  const ta=document.getElementById('code-in');
  const btn=document.getElementById('check-btn');
  const fb=document.getElementById('code-fb');
  const rev=document.getElementById('code-reveal');
  const item=data[qi];
  const val=ta.value;
  const ok=checkCode(val.trim(),item.ans.trim()?item.ans:[]);
  codeChecked=true;
  codeCorrect=ok;
  btn.disabled=true;
  ta.classList.add(ok?'input-correct':'input-wrong');
  fb.textContent=ok?'✓ Correct!' :'✗ Not quite.';
  fb.className=`code-feedback show ${ok?'fb-correct':'fb-wrong'}`;
  if(!ok){
    rev.innerHTML=`Correct answer: <span>${escHtml(item.ans[0])}</span>`;
    rev.className='code-answer-reveal show';
  }
  setTimeout(()=>swap(()=>showResult('code', ok, val, ok?null:item.ans[0])),700);
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

/* ── RESULT ── */
function showResult(mode, ok, chosenStr, correctStr){
  const item=data[qi];
  if(ok) score++;
  answered++;
  step='result';
  updateBar();
  const d=document.createElement('div');d.className='card';
  const dotCls=ok?'result-dot-correct':'result-dot-wrong';
  const kindCls=ok?'result-kind-correct':'result-kind-wrong';

  let rowsHtml='';
  if(mode==='mcq'){
    rowsHtml=`<div class="chosen-row ${ok?'correct':'wrong'}"><span class="row-icon">${ok?'✓':'✗'}</span><span>${chosenStr}</span></div>`;
    if(!ok) rowsHtml+=`<div class="chosen-row reveal"><span class="row-icon">✓</span><span><strong>Correct:</strong> ${correctStr}</span></div>`;
  } else {
    rowsHtml=`<div class="code-block">${escHtml(chosenStr||'(no input)')}</div>`;
    if(!ok) rowsHtml+=`<div style="margin-bottom:8px;font-family:var(--mono);font-size:.78rem;color:var(--text-dim)">Correct answer:</div><div class="code-block" style="border-color:rgba(57,224,122,.35);color:var(--green)">${escHtml(correctStr)}</div>`;
  }
  const isLast=qi===49;
  d.innerHTML=`
    <div class="card-header">
      <span class="dot ${dotCls}"></span>
      <span class="card-kind ${kindCls}">${ok?'Correct!':'Incorrect'}</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    ${rowsHtml}
    <div class="exp-wrap">
      <div class="exp-label">Explanation</div>
      <div class="exp-text">${item.e}</div>
    </div>
    <div class="btn-row"><button class="btn" onclick="advance()">${isLast?'See Results':'Next'} <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}

function advance(){
  codeChecked=false; codeCorrect=false;
  if(qi===49){swap(showSummary);return;}
  qi++;swap(showPreview);
}

/* ── SUMMARY ── */
function showSummary(){
  step='summary';updateBar();
  const pct=Math.round(score/50*100);
  const msgs=[
    [80,"Outstanding. You can install, import, build circuits, attach devices, decorate QNodes, embed data, and visualize — the full PennyLane workflow is yours."],
    [60,"Excellent. The core loop of quantum function → device → QNode → measurement is solid. Revisit the code-input questions and the Templates section on your next pass."],
    [40,"Good progress. Focus on Concepts 6–8 — devices, QNodes, and templates are the architectural pillars of every PennyLane program."],
    [20,"A solid start. Return to the beginning and trace each concept carefully — from `!pip install` to `qp.draw_mpl`, the chain is logical and tight."],
    [-1,"PennyLane is a rich library. Work through each concept one at a time and type out every code snippet — muscle memory is the best teacher here."]
  ];
  const msg=msgs.find(([t])=>pct>t)[1];
  const d=document.createElement('div');d.className='summary';
  d.innerHTML=`
    <div class="sum-tag">Module 09 Complete · Intro to PennyLane</div>
    <div class="sum-score">${score}<span>/50</span></div>
    <div class="sum-pct">${pct}% correct</div>
    <div class="sum-msg">${msg}</div>
    <div class="sum-btns">
      <a class="btn-home" href="index.html">← All Modules</a>
      <button class="btn-reset" onclick="restart()">↺ Retake</button>
    </div>`;
  slot.appendChild(d);
}
function restart(){codeChecked=false;codeCorrect=false;swap(showIntro);}

showIntro();
</script>
