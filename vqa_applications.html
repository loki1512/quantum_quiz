<!DOCTYPE html>
<html lang="en">
<head>

<title>VQA & Quantum Optimization — Quantum Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050a12; --surface: #0a1525; --border: #1a3050;
    --accent: #39e07a; --accent-dim: #16a34a; --gold: #f0c040;
    --green: #39e07a; --red: #ff5566;
    --text: #c8dff0; --text-dim: #6a8aaa; --text-bright: #e8f4ff;
    --mono: 'Space Mono', monospace; --serif: 'Crimson Pro', Georgia, serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background:var(--bg); color:var(--text); font-family:var(--serif); font-size:18px; line-height:1.7; min-height:100vh; overflow-x:hidden; display:flex; flex-direction:column; align-items:center; }

  .bg-grid { position:fixed; inset:0; z-index:0; background-image:linear-gradient(rgba(57,224,122,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(57,224,122,.02) 1px,transparent 1px); background-size:60px 60px; pointer-events:none; }
  .bg-glow { position:fixed; z-index:0; pointer-events:none; border-radius:50%; filter:blur(130px); }
  .bg-glow-1 { width:700px; height:700px; background:radial-gradient(circle,rgba(20,120,60,.13),transparent 70%); top:-250px; left:-250px; }
  .bg-glow-2 { width:500px; height:500px; background:radial-gradient(circle,rgba(57,224,122,.06),transparent 70%); bottom:0; right:-150px; animation:bgPulse 9s ease-in-out infinite alternate; }
  @keyframes bgPulse { from{opacity:.5}to{opacity:1} }

  /* TOP BAR */
  .topbar { position:fixed; top:0; left:0; right:0; z-index:100; background:rgba(5,10,18,.92); backdrop-filter:blur(10px); border-bottom:1px solid var(--border); padding:11px 28px; display:flex; align-items:center; gap:16px; }
  .home-btn { font-family:var(--mono); font-size:10px; letter-spacing:.12em; text-transform:uppercase; color:var(--text-dim); text-decoration:none; padding:4px 10px; border:1px solid var(--border); border-radius:2px; white-space:nowrap; transition:all .15s; flex-shrink:0; }
  .home-btn:hover { color:var(--accent); border-color:rgba(57,224,122,.35); }
  .bar-label { font-family:var(--mono); font-size:10px; color:var(--accent); letter-spacing:.15em; text-transform:uppercase; white-space:nowrap; min-width:100px; }
  .progress-track { flex:1; height:2px; background:var(--border); border-radius:2px; overflow:hidden; }
  .progress-fill { height:100%; width:0%; background:linear-gradient(90deg,var(--accent-dim),var(--accent)); transition:width .5s cubic-bezier(.4,0,.2,1); box-shadow:0 0 8px var(--accent); }
  .score-tag { font-family:var(--mono); font-size:10px; color:var(--gold); white-space:nowrap; min-width:55px; text-align:right; }

  /* STAGE */
  .stage { position:relative; z-index:1; width:100%; max-width:660px; padding:110px 24px 60px; min-height:100vh; display:flex; flex-direction:column; justify-content:center; }

  /* CARD */
  .card { background:var(--surface); border:1px solid var(--border); border-radius:6px; padding:36px 36px 28px; animation:cardIn .32s cubic-bezier(.4,0,.2,1); }
  @keyframes cardIn { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
  .card.out { animation:cardOut .22s cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes cardOut { to{opacity:0;transform:translateY(-14px)} }

  /* CARD HEADER */
  .card-header { display:flex; align-items:center; gap:10px; margin-bottom:22px; }
  .dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }
  .card-kind { font-family:var(--mono); font-size:10px; letter-spacing:.18em; text-transform:uppercase; }
  .card-num { font-family:var(--mono); font-size:10px; color:var(--text-dim); margin-left:auto; }

  /* PREVIEW */
  .preview-dot  { background:var(--accent); box-shadow:0 0 8px var(--accent); }
  .preview-kind { color:var(--accent); }
  .preview-body { font-family:var(--serif); font-size:1.08rem; font-style:italic; color:var(--text); line-height:1.75; margin-bottom:28px; }

  /* SECTION LABEL */
  .section-label { font-family:var(--mono); font-size:9px; letter-spacing:.18em; text-transform:uppercase; color:var(--accent); opacity:.6; margin-bottom:10px; }

  /* QUESTION */
  .question-dot  { background:var(--gold); box-shadow:0 0 8px var(--gold); }
  .question-kind { color:var(--gold); }
  .question-body { font-family:var(--serif); font-size:1.1rem; color:var(--text-bright); line-height:1.65; margin-bottom:22px; }

  /* OPTIONS */
  .options { display:flex; flex-direction:column; gap:9px; margin-bottom:6px; }
  .option { display:flex; align-items:flex-start; gap:12px; padding:13px 16px; border:1px solid var(--border); border-radius:4px; cursor:pointer; background:transparent; color:var(--text); font-family:var(--serif); font-size:.97rem; text-align:left; line-height:1.5; width:100%; transition:border-color .14s,background .14s,color .14s; }
  .option:hover:not(:disabled) { border-color:rgba(57,224,122,.5); background:rgba(57,224,122,.05); color:var(--text-bright); }
  .option:disabled { cursor:default; }
  .opt-letter { font-family:var(--mono); font-size:10px; color:var(--text-dim); border:1px solid var(--border); border-radius:2px; padding:2px 7px; flex-shrink:0; margin-top:2px; transition:all .14s; }
  .option:hover:not(:disabled) .opt-letter { border-color:var(--accent); color:var(--accent); }
  .option.opt-correct { border-color:var(--green); background:rgba(57,224,122,.09); color:var(--text-bright); }
  .option.opt-correct .opt-letter { border-color:var(--green); color:var(--green); background:rgba(57,224,122,.15); }
  .option.opt-wrong { border-color:var(--red); background:rgba(255,85,102,.09); color:var(--text-bright); }
  .option.opt-wrong .opt-letter { border-color:var(--red); color:var(--red); background:rgba(255,85,102,.15); }
  .option.opt-reveal { border-color:rgba(57,224,122,.4); background:rgba(57,224,122,.04); }
  .option.opt-reveal .opt-letter { border-color:var(--green); color:var(--green); }

  /* RESULT */
  .result-dot-correct { background:var(--green); box-shadow:0 0 8px var(--green); }
  .result-dot-wrong   { background:var(--red);   box-shadow:0 0 8px var(--red); }
  .result-kind-correct{ color:var(--green); }
  .result-kind-wrong  { color:var(--red); }
  .chosen-row { display:flex; align-items:flex-start; gap:12px; padding:13px 16px; border-radius:4px; border:1px solid; margin-bottom:12px; font-family:var(--serif); font-size:.97rem; line-height:1.5; }
  .chosen-row.correct { border-color:var(--green); background:rgba(57,224,122,.08); color:var(--text-bright); }
  .chosen-row.wrong   { border-color:var(--red);   background:rgba(255,85,102,.08); color:var(--text-bright); }
  .chosen-row.reveal  { border-color:rgba(57,224,122,.4); background:rgba(57,224,122,.05); color:var(--text-bright); }
  .row-icon { flex-shrink:0; font-size:.95rem; margin-top:1px; }
  .exp-wrap { margin-top:18px; padding-top:18px; border-top:1px solid var(--border); }
  .exp-label { font-family:var(--mono); font-size:10px; letter-spacing:.15em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .exp-label::before { content:'⚡'; }
  .exp-text { font-size:.93rem; color:var(--text); font-style:italic; line-height:1.65; }

  /* BUTTON */
  .btn-row { display:flex; justify-content:flex-end; margin-top:26px; }
  .btn { font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; padding:11px 24px; border:1px solid var(--accent); background:transparent; color:var(--accent); border-radius:3px; cursor:pointer; transition:all .18s; display:flex; align-items:center; gap:8px; }
  .btn:hover { background:var(--accent); color:var(--bg); box-shadow:0 0 20px rgba(57,224,122,.35); }
  .btn .arr { transition:transform .18s; }
  .btn:hover .arr { transform:translateX(4px); }

  /* INTRO */
  .intro { text-align:center; animation:cardIn .35s ease; }
  .intro-tag { font-family:var(--mono); font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:20px; display:flex; align-items:center; justify-content:center; gap:12px; }
  .intro-tag::before,.intro-tag::after { content:''; display:block; width:28px; height:1px; background:var(--accent); }
  .intro h1 { font-family:var(--serif); font-weight:300; font-size:clamp(1.9rem,5vw,3rem); color:var(--text-bright); line-height:1.2; margin-bottom:14px; letter-spacing:-.01em; }
  .intro h1 em { color:var(--accent); font-style:normal; font-weight:600; }
  .intro p { font-size:.9rem; color:var(--text-dim); font-family:var(--mono); margin-bottom:36px; line-height:1.7; max-width:420px; margin-left:auto; margin-right:auto; }

  /* SUMMARY */
  .summary { text-align:center; animation:cardIn .4s ease; }
  .sum-tag { font-family:var(--mono); font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:20px; }
  .sum-score { font-family:var(--serif); font-weight:300; font-size:clamp(3.5rem,12vw,5.5rem); color:var(--text-bright); line-height:1; margin-bottom:6px; }
  .sum-score span { color:var(--accent); }
  .sum-pct { font-family:var(--mono); font-size:11px; color:var(--text-dim); margin-bottom:28px; }
  .sum-msg { font-size:1.03rem; font-style:italic; color:var(--text); line-height:1.7; max-width:440px; margin:0 auto 36px; }
  .sum-btns { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .btn-reset { font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; padding:12px 28px; border:1px solid var(--accent); background:transparent; color:var(--accent); border-radius:3px; cursor:pointer; transition:all .2s; }
  .btn-reset:hover { background:var(--accent); color:var(--bg); box-shadow:0 0 20px rgba(57,224,122,.35); }
  .btn-home { font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; padding:12px 28px; border:1px solid var(--border); background:transparent; color:var(--text-dim); border-radius:3px; cursor:pointer; transition:all .2s; text-decoration:none; display:inline-block; }
  .btn-home:hover { border-color:var(--text-dim); color:var(--text); }
</style>
</head>

<script>
const L = ['A','B','C','D'];
const data = [
  /* ── MODULE 1: Foundations of VQAs ── */
  {s:"Module 1 · Foundations of Variational Quantum Algorithms",p:"A Variational Quantum Algorithm (VQA) relies on a specific type of quantum circuit to function. Understanding this circuit is the starting point for everything that follows.",q:"What is the core characteristic of the quantum circuit used in a VQA?",o:["It uses only fixed, non-adjustable quantum logic gates.","It is a parameterized circuit featuring gates dependent on adjustable parameters (e.g., theta).","It requires continuous error correction to function.","It relies entirely on classical logic gates operating on qubits."],a:1,e:"VQAs are built upon parameterized quantum circuits where quantum gates act on qubits based on parameters that can be adjusted."},
  {s:"Module 1 · Foundations of Variational Quantum Algorithms",p:"The VQA operates using a hybrid quantum-classical loop. The quantum device prepares states and measures outcomes; then the baton is passed to a classical machine.",q:"After executing the parameterized circuit and measuring the outcome, what role does the classical computer play?",o:["It recalculates the superposition of the qubits.","It calculates a cost function and updates the parameters using a classical optimizer.","It freezes the parameters to prevent decoherence.","It runs a classical algorithm to solve the entire problem from scratch."],a:1,e:"The measured outcome is used to calculate a cost function, which a classical optimizer then uses to update the circuit's parameters for the next iteration."},
  {s:"Module 1 · Foundations of Variational Quantum Algorithms",p:"There are different types of VQAs. One focuses on estimating expectation values with significant freedom in its ansatz — the template of quantum operations used.",q:"Which VQA tries to solve for the expectation value of a quantum circuit based on a Hamiltonian with vast freedom in choosing its unitary operations?",o:["Quantum Approximate Optimization Algorithm (QAOA)","Grover's Algorithm","Variational Quantum Eigensolver (VQE)","Shor's Algorithm"],a:2,e:"The VQE specifically tries to solve for the expectation value of a Hamiltonian and allows vast freedom in choosing the ansatz (the unitary operations built into the circuit)."},
  {s:"Module 1 · Foundations of Variational Quantum Algorithms",p:"Another highly prominent VQA is the Quantum Approximate Optimization Algorithm (QAOA), which has a more rigid structure than VQE.",q:"What two specific blocks are repetitively alternated in the QAOA circuit?",o:["A measurement block and an initialization block.","A cost Hamiltonian block and a mixer Hamiltonian block.","An error-correction block and a parameter-update block.","A slack variable block and a penalty block."],a:1,e:"QAOA consists of a cost Hamiltonian (dependent on parameter gamma) and a mixer Hamiltonian (dependent on parameter beta) inserted alternately into the circuit."},
  {s:"Module 1 · Foundations of Variational Quantum Algorithms",p:"The structure of QAOA has roots in another major quantum computing paradigm — one that uses a slow, continuous evolution toward a ground state.",q:"QAOA is considered a discretized or \"trotterized\" version of which quantum approach?",o:["Quantum Annealing","Quantum Key Distribution","Quantum Teleportation","Fault-Tolerant Error Correction"],a:0,e:"QAOA bears a close resemblance to quantum annealing and is essentially a trotterized (discretized) version of the continuous quantum annealing process."},

  /* ── MODULE 2: The Energy Industry Context ── */
  {s:"Module 2 · The Energy Industry Context",p:"To apply quantum optimization, we look to the energy sector. It is defined by high stakes, rapid changes, and enormous financial consequences for every suboptimal decision.",q:"Which of the following is a defining characteristic of the energy industry that demands fast and optimal problem-solving?",o:["High tolerance for grid disruptions.","Static, perfectly predictable customer demand.","It is heavily cost-intense and highly dynamic and fast-paced.","Energy production costs are virtually zero."],a:2,e:"The industry is fast-paced, highly cost-intense, and sensitive to costs, meaning faster and better decisions save vast amounts of money."},
  {s:"Module 2 · The Energy Industry Context",p:"Predicting exactly when consumers will use electricity is a major hurdle for grid operators, who must match supply to demand in real time.",q:"How does uncertainty specifically impact energy production planning?",o:["Power plants produce at maximum capacity constantly, making demand irrelevant.","Dynamic demand shifts (e.g., users turning on ovens early) require continuous, real-time adjustments.","It solely affects the lifespan of solar panels.","It eliminates the need for transmission planning."],a:1,e:"Dynamic, unpredictable demand means operators must constantly adjust plans to ensure supply perfectly matches reality."},
  {s:"Module 2 · The Energy Industry Context",p:"Energy companies face limits with current computational approaches. The problems are growing faster than classical hardware can keep up.",q:"Can classical algorithms easily and completely satisfy the optimization needs of the modern energy industry?",o:["Yes, they solve all problems instantaneously.","No, the need for faster, higher-quality solutions is bringing classical approaches to their limits.","Yes, because optimization problems in energy scale linearly.","No, classical algorithms are strictly prohibited by grid regulators."],a:1,e:"While classical algorithms are used, the demand for increasingly optimal and rapid decisions is pushing them to their absolute computational limits."},
  {s:"Module 2 · The Energy Industry Context",p:"Different optimization problems exist across the energy sector. One ensures energy moves safely from generation to consumer across the physical grid.",q:"Which energy problem focuses on ensuring valid power flow without overloading transmission lines?",o:["Demand Prediction","Production Planning","Market Sizing","Transmission Planning"],a:3,e:"Transmission planning deals with the energy grid, checking power flow, and preventing grid overload or disruptions."},
  {s:"Module 2 · The Energy Industry Context",p:"Today's lecture focuses on production planning — deciding how to generate power over time. This has a formal industry name.",q:"What is the specific industry name for the production planning problem where we schedule power plants to meet future demand?",o:["The Redispatch Problem","The Quantum Approximator","The Unit Commitment Problem (UCP)","The Slack Allocation Problem"],a:2,e:"The task of planning electricity production over discretized future time steps to satisfy demand at optimal cost is known as the Unit Commitment Problem (UCP)."},

  /* ── MODULE 3: Anatomy of the UCP ── */
  {s:"Module 3 · Anatomy of the Unit Commitment Problem",p:"The UCP requires managing various types of power plants, each with distinct characteristics. Not all plants can be switched on and off freely.",q:"Which class of power units typically features complex operational constraints like \"minimum running times\"?",o:["Solar panels","Wind turbines","Thermal units (coal, gas, nuclear)","Battery storage only"],a:2,e:"Thermal units like coal, nuclear, and gas have specific constraints; if you turn them on, they must stay on for a minimum amount of time to avoid causing havoc."},
  {s:"Module 3 · Anatomy of the Unit Commitment Problem",p:"Power plants cannot generate infinite electricity. Each one operates within hard physical limits.",q:"What technical property dictates the absolute limits of energy a single plant can output?",o:["Ramping constraints","Production capacities (minimum and maximum)","Spin interactions","Demand forecasting"],a:1,e:"Every power plant has a maximum amount of energy it can produce, and thermal units also have a lower capacity — a minimum amount they must produce if turned on."},
  {s:"Module 3 · Anatomy of the Unit Commitment Problem",p:"Changing the energy output of a plant abruptly can damage turbines and other equipment. Gradual changes are required.",q:"What constraint limits how quickly a power plant can increase or decrease its energy production?",o:["Minimum Idle Time","Lower Capacity Limit","Ramping Constraints","Slack Optimization"],a:2,e:"Ramping constraints dictate that a plant can only gradually increase or decrease the energy it produces over time."},
  {s:"Module 3 · Anatomy of the Unit Commitment Problem",p:"In our simplified lecture model, we ignore certain real-world factors to make the math tractable for quantum mapping.",q:"Which constraints are explicitly ignored in our simplified UCP model?",o:["Linear cost models and minimum uptimes.","Production capacities and starting costs.","Ramping constraints and the electricity grid/transmission.","Demand satisfaction and fixed prices."],a:2,e:"To simplify the mathematical model, we abstain from using ramping constraints and the physical constraints of the electricity grid."},
  {s:"Module 3 · Anatomy of the Unit Commitment Problem",p:"To formulate the UCP mathematically, we use specific decision variables. The first describes whether a plant is on or off.",q:"What type of variable is the `on` variable (on_{t,i}), which describes the status of a power plant?",o:["Continuous (any value between 0 and 1)","Binary (exactly 1 if producing energy, 0 otherwise)","Integer (any whole number representing MW output)","Logarithmic"],a:1,e:"The `on` variable is a binary variable representing the status of the plant: 1 if it is on and producing energy, and 0 if it is off."},

  /* ── MODULE 4: Mathematical Formulation ── */
  {s:"Module 4 · Mathematical Formulation of the UCP",p:"We must track when a plant is physically fired up to account for operational wear and startup costs.",q:"What is the purpose of the `start` decision variable?",o:["It measures the MW output during the first hour.","It is a continuous variable showing fuel consumption.","It is a binary variable that is 1 if the plant is turned on at that specific time step, and 0 otherwise.","It tracks the time remaining before a plant must shut down."],a:2,e:"The `start` variable characterizes the time step a plant is turned on, registering as 1 at that specific step and 0 otherwise."},
  {s:"Module 4 · Mathematical Formulation of the UCP",p:"While `on` and `start` track operational state, we must also track the physical electricity produced by each plant.",q:"What type of variable is the `gen` variable, which tracks the generated energy?",o:["Continuous","Binary","Slack","Ising spin"],a:0,e:"The generation variable (`gen`) provides the amount of energy produced and is a continuous variable that can take arbitrary values between plant capacities."},
  {s:"Module 4 · Mathematical Formulation of the UCP",p:"Every optimization problem has an objective to minimize or maximize. For the UCP, we want to minimize total costs.",q:"In our simplified UCP model, what makes up the linear objective function that we want to minimize?",o:["Variable generation costs plus fixed starting costs.","Only the fixed starting costs.","Ramping penalties and grid maintenance costs.","The difference between supply and demand."],a:0,e:"The objective function is linear and minimizes the variable cost of producing electricity plus the fixed price incurred every time a plant is started."},
  {s:"Module 4 · Mathematical Formulation of the UCP",p:"The central physical requirement of the energy grid is supply matching demand — not too much, not too little.",q:"How is the demand constraint modeled mathematically?",o:["Generation must be less than demand.","Total generation across all plants must equal the demand exactly for each time step.","Generation is unconstrained as long as costs are low.","Demand must be artificially lowered to meet max generation."],a:1,e:"We require an equality constraint where the sum of all generated electricity matches the demand exactly to avoid redispatch issues."},
  {s:"Module 4 · Mathematical Formulation of the UCP",p:"The continuous `gen` variable is mathematically coupled to the binary `on` variable — a plant cannot generate power when it is switched off.",q:"If the `on` variable is 0, what must the `gen` variable be according to the coupling constraints?",o:["Equal to the lower capacity limit.","Less than or equal to 0.","Equal to the maximum capacity limit.","It can be any continuous value."],a:1,e:"If a power plant is off (`on` is 0), the generated amount of electricity is constrained to be less than or equal to 0."},

  /* ── MODULE 5: Deep Dive into Constraints ── */
  {s:"Module 5 · Deep Dive into UCP Constraints",p:"The `start` variable must mathematically align with changes in the `on` variable across time steps — it can only fire when the plant transitions from off to on.",q:"Under what specific condition is the `start` variable at time T allowed to be 1?",o:["If the plant was on (1) at T-1 and on (1) at T.","If the plant was off (0) at T-1 and on (1) at T.","If the plant was off (0) at T-1 and off (0) at T.","Only if the demand exceeds the maximum capacity."],a:1,e:"The start variable can only be 1 if the power plant was off (0) at T-1 and switched to on (1) at time T."},
  {s:"Module 5 · Deep Dive into UCP Constraints",p:"If you pay to start a thermal plant, it must stay running for a minimum period to avoid mechanical damage.",q:"How is the \"minimum uptime\" constraint logically enforced mathematically?",o:["If `start` is 1, the sum of the `on` variables for the subsequent min-up time steps must be greater than or equal to the min-up value.","If `start` is 1, the `on` variable must immediately become 0 in the next step.","The `gen` variable is forced to maximum capacity indefinitely.","The objective cost is reduced to zero."],a:0,e:"If the plant starts, it must stay on; thus, the sum of the subsequent `on` variables must equal the required number of minimum up time steps."},
  {s:"Module 5 · Deep Dive into UCP Constraints",p:"Similarly, shutting down a thermal plant triggers a mandatory rest period before it can be restarted.",q:"How is the \"minimum down time\" constraint enforced?",o:["The `gen` variable must remain at maximum capacity.","If the plant stops (on is 0 after being 1), the `start` variable is not allowed to be 1 for the next min-down many time steps.","The plant is allowed to restart immediately if a penalty cost is paid.","The `on` variable is removed from the equation."],a:1,e:"Once a plant stops, it must remain off, meaning the `start` variable must be strictly constrained to 0 for the required minimum down time duration."},
  {s:"Module 5 · Deep Dive into UCP Constraints",p:"Our formulation has continuous variables (`gen`) and integer/binary variables (`on`, `start`). This combination earns a formal classification.",q:"What standard classification is given to this mathematically NP-hard optimization problem?",o:["Quadratic Unconstrained Binary Optimization (QUBO)","Pure Continuous Linear Program","Mixed Integer Linear Problem (MILP)","Ising Spin Glass"],a:2,e:"Because it involves both continuous variables and integer/binary variables bounded by linear equations, it forms a Mixed Integer Linear Problem (MILP)."},
  {s:"Module 5 · Deep Dive into UCP Constraints",p:"Classical computation tackles MILPs regularly, albeit at a cost. Even fast solvers like Gurobi face a hard theoretical ceiling.",q:"What is the theoretical bound on the running time for classical solvers like Gurobi when solving a MILP?",o:["Logarithmic","Polynomial","Exponential","Linear"],a:2,e:"While fast in practice, there is no polynomial time algorithm for MILPs, meaning theoretical running times scale exponentially."},

  /* ── MODULE 6: Bridging Classical Math and Quantum Physics ── */
  {s:"Module 6 · Bridging Classical Math and Quantum Physics",p:"To solve this on a quantum computer, we must map our MILP to a format quantum devices understand natively.",q:"Most variational quantum algorithms are designed to find the lowest energy state of what specific physics formulation?",o:["The Schrödinger Wave Equation","The Ising Hamiltonian","The Navier-Stokes Equation","The Slack Penalty Form"],a:1,e:"VQAs like VQE and QAOA are designed to find the lowest energy state of an Ising Hamiltonian."},
  {s:"Module 6 · Bridging Classical Math and Quantum Physics",p:"The Ising Hamiltonian relies on physics spins, while optimization uses binary math. A bridge is needed.",q:"What optimization structure acts as a bridge, utilizing binary decisions (0 or 1) while closely resembling the Ising Hamiltonian?",o:["The Continuous Slack Model","The Quantum Fourier Transform","Quadratic Unconstrained Binary Optimization (QUBO)","Mixed Integer Linear Problem (MILP)"],a:2,e:"The QUBO maps optimization problems into a quadratic problem using only binary variables, forming a direct bridge to the Ising model."},
  {s:"Module 6 · Bridging Classical Math and Quantum Physics",p:"We must translate between QUBO binary math and Ising spin physics. The two representations are related by a simple formula.",q:"What simple one-to-one mapping relates an Ising spin (S_i, values -1 or 1) to a QUBO binary variable (x_i, values 0 or 1)?",o:["x_i = S_i²","x_i = (S_i + 1) / 2","x_i = S_i × −1","x_i = e^(S_i)"],a:1,e:"You map the optimization decision x_i to the spin S_i using the relation (S_i + 1) / 2."},
  {s:"Module 6 · Bridging Classical Math and Quantum Physics",p:"The standard approach to converting our MILP into a QUBO involves a specific order of operations — a chain of transformations.",q:"What is the typical sequence of transformation?",o:["QUBO → Ising Hamiltonian → MILP → Pauli Strings","Pauli Strings → MILP → Ising Hamiltonian → QUBO","MILP → QUBO → Ising Hamiltonian → Pauli Strings (for VQE/QAOA)","Ising Hamiltonian → Pauli Strings → MILP → QUBO"],a:2,e:"The problem starts as an MILP, is transformed into a QUBO, translated to an Ising Hamiltonian, and decomposed into Pauli strings to run on VQAs."},
  {s:"Module 6 · Bridging Classical Math and Quantum Physics",p:"QUBO stands for Unconstrained Optimization, meaning hard constraints (like inequalities) must be removed before the mapping can proceed.",q:"How does the standard transformation method handle an inequality constraint (e.g., A ≥ B)?",o:["It ignores the constraint entirely.","It adds a real-valued \"slack variable\" (S ≥ 0) to turn it into an equality constraint.","It directly encodes the inequality into Pauli Z gates.","It converts the inequality into a logarithmic limit."],a:1,e:"Inequality constraints are mapped to equality constraints by adding an excess variable known as a 'slack variable'."},

  /* ── MODULE 7: Complexities of Translation ── */
  {s:"Module 7 · The Complexities of the Translation Process",p:"After creating equality constraints, they must be absorbed into the objective function so the problem becomes unconstrained.",q:"How are equality constraints absorbed into the QUBO objective function?",o:["By mapping them as quadratic penalty terms weighted by a penalty factor.","By creating new continuous variables.","By dropping the objective function entirely.","By relying on classical Gurobi algorithms to enforce them."],a:0,e:"The constraints are subtracted, squared (quadratization), and added to the objective function as a penalty term so violations worsen the objective score."},
  {s:"Module 7 · The Complexities of the Translation Process",p:"The standard mapping approach has severe hardware implications regarding scale. Every variable in the QUBO demands a qubit.",q:"Why does adding slack variables create a massive bottleneck for near-term quantum hardware?",o:["Slack variables cause the hardware to overheat.","Every non-binary slack variable must be encoded into multiple binary variables, rapidly exhausting scarce qubits.","Slack variables cannot be simulated by classical hardware.","They reduce the problem to zero, destroying the data."],a:1,e:"Slack variables require binary encoding, and since each binary variable requires a separate qubit, the qubit requirement skyrockets rapidly."},
  {s:"Module 7 · The Complexities of the Translation Process",p:"Expanding the squared penalty terms multiplies decision variables together. This has direct hardware implications.",q:"In quantum hardware design, what physical requirement is imposed when a quadratic term links two variables?",o:["The variables must be placed on separate quantum chips.","The corresponding qubits must have direct connectivity (e.g., requiring a CNOT gate) to be entangled.","The qubits must have opposing spin states.","It eliminates the need for entanglement entirely."],a:1,e:"Quadratic terms indicate entanglement in the circuit, requiring direct physical connectivity between those specific qubits (e.g., via CNOT gates)."},
  {s:"Module 7 · The Complexities of the Translation Process",p:"Our research team recognized the flaws in the standard QUBO translation method and proposed a novel alternative.",q:"What was the core novelty in modeling the problem to save qubits and connectivity?",o:["Ignoring the technical constraints of the power plants entirely.","Building the model natively using quadratic constraints instead of linear constraints, avoiding slack variables.","Using only continuous variables on the quantum chip.","Shifting the entire calculation back to a classical computer."],a:1,e:"By building the initial constraints quadratically from the start, the model avoided the massive overhead of standard transformation methodologies and slack variables."},
  {s:"Module 7 · The Complexities of the Translation Process",p:"Let's look closely at the novel transformation for the minimum up-time constraint. The innovation was in the equation structure itself.",q:"How did the novel approach eliminate the need for an inequality constraint?",o:["It simply subtracted the `on` variables from the `start` variable, creating a native penalty if `start` is 1 but `on` variables are not.","It allowed power plants to switch on and off infinitely.","It added three separate slack variables instead of one.","It used a logarithm to divide the constraint by zero."],a:0,e:"By structuring the equation so the `start` variable inherently checks the sum of `on` variables, it natively yields a penalty score without needing external slack variables to balance inequalities."},

  /* ── MODULE 8: Refining the Quantum Model ── */
  {s:"Module 8 · Refining the Quantum Model",p:"We eliminated continuous variables for tracking constraints, but still need to account for continuous electricity generation levels.",q:"How is the continuous `gen` variable adapted for the binary-only QUBO?",o:["It is handled continuously by an analog quantum process.","It is discretized using a logarithmic or binomial encoding of binary variables.","Generation limits are set to zero.","It is processed exclusively by D-Wave's classical core."],a:1,e:"The continuous power output is discretized into steps between min and max capacities using a logarithmic/binomial encoding of new binary decision variables."},
  {s:"Module 8 · Refining the Quantum Model",p:"The result of the novel formulation drastically alters the layout of the problem matrix — with important hardware implications.",q:"What is the defining characteristic of the resulting QUBO matrix, making it favorable for hardware with limited connectivity like superconducting circuits?",o:["It is an all-to-all dense matrix.","It is perfectly diagonal.","It is a sparse QUBO matrix with low connectivity between qubits.","It is non-Hermitian."],a:2,e:"The novel approach yields a sparse matrix (few non-zero entries), meaning far fewer required physical connections between qubits."},
  {s:"Module 8 · Refining the Quantum Model",p:"Penalty terms added to the objective function must be multiplied by a penalty factor. Setting this factor carelessly can sabotage the whole algorithm.",q:"Why are initial penalty factors carefully calculated rather than chosen randomly?",o:["Random factors violate the laws of thermodynamics.","They must precisely balance the objective so the algorithm doesn't 'cheat' by violating constraints to gain artificial cost bonuses.","IBM's Qiskit cannot compile randomly generated numbers.","Penalty factors must exactly equal the number of qubits."],a:1,e:"If penalty weights are poorly set, violating a constraint might actually yield a negative numerical penalty (a bonus), leading the optimizer to intentionally break physical rules."},
  {s:"Module 8 · Refining the Quantum Model",p:"When configuring the QAOA circuit, we must select an appropriate mixer Hamiltonian. The choice of mixer affects feasibility throughout the optimization.",q:"What type of mixer Hamiltonian was employed to help maintain feasibility between the `on` and `start` variables?",o:["Only a pure transverse field mixer.","A ring XY mixer combined with additional CNOT gates.","A classical randomizer.","A Grover diffusion operator."],a:1,e:"A ring XY mixer was used alongside additional CNOT gates to encode feasibility and couple the `on` and `start` states logically."},
  {s:"Module 8 · Refining the Quantum Model",p:"Starting the QAOA from a completely random guess slows down convergence dramatically. A smarter initialization strategy is needed.",q:"What technique was used to provide a \"good initial guess\" for the parameters?",o:["Absolute zero initialization","Warm starting using LP (Linear Programming) relaxation","Machine learning regression","Random parameter scattering"],a:1,e:"Warm starting via LP relaxation was used to initiate the circuit, providing a mathematical head-start for the classical optimizer."},

  /* ── MODULE 9: QAOA Execution and Stack ── */
  {s:"Module 9 · QAOA Execution and Software Stack",p:"The QAOA uses a classical optimizer to process the expectation values outputted by the quantum hardware and propose better parameters.",q:"Which specific classical optimizer was utilized in the lecture's execution loop?",o:["Gradient Descent Optimization (GDO)","COBYLA (Constrained Optimization BY Linear Approximations)","Adam Optimizer","Simulated Annealing"],a:1,e:"The COBYLA optimizer (accessed via SciPy) was utilized to update the parameters iteratively."},
  {s:"Module 9 · QAOA Execution and Software Stack",p:"To prevent the algorithm from running indefinitely, stopping criteria must be defined clearly.",q:"What two conditions dictate when the QAOA loop stops?",o:["When all qubits decay, or the temperature rises.","Convergence below a threshold between the last 10 runs, or a maximum iteration limit.","When the cost reaches exactly zero, or after 1 million shots.","Upon manual shutdown by the grid operator."],a:1,e:"The algorithm stops when the change in results falls under a threshold (convergence) over 10 runs, or it hits a strict maximum iteration count."},
  {s:"Module 9 · QAOA Execution and Software Stack",p:"Software frameworks are required to build and execute these circuits at the hardware level.",q:"Which primary software ecosystem was utilized to build the QAOA approach in the lecture?",o:["Google Cirq","Amazon Braket","Qiskit (specifically versions 1.2 / 2.0 packages)","Microsoft Quantum Development Kit"],a:2,e:"IBM's Qiskit ecosystem (optimization, algorithms, IBM runtime) alongside SciPy was used to implement the code."},
  {s:"Module 9 · QAOA Execution and Software Stack",p:"To test the algorithm, real-world data was required — not synthetic toy examples, but actual industry datasets.",q:"Where did the researchers source the actual UCP problem datasets for testing?",o:["Random number generation","Power Grid Lib database (specifically the California Independent System Operator data)","Synthetic data from Jo Quantum","The European Space Agency"],a:1,e:"They used the Power Grid Lib database, specifically focusing on data from the California Independent System Operator."},
  {s:"Module 9 · QAOA Execution and Software Stack",p:"A baseline classical metric is critical to evaluating the quantum results fairly and honestly.",q:"Which software was used as the \"classical benchmark\" for solving the UCP problem?",o:["Gurobi Optimizer (Version 11) run on a local laptop","A supercomputer cluster running parallel heuristic searches","IBM Deep Blue","A basic Excel Solver"],a:0,e:"The Gurobi Optimizer running on a standard local laptop served as the rigorous classical benchmark."},

  /* ── MODULE 10: Benchmarking, Results & Future ── */
  {s:"Module 10 · Benchmarking, Results, and Future Outlook",p:"Before a quantum circuit runs, it must be mapped to the physical layout of the specific chip. This step itself has a computational cost.",q:"What overhead step, which is mathematically NP-hard itself, consumes several seconds of wall-clock time before quantum execution?",o:["Decoherence mitigation","Embedding (D-Wave) or Transpilation (IBM) onto the hardware architecture","Cryogenic cooling initialization","API validation checks"],a:1,e:"Embedding or transpiling the abstract algorithm to fit the physical hardware structure is NP-hard and consumed significant preparation time."},
  {s:"Module 10 · Benchmarking, Results, and Future Outlook",p:"Looking at execution quality, results varied significantly by hardware. Not all quantum devices performed equally on larger instances.",q:"How did the IBM hardware (QAOA) perform regarding constraint violation on larger instances compared to the D-Wave annealer?",o:["IBM perfectly respected all constraints; D-Wave failed completely.","Both performed flawlessly.","IBM had worse quality and generated several violated constraints that repair mechanisms could not fix.","IBM was entirely incapable of loading the problem."],a:2,e:"The IBM device suffered from worse quality on larger problems, resulting in constraint violations that classical repair mechanisms couldn't resolve."},
  {s:"Module 10 · Benchmarking, Results, and Future Outlook",p:"Time is money in the energy industry. Speed of solution is as important as its quality.",q:"How did the running time of the quantum solutions compare to the Gurobi solver on the local laptop?",o:["Quantum was 10 to 100 times faster.","They tied perfectly in running times.","Quantum was 10 to 100 times slower than the local classical solver.","Gurobi crashed, granting quantum an automatic win."],a:2,e:"The classical solver easily beat the quantum approaches, setting a very high bar with quantum trailing by magnitudes of 10 to 100 times slower."},
  {s:"Module 10 · Benchmarking, Results, and Future Outlook",p:"Despite initial shortcomings, newer techniques are emerging to fix QAOA's errors and steer it away from infeasible solutions.",q:"What new approach \"hardcodes\" limitations directly into the quantum circuit to prevent the optimizer from suggesting impossible solutions?",o:["Constraint Preserving Mixers","Fully Connected Transpilation","Unconstrained Continuous Mapping","Grover Search Decoding"],a:0,e:"Constraint-preserving mixers hardcode the problem's constraints directly into the quantum circuit, severely restricting qubits from flipping into invalid or infeasible states."},
  {s:"Module 10 · Benchmarking, Results, and Future Outlook",p:"The ultimate hope for quantum advantage may not lie in strictly deterministic problems. The edge case may come from a different type of problem entirely.",q:"According to the researchers, where do quantum algorithms currently show the most competitive promise against tools like Gurobi?",o:["Simple linear addition problems.","Stochastic or robust optimization problems featuring uncertain data (e.g., uncertain renewable supply).","Small toy examples with 3 time steps.","Problems with zero constraints."],a:1,e:"When shifting from deterministic problems to stochastic/robust problems handling massive uncertainty, quantum results tracked much closer to classical performance, indicating a prime area for future quantum utility."},
];

let qi=0, step='intro', score=0, answered=0;
const slot=document.getElementById('slot'), fill=document.getElementById('prog-fill'), barLbl=document.getElementById('bar-label'), scorEl=document.getElementById('score-tag');

function updateBar(){
  fill.style.width=(answered/50*100)+'%';
  scorEl.textContent=score+' / 50';
  barLbl.textContent=step==='intro'?'VQA & Optimization':step==='summary'?'Complete':`Q${qi+1} of 50`;
}

function swap(fn){
  const cur=slot.firstChild;
  if(cur){cur.classList.add('out');setTimeout(()=>{slot.innerHTML='';fn();},220);}
  else fn();
}

function showIntro(){
  step='intro';updateBar();
  const d=document.createElement('div');d.className='intro';
  d.innerHTML=`
    <div class="intro-tag">Module 03 · 50 Questions</div>
    <h1>Variational Quantum Algorithms &amp;<br><em>Quantum Optimization</em></h1>
    <p>From parameterized circuits to the Unit Commitment Problem. Each preview sets the scene — then choose your answer and read the explanation.</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn" onclick="startQuiz()">Begin <span class="arr">→</span></button>
    </div>`;
  slot.appendChild(d);
}

function startQuiz(){qi=0;score=0;answered=0;swap(()=>showPreview());}

function showPreview(){
  step='preview';updateBar();
  const d=document.createElement('div');d.className='card';
  d.innerHTML=`
    <div class="card-header">
      <span class="dot preview-dot"></span>
      <span class="card-kind preview-kind">Preview</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    <div class="section-label">${data[qi].s}</div>
    <div class="preview-body">${data[qi].p}</div>
    <div class="btn-row"><button class="btn" onclick="swap(showQuestion)">Question <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}

function showQuestion(){
  step='question';updateBar();
  const item=data[qi];
  const d=document.createElement('div');d.className='card';
  const optHtml=item.o.map((o,oi)=>`<button class="option" id="opt${oi}" onclick="pick(${oi})"><span class="opt-letter">${L[oi]}</span><span>${o}</span></button>`).join('');
  d.innerHTML=`
    <div class="card-header">
      <span class="dot question-dot"></span>
      <span class="card-kind question-kind">Question ${qi+1} of 50</span>
    </div>
    <div class="question-body">${item.q}</div>
    <div class="options">${optHtml}</div>`;
  slot.appendChild(d);
}

function pick(oi){
  const item=data[qi];
  document.querySelectorAll('.option').forEach(b=>b.disabled=true);
  const correct=item.a;
  document.querySelectorAll('.option')[correct].classList.add(oi===correct?'opt-correct':'opt-reveal');
  if(oi!==correct) document.querySelectorAll('.option')[oi].classList.add('opt-wrong');
  setTimeout(()=>swap(()=>showResult(oi)),480);
}

function showResult(oi){
  const item=data[qi];const ok=oi===item.a;
  if(ok)score++;answered++;step='result';updateBar();
  const d=document.createElement('div');d.className='card';
  const dotCls=ok?'result-dot-correct':'result-dot-wrong';
  const kindCls=ok?'result-kind-correct':'result-kind-wrong';
  let rowsHtml=`<div class="chosen-row ${ok?'correct':'wrong'}"><span class="row-icon">${ok?'✓':'✗'}</span><span>${item.o[oi]}</span></div>`;
  if(!ok) rowsHtml+=`<div class="chosen-row reveal"><span class="row-icon">✓</span><span><strong>Correct:</strong> ${item.o[item.a]}</span></div>`;
  const isLast=qi===49;
  d.innerHTML=`
    <div class="card-header">
      <span class="dot ${dotCls}"></span>
      <span class="card-kind ${kindCls}">${ok?'Correct!':'Incorrect'}</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    ${rowsHtml}
    <div class="exp-wrap">
      <div class="exp-label">Explanation</div>
      <div class="exp-text">${item.e}</div>
    </div>
    <div class="btn-row"><button class="btn" onclick="advance()">${isLast?'See Results':'Next'} <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}

function advance(){
  if(qi===49){swap(showSummary);return;}
  qi++;swap(showPreview);
}

function showSummary(){
  step='summary';updateBar();
  const pct=Math.round(score/50*100);
  const msgs=[
    [80,"Outstanding. You have mastered the full pipeline from VQA theory through MILP formulation to QAOA execution and benchmarking."],
    [60,"Excellent work. The core ideas of QUBO mapping, Ising translation, and hardware constraints are clear to you. One more pass will solidify the rest."],
    [40,"Good progress. Focus on the MILP-to-QUBO transformation chain and the role of penalty factors and slack variables on your next pass."],
    [20,"A solid foundation. Return to Modules 6 and 7 — the mathematical bridge from classical to quantum is the heart of this lecture."],
    [-1,"This is dense material. Go back to the beginning and take it one module at a time — the logical chain will reveal itself with repetition."]
  ];
  const msg=msgs.find(([t])=>pct>t)[1];
  const d=document.createElement('div');d.className='summary';
  d.innerHTML=`
    <div class="sum-tag">Module 03 Complete · VQA &amp; Quantum Optimization</div>
    <div class="sum-score">${score}<span>/50</span></div>
    <div class="sum-pct">${pct}% correct</div>
    <div class="sum-msg">${msg}</div>
    <div class="sum-btns">
      <a class="btn-home" href="index.html">← All Modules</a>
      <button class="btn-reset" onclick="swap(showIntro)">↺ Retake</button>
    </div>`;
  slot.appendChild(d);
}

showIntro();
</script>
