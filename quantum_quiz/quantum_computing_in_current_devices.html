<html lang="en">
<head>
<meta charset="UTF-8">

<title>Quantum Devices: State of the Art — Quantum Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050a12; --surface:#0a1525; --border:#1a3050;
    --accent:#818cf8; --accent-dim:#4338ca; --gold:#f0c040;
    --green:#39e07a; --red:#ff5566;
    --text:#c8dff0; --text-dim:#6a8aaa; --text-bright:#e8f4ff;
    --mono:'Space Mono',monospace; --serif:'Crimson Pro',Georgia,serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:18px;line-height:1.7;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}

  .bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(129,140,248,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(129,140,248,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
  .bg-glow{position:fixed;z-index:0;pointer-events:none;border-radius:50%;filter:blur(130px)}
  .bg-glow-1{width:700px;height:700px;background:radial-gradient(circle,rgba(67,56,202,.14),transparent 70%);top:-250px;left:-250px}
  .bg-glow-2{width:500px;height:500px;background:radial-gradient(circle,rgba(129,140,248,.07),transparent 70%);bottom:0;right:-150px;animation:bgPulse 9s ease-in-out infinite alternate}
  @keyframes bgPulse{from{opacity:.5}to{opacity:1}}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,10,18,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:11px 28px;display:flex;align-items:center;gap:16px}
  .home-btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:2px;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .home-btn:hover{color:var(--accent);border-color:rgba(129,140,248,.4)}
  .bar-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;min-width:110px}
  .progress-track{flex:1;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(129,140,248,.5)}
  .score-tag{font-family:var(--mono);font-size:10px;color:var(--gold);white-space:nowrap;min-width:55px;text-align:right}

  .stage{position:relative;z-index:1;width:100%;max-width:660px;padding:110px 24px 60px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:36px 36px 28px;animation:cardIn .32s cubic-bezier(.4,0,.2,1)}
  @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .card.out{animation:cardOut .22s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes cardOut{to{opacity:0;transform:translateY(-14px)}}

  .card-header{display:flex;align-items:center;gap:10px;margin-bottom:22px}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .card-kind{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase}
  .card-num{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-left:auto}

  .preview-dot{background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .preview-kind{color:var(--accent)}
  .section-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);opacity:.6;margin-bottom:10px}
  .preview-body{font-family:var(--serif);font-size:1.08rem;font-style:italic;color:var(--text);line-height:1.75;margin-bottom:28px}

  .question-dot{background:var(--gold);box-shadow:0 0 8px var(--gold)}
  .question-kind{color:var(--gold)}
  .question-body{font-family:var(--serif);font-size:1.1rem;color:var(--text-bright);line-height:1.65;margin-bottom:22px}

  .options{display:flex;flex-direction:column;gap:9px;margin-bottom:6px}
  .option{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;color:var(--text);font-family:var(--serif);font-size:.97rem;text-align:left;line-height:1.5;width:100%;transition:border-color .14s,background .14s,color .14s}
  .option:hover:not(:disabled){border-color:rgba(129,140,248,.5);background:rgba(129,140,248,.05);color:var(--text-bright)}
  .option:disabled{cursor:default}
  .opt-letter{font-family:var(--mono);font-size:10px;color:var(--text-dim);border:1px solid var(--border);border-radius:2px;padding:2px 7px;flex-shrink:0;margin-top:2px;transition:all .14s}
  .option:hover:not(:disabled) .opt-letter{border-color:var(--accent);color:var(--accent)}
  .option.opt-correct{border-color:var(--green);background:rgba(57,224,122,.09);color:var(--text-bright)}
  .option.opt-correct .opt-letter{border-color:var(--green);color:var(--green);background:rgba(57,224,122,.15)}
  .option.opt-wrong{border-color:var(--red);background:rgba(255,85,102,.09);color:var(--text-bright)}
  .option.opt-wrong .opt-letter{border-color:var(--red);color:var(--red);background:rgba(255,85,102,.15)}
  .option.opt-reveal{border-color:rgba(57,224,122,.4);background:rgba(57,224,122,.04)}
  .option.opt-reveal .opt-letter{border-color:var(--green);color:var(--green)}

  .result-dot-correct{background:var(--green);box-shadow:0 0 8px var(--green)}
  .result-dot-wrong{background:var(--red);box-shadow:0 0 8px var(--red)}
  .result-kind-correct{color:var(--green)}
  .result-kind-wrong{color:var(--red)}
  .chosen-row{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:4px;border:1px solid;margin-bottom:12px;font-family:var(--serif);font-size:.97rem;line-height:1.5}
  .chosen-row.correct{border-color:var(--green);background:rgba(57,224,122,.08);color:var(--text-bright)}
  .chosen-row.wrong{border-color:var(--red);background:rgba(255,85,102,.08);color:var(--text-bright)}
  .chosen-row.reveal{border-color:rgba(57,224,122,.4);background:rgba(57,224,122,.05);color:var(--text-bright)}
  .row-icon{flex-shrink:0;font-size:.95rem;margin-top:1px}
  .exp-wrap{margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
  .exp-label{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .exp-label::before{content:'⬟'}
  .exp-text{font-size:.93rem;color:var(--text);font-style:italic;line-height:1.65}

  .btn-row{display:flex;justify-content:flex-end;margin-top:26px}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:11px 24px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:8px}
  .btn:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px rgba(129,140,248,.35)}
  .btn .arr{transition:transform .18s}
  .btn:hover .arr{transform:translateX(4px)}

  .intro{text-align:center;animation:cardIn .35s ease}
  .intro-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px}
  .intro-tag::before,.intro-tag::after{content:'';display:block;width:28px;height:1px;background:var(--accent)}
  .intro h1{font-family:var(--serif);font-weight:300;font-size:clamp(1.9rem,5vw,3rem);color:var(--text-bright);line-height:1.2;margin-bottom:14px;letter-spacing:-.01em}
  .intro h1 em{color:var(--accent);font-style:normal;font-weight:600}
  .intro p{font-size:.9rem;color:var(--text-dim);font-family:var(--mono);margin-bottom:36px;line-height:1.7;max-width:420px;margin-left:auto;margin-right:auto}

  .summary{text-align:center;animation:cardIn .4s ease}
  .sum-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
  .sum-score{font-family:var(--serif);font-weight:300;font-size:clamp(3.5rem,12vw,5.5rem);color:var(--text-bright);line-height:1;margin-bottom:6px}
  .sum-score span{color:var(--accent)}
  .sum-pct{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:28px}
  .sum-msg{font-size:1.03rem;font-style:italic;color:var(--text);line-height:1.7;max-width:440px;margin:0 auto 36px}
  .sum-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn-reset{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 28px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer;transition:all .2s}
  .btn-reset:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px rgba(129,140,248,.35)}
  .btn-home{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 28px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:3px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .btn-home:hover{border-color:var(--text-dim);color:var(--text)}
</style>
</head>

<script>
const L=['A','B','C','D'];
const data=[
  /* ── Part 1: Classical vs Quantum Limits ── */
  {s:"Part 1 · Classical Limits & Quantum Motivation",p:"We begin by evaluating computational efficiency, typically measured by arithmetic operations. While addition takes microseconds classically, scaling up matrix multiplication quickly increases computational load.",q:"How long does it roughly take a CPU to solve a 100×100 matrix inversion problem?",o:["A few microseconds","1 to 5 seconds","Several minutes","10 to 20 seconds"],a:1,e:"A CPU can process a 100×100 matrix inversion problem, common in engineering, in roughly 1 to 5 seconds, whereas doing it by hand would be intractable."},
  {s:"Part 1 · Classical Limits & Quantum Motivation",p:"Building on classical limits, understanding biological molecules presents a wall for classical high-performance computers due to the massive computational space required.",q:"How much computational space is required to simulate a caffeine molecule with 24 electrons and 50 spin orbitals?",o:["2²⁴","2⁶⁰","2⁵⁰ or 2⁵⁰ + 2⁵⁰ Hilbert space","2¹⁰⁸ + 2¹⁰⁸"],a:2,e:"A caffeine molecule requires roughly 2⁵⁰ computational space, while a more complex FeMoco complex requires 2¹⁰⁸ + 2¹⁰⁸."},
  {s:"Part 1 · Classical Limits & Quantum Motivation",p:"Since simulating such molecules is classically difficult, we seek an analogy to compare classical supercomputing boundaries with quantum capabilities.",q:"An exaflop supercomputer performs 10¹⁸ floating-point operations per second. Roughly how many qubits loosely bound this classical computational power?",o:["30 qubits","50 qubits","60 qubits","108 qubits"],a:2,e:"10¹⁸ is mathematically analogous to 2⁶⁰; thus, problems requiring beyond 60 qubits exceed exaflop supercomputer boundaries."},

  /* ── Part 2: Superconducting Qubits & Linear Algebra ── */
  {s:"Part 2 · Superconducting Qubits & Quantum Math",p:"To surpass this 60-qubit boundary, we must construct physical qubits. Unlike classical CMOS transistors that use high/low voltage for 1 and 0, quantum hardware uses different physical properties.",q:"In superconducting qubit technology, what component acts as an 'artificial atom' to control energy levels?",o:["Transistor","Josephson junction","Photonic polarization filter","Beam splitter"],a:1,e:"Superconducting circuits use oscillator-type circuits with Josephson junctions, acting as artificial atoms where the ground and excited states form the basis of quantum logic."},
  {s:"Part 2 · Superconducting Qubits & Quantum Math",p:"Once we have these physical artificial atoms, we must represent their state mathematically. Classical computation relies on Boolean algebra (0 and 1).",q:"What mathematical language is used to represent quantum information and qubit states?",o:["Boolean algebra","Calculus","Linear algebra","Differential equations"],a:2,e:"Quantum states are represented using the language of linear algebra, expressed as complex unit vectors (α|0⟩ + β|1⟩) lying on certain basis sets."},
  {s:"Part 2 · Superconducting Qubits & Quantum Math",p:"Because qubit states are complex unit vectors, manipulating them requires specific mathematical operations that adhere to quantum mechanical postulates.",q:"What type of matrices must be used to perform gate operations on a quantum state vector?",o:["Hermitian matrices","Singular matrices","Unitary matrices","Boolean matrices"],a:2,e:"To obey quantum mechanical postulates, the matrices that operate on quantum vectors must be unitary matrices."},
  {s:"Part 2 · Superconducting Qubits & Quantum Math",p:"Physically applying these unitary matrices to superconducting qubits requires manipulating the hardware at the lowest layer.",q:"What physical mechanism is applied to superconducting hardware to execute these gate operations?",o:["Lasers","Microwave pulses","Acoustic waves","Magnetic induction"],a:1,e:"In the superconducting hardware stack, microwave pulses are applied at the physical layer to perform gate operations."},

  /* ── Part 3: Qubit Topology & Core Phenomena ── */
  {s:"Part 3 · Qubit Topology & Core Phenomena",p:"Moving up the stack from individual qubits, building multi-qubit algorithms requires connecting qubits together. This connectivity is known as qubit topology.",q:"Which of the following topologies is used in recent generation quantum processors like IBM Miami or Nigh pro processors?",o:["Fully connected topology","Star topology","Heavy-hex or Squared topology","Ring topology"],a:2,e:"Current processors use specific architectures like Heavy-hex or Squared topology, where each qubit connects to a maximum of four neighboring qubits."},
  {s:"Part 3 · Qubit Topology & Core Phenomena",p:"This topology allows us to execute multi-qubit operations and generate quantum phenomena, starting with superposition.",q:"Applying a Hadamard gate to an initial |0⟩ state results in a |+⟩ state. If you measure this state 1,000 times, what will theoretically happen?",o:["You get 0 roughly 100% of the time.","You get 1 roughly 100% of the time.","You get 0 half the time and 1 half the time.","The state collapses and cannot be measured."],a:2,e:"Measuring a |+⟩ superposition state yields a 0 half the time and a 1 half the time probabilistically."},
  {s:"Part 3 · Qubit Topology & Core Phenomena",p:"After creating superposition, the next core quantum phenomenon leverages multi-qubit connectivity to create highly correlated states between subsystems.",q:"What is the fundamental quantum operation that creates a state where measuring one qubit immediately gives you information about another?",o:["Interference","Entanglement","Extrapolation","Trotterization"],a:1,e:"Entanglement, often created using a Bell state, generates highly correlated quantum subsystems."},
  {s:"Part 3 · Qubit Topology & Core Phenomena",p:"To create this entanglement, we specifically pair a superposition gate with a two-qubit conditional gate.",q:"Which gate sequence creates the highly correlated Bell state from an initial |00⟩ state?",o:["Two Hadamard gates","A Hadamard gate on qubit 1, followed by a CNOT gate between qubit 1 and 2","A CNOT gate followed by a Hadamard gate","A Pauli Z gate on both qubits"],a:1,e:"Applying a Hadamard to the first qubit creates a |+⟩ state, and applying a subsequent CNOT gate conditionally flips the second qubit, resulting in the entangled Bell state."},
  {s:"Part 3 · Qubit Topology & Core Phenomena",p:"Understanding the CNOT gate is vital. Its behavior entirely dictates the formation of the |00⟩ + |11⟩ correlated state.",q:"How does a CNOT (Controlled-NOT) gate operate if the control qubit is in state |1⟩?",o:["It does nothing to the second qubit.","It flips the second qubit.","It puts the second qubit into superposition.","It measures the second qubit."],a:1,e:"If the control qubit is |1⟩, it flips the target qubit; if it is |0⟩, it does nothing."},
  {s:"Part 3 · Qubit Topology & Core Phenomena",p:"Beyond superposition and entanglement, the third major phenomenon manipulates probability distributions, allowing us to compute specific expectations.",q:"Which phenomenon varies state probabilities using controlled unitary operators rather than just CNOT gates?",o:["Superposition","Entanglement","Interference","Transpilation"],a:2,e:"Interference relies on controlled unitary operators to alter and interfere with state probabilities, a technique common in the Hadamard test circuit."},
  {s:"Part 3 · Qubit Topology & Core Phenomena",p:"The Hadamard test circuit, utilizing interference, is highly useful in molecular chemistry and quantum algorithm design.",q:"What is the primary purpose of the Hadamard test circuit?",o:["To create Bell states","To compute expectation values of observables and ground states","To correct hardware noise","To encode classical data"],a:1,e:"The Hadamard test circuit is fundamentally used to compute expectation values for observables or calculate ground states of phenomena."},

  /* ── Part 4: Algorithm Structure & Encoding ── */
  {s:"Part 4 · Algorithm Structure & Data Encoding",p:"Knowing these fundamental phenomena, we can build a full quantum algorithm. Every algorithm generally follows three foundational steps.",q:"What is the first fundamental step in a quantum algorithm?",o:["Measurement","Error mitigation","Encoding the classical problem into a quantum state","Time evolution"],a:2,e:"The first step is encoding (or mapping) the classical problem into a quantum state vector, creating a candidate solution space."},
  {s:"Part 4 · Algorithm Structure & Data Encoding",p:"The method of encoding vastly alters resource requirements. We must know how many physical qubits are needed to store classical information.",q:"If using amplitude encoding to store 10 classical information points, what is the minimum number of qubits required?",o:["10 qubits","16 qubits","4 qubits","2 qubits"],a:2,e:"Amplitude encoding requires ⌈log₂(n)⌉ qubits. For n=10, the nearest upper bound is 16 points, and log₂(16) = 4 qubits."},
  {s:"Part 4 · Algorithm Structure & Data Encoding",p:"While amplitude encoding is highly efficient, alternative encodings exist that scale differently based on the algorithm's nature.",q:"How many qubits are required if you use angle or phase encoding instead of amplitude encoding?",o:["O(log₂(n))","O(n)","O(n²)","O(2ⁿ)"],a:1,e:"Angle or phase encoding requires order of n (O(n)) qubits, making the choice of encoding highly dependent on the problem's nature."},
  {s:"Part 4 · Algorithm Structure & Data Encoding",p:"After encoding, the second fundamental step involves running the algorithm via a simulation that follows physical rules.",q:"What fundamental physics equation does time evolution in an isolated quantum system strictly follow?",o:["Newton's second law","The Dirac equation","The Schrödinger equation","The Maxwell equations"],a:2,e:"The simulation or time evolution of an isolated system follows the Schrödinger equation, yielding an evolved state via a unitary time operator."},
  {s:"Part 4 · Algorithm Structure & Data Encoding",p:"Once time evolution provides an evolved state with a high probability of containing our answer, we execute the third fundamental step.",q:"What happens to the quantum system when you measure it at the end of the algorithm?",o:["It enters a deeper superposition.","It collapses into an eigenstate of the measurement operator.","It creates a new Hilbert space.","It evolves back in time."],a:1,e:"Measurement causes the quantum system to collapse into a classical state (an eigenstate of the measurement operator), returning a usable probability histogram."},

  /* ── Part 5: Qiskit Primitives & Patterns ── */
  {s:"Part 5 · Qiskit Primitives & Execution Patterns",p:"To facilitate these steps, Qiskit software utilizes two core primitives for executing algorithms on the machine.",q:"Which primitive returns the quasi-probability denoting the likelihood of measuring a specific bitstream?",o:["The Estimator primitive","The Transpiler primitive","The Sampler primitive","The Optimizer primitive"],a:2,e:"The Sampler primitive returns quasi-probabilities of bitstreams and is used in algorithms like sample-based quantum diagonalization."},
  {s:"Part 5 · Qiskit Primitives & Execution Patterns",p:"While the Sampler returns probability distributions, optimization algorithms often need a different type of output.",q:"Which primitive is used to return the expectation values of observables corresponding to a physical quantity or cost function?",o:["The Sampler","The Estimator","The Decoupler","The Extrapolator"],a:1,e:"The Estimator primitive evaluates an encoded function and returns expectation values subject to a quantum state."},
  {s:"Part 5 · Qiskit Primitives & Execution Patterns",p:"These primitives are used within a structured Qiskit pattern containing four main steps: Mapping, Optimization, Execution, and Post-processing.",q:"What occurs during the 'Mapping' step of a Qiskit pattern?",o:["The circuit is executed on the cloud.","The classical problem is described as a quantum circuit equivalent with observables.","The results are converted into a probability histogram.","Hardware errors are mitigated."],a:1,e:"In the Mapping phase, the classical or quantum problem is translated into a quantum circuit description with defined states and observables."},
  {s:"Part 5 · Qiskit Primitives & Execution Patterns",p:"Once mapped abstractly, the circuit might not perfectly match the specific Heavy-hex or Square topology of the hardware.",q:"What service represents the 'Optimization' step, converting abstract circuits to native hardware-equivalent operations?",o:["Transpilation service","Sampler service","Zero-noise service","Dynamical decoupling"],a:0,e:"The transpilation service optimizes the algorithm by reducing gate counts and mapping it to the native hardware topology."},

  /* ── Part 6: Error Mitigation ── */
  {s:"Part 6 · Error Mitigation Techniques",p:"Even an optimized circuit will encounter physical noise from decoherence, calibrations, and gate imperfections on near-term devices.",q:"Which error mitigation technique suppresses error at the lowest hardware pulse level?",o:["Zero-noise extrapolation","Transpilation","Dynamical decoupling","Hamiltonian mapping"],a:2,e:"Dynamical decoupling is an error mitigation tool that suppresses errors directly at the pulse level."},
  {s:"Part 6 · Error Mitigation Techniques",p:"Another mitigation technique takes a more mathematical approach to noise, observing results at different noise levels.",q:"How does Zero-Noise Extrapolation (ZNE) mitigate errors?",o:["By cooling the quantum chip further.","By interpolating the problem and finding a λ factor to push the noise level towards zero.","By adding more qubits to the circuit.","By completely removing all CNOT gates."],a:1,e:"ZNE finds an extrapolation function factor (λ) that interpolates the results backwards towards a theoretical zero-noise region."},

  /* ── Part 7: Combinatorial Optimization & QUBO ── */
  {s:"Part 7 · Combinatorial Optimization & QUBO",p:"Now that we can reliably run circuits, we apply them to real-world numerical problems. One major area involves resource allocation and routing.",q:"Routing, dispatching, and finance portfolio optimization fall under which category of mathematical problems?",o:["Linear algebra computation","Combinatorial optimization","Differential equations","Stochastic forecasting"],a:1,e:"These are combinatorial optimization problems, an area where quantum computers show strong potential for mapping and solving."},
  {s:"Part 7 · Combinatorial Optimization & QUBO",p:"Combinatorial optimization involves finding inputs that maximize or minimize a cost function C(X).",q:"In the Vehicle Routing Problem, what does the cost function C(X) typically represent?",o:["The number of aircraft available.","The total distance traveled or energy/fuel cost.","The binary variable of a node.","The amount of money in a Knapsack."],a:1,e:"For fleet routing, C(X) models the total distance traveled, which translates directly to fuel, cost, and energy."},
  {s:"Part 7 · Combinatorial Optimization & QUBO",p:"To solve these combinatorial functions on a quantum machine, we often translate them into a specific graph-based problem known as Max-Cut.",q:"What is the fundamental objective of the Max-Cut problem?",o:["To find the shortest path between two nodes.","To maximize the number of edges cut by partitioning a graph.","To remove the maximum number of nodes from a graph.","To connect every node to exactly one other node."],a:1,e:"Max-Cut is an NP-hard problem that aims to partition a graph's nodes into two sets such that the number of cut edges between the sets is maximized."},
  {s:"Part 7 · Combinatorial Optimization & QUBO",p:"To formulate Max-Cut classically, we assign variables to nodes to determine if they are in partition A or B.",q:"In the classical Max-Cut minimization formula f(X), what values can the vector X components take?",o:["Continuous real numbers between 0 and 1","Complex probability amplitudes","Boolean values, strictly 0 or 1","Pauli matrices"],a:2,e:"The variable X uses Boolean sets belonging to the 0 or 1 bitstring, signifying whether a node is included in the cut or not."},
  {s:"Part 7 · Combinatorial Optimization & QUBO",p:"This boolean formulation is rewritten into an objective format easily ingested by quantum algorithms, known as QUBO.",q:"What does the acronym QUBO stand for?",o:["Quantum Unified Binary Operation","Quadratic Unconstrained Binary Optimization","Quantum Utility Basis Output","Quadratic Universal Boolean Operator"],a:1,e:"QUBO stands for Quadratic Unconstrained Binary Optimization, a mathematical framework used to map graph problems to quantum hardware."},
  {s:"Part 7 · Combinatorial Optimization & QUBO",p:"The primary trick in converting the classical boolean Max-Cut to QUBO involves changing the variables from X (0 or 1) to a spin variable.",q:"What transformation is applied to map the boolean variable X to the spin variable Z?",o:["Z = 2X","X = 1 − Z/2","X = Z²","Z = X + 1"],a:1,e:"The variable X is introduced as 1 − Z/2 (where Z acts as a spin variable), shifting the range from {0, 1} to {+1, −1}."},
  {s:"Part 7 · Combinatorial Optimization & QUBO",p:"This transition to {+1, −1} is highly intentional because it directly corresponds to the eigenvalues of a specific quantum gate.",q:"Which quantum operator shares the exact eigenvalues of +1 and −1, making it the perfect mapping target for the Z spin variable?",o:["The Hadamard operator","The Pauli X operator","The Pauli Z operator","The CNOT operator"],a:2,e:"The Pauli Z operator has eigenvalues +1 and −1, meaning the computational basis states are naturally evaluated correctly along the Z-axis during measurement."},
  {s:"Part 7 · Combinatorial Optimization & QUBO",p:"Once the objective function is written using Pauli Z operators, we treat the entire QUBO problem as a physics problem.",q:"What physical concept is the QUBO problem reformulated into, where solving the problem equates to finding the system's minimum energy?",o:["A Lagrangian","A Hamiltonian","A superposition state","An interference wave"],a:1,e:"The problem is formulated as a Hamiltonian, a matrix representing the total energy of a system. Finding the minimum energy solves the QUBO."},

  /* ── Part 8: QAOA Deep Dive ── */
  {s:"Part 8 · QAOA — Circuit Design & Execution",p:"To find this Hamiltonian's minimum energy, we use algorithms like QAOA. QAOA's physics are inspired by a specific continuous time evolution process.",q:"What physics technique heavily inspires QAOA's method of slowly evolving toward the ground state?",o:["Quantum entanglement","Zero-noise extrapolation","Quantum annealing or the adiabatic process","Dynamical decoupling"],a:2,e:"QAOA is inspired by quantum annealing and the adiabatic process, where a system is slowly evolved over time to settle into the target Hamiltonian's ground state."},
  {s:"Part 8 · QAOA — Circuit Design & Execution",p:"The adiabatic process requires an initial state that is easy to prepare before evolving it toward the difficult target Hamiltonian.",q:"How is the initial state in QAOA typically prepared?",o:["Applying CNOT gates to every qubit.","Applying Hadamard gates to all qubits initialized at 0.","Measuring the qubits immediately.","Applying Pauli Z gates to alternate qubits."],a:1,e:"The initial system starts in the |0⟩ state, and a Hadamard gate is applied to all qubits, creating an equal superposition tensor product."},
  {s:"Part 8 · QAOA — Circuit Design & Execution",p:"From this initial state, the system evolves through the circuit via a sequence of parameterized unitary operations.",q:"What are the variables γ (gamma) and β (beta) used for in the QAOA circuit?",o:["They are the error rates of the qubits.","They are the optimization parameters/angles for the time evolution operators.","They are the nodes in the Max-Cut graph.","They dictate the hardware topology connections."],a:1,e:"Gamma and beta serve as the variable angles optimizing the time evolution circuit. The algorithm repeatedly adjusts them to find the optimal evolution path."},
  {s:"Part 8 · QAOA — Circuit Design & Execution",p:"Because the full Hamiltonian evolution is too complex to apply perfectly in one step, QAOA breaks the time evolution into smaller chunks or layers (denoted as P).",q:"What technique is used to implement approximate unitary operators by breaking a large time evolution circuit into multiple computational layers?",o:["Post-processing","Transpilation","Trotterization","Amplitude encoding"],a:2,e:"Trotterization breaks down non-commuting Hamiltonian terms into smaller, reliable approximate unitary layers (P₁, P₂, …)."},
  {s:"Part 8 · QAOA — Circuit Design & Execution",p:"For each of these Trotterized layers, we need to repeatedly evaluate the cost function to adjust gamma and beta.",q:"During the iterative optimization of gamma and beta, which Qiskit primitive is heavily utilized to get classical output?",o:["The Sampler primitive","The Estimator primitive","The Transpiler","The ZNE primitive"],a:1,e:"The Estimator primitive is used in every step to calculate the expectation values for given gamma/beta parameters. The Sampler is only used at the final stage to get optimal candidate solutions."},
  {s:"Part 8 · QAOA — Circuit Design & Execution",p:"QAOA is naturally built for unconstrained problems like Max-Cut. However, real-world problems often have strict constraints.",q:"How does QAOA handle constrained optimization problems?",o:["Constraints cannot be solved by QAOA.","By converting them into Lagrangians, placing the constraints into the objective function.","By adding more physical qubits to isolate the constraints.","By skipping the transpilation step."],a:1,e:"Constrained problems are forcefully converted into unconstrained ones by formulating a Lagrangian, where the constraints are embedded directly into the objective function."},
  {s:"Part 8 · QAOA — Circuit Design & Execution",p:"This QAOA framework has seen successful real-world testing in financial modeling and trading.",q:"Which bank used quantum optimization algorithms to achieve up to a 34% improvement in prediction accuracy over classical simulation baselines?",o:["J.P. Morgan","Goldman Sachs","HSBC","Barclays"],a:2,e:"HSBC used these algorithms to achieve a 34% improvement in prediction accuracy over noiseless classical baselines."},

  /* ── Part 9: VQE, SQD & Quantum-Centric Supercomputing ── */
  {s:"Part 9 · VQE, SQD & Quantum-Centric Supercomputing",p:"Alongside QAOA, another heavily used parameterized algorithm handles applications in chemistry and machine learning.",q:"What algorithm relies on an 'ansatz' to compute expectation values for observables but suffers from classical post-processing bottlenecks?",o:["Zero Noise Extrapolation (ZNE)","Variational Quantum Eigensolver (VQE)","Trotterization","Dynamical Decoupling"],a:1,e:"The Variational Quantum Eigensolver (VQE) updates a parameterized ansatz. However, optimizing its parameters classically creates a significant post-processing bottleneck, making it heuristic rather than fault-tolerant."},
  {s:"Part 9 · VQE, SQD & Quantum-Centric Supercomputing",p:"To bypass some of VQE's limitations in simulating large chemical molecules, researchers use a quantum-centric supercomputing approach that filters Hamiltonian spaces.",q:"What does Sample-based Quantum Diagonalization (SQD) use the quantum computer for?",o:["As a fully fault-tolerant solver.","As a sampler to recover important determinants and project the problem into a smaller Hamiltonian space.","As a router for classical network traffic.","To natively compile classical Python code."],a:1,e:"SQD uses the quantum computer strictly as a sampler to find the most important states/determinants, reducing the massive Hamiltonian into a smaller space that classical supercomputers can easily solve."},
  {s:"Part 9 · VQE, SQD & Quantum-Centric Supercomputing",p:"This SQD method epitomizes a major modern trend in algorithm design where workloads are split.",q:"What term describes the paradigm where a quantum computer solves a reduced dimensional space while a classical High-Performance Computer (HPC) handles the rest?",o:["Fault-tolerant computing","Quantum-centric supercomputing","Exaflop computation","Pure quantum supremacy"],a:1,e:"This hybrid workload sharing is referred to as Quantum-centric supercomputing."},

  /* ── Part 10: Quantum Machine Learning & Real-World Applications ── */
  {s:"Part 10 · Quantum Machine Learning & Real-World Applications",p:"A similar hybrid mindset is applied to Quantum Machine Learning (QML), particularly when classical models fail to find decision boundaries.",q:"What QML technique maps original classical feature spaces into a modified quantum domain to find better classification decision boundaries?",o:["The Hadamard Test","The Quantum Kernel Trick","Trotterization","Amplitude Mapping"],a:1,e:"The Quantum Kernel Trick replaces a classical kernel, using quantum encoding to map data into a Hilbert space to find clearer decision boundaries."},
  {s:"Part 10 · Quantum Machine Learning & Real-World Applications",p:"To utilize a quantum kernel, the machine must be able to calculate the inner product between two feature vectors.",q:"What specific quantum circuit is commonly used to compute the inner product of quantum kernel feature vectors?",o:["The Bell State circuit","The Swap Test circuit","The QAOA ansatz","The Qiskit Optimizer"],a:1,e:"The Swap Test circuit is explicitly designed to compute the inner products of quantum kernels (e.g., K(x₁, x₂)) between two feature states."},
  {s:"Part 10 · Quantum Machine Learning & Real-World Applications",p:"These quantum machine learning and optimization algorithms are highly relevant to biological research, specifically regarding amino acids.",q:"In the context of mapping biological geometry to combinatorial optimization, what problem attempts to predict whether a molecular structure will become 'natural/healthy' or 'misfolded/diseased'?",o:["Nitrogen fixation","Carbon capture","Protein folding","Hubard modeling"],a:2,e:"Protein folding predicts the structural geometry of amino acids, determining if they misfold into a disease case, and is often mapped to QAOA."},
  {s:"Part 10 · Quantum Machine Learning & Real-World Applications",p:"Optimization also impacts global agriculture and energy sectors, specifically in the production of green fertilizers.",q:"Which chemical synthesis process, vital for agriculture, consumes 1% to 2% of total global energy and is a prime target for quantum computational optimization?",o:["The Haber-Bosch ammonia synthesis process","The Carbon Capture process","The FeMoco extraction process","The Hubbard 2D process"],a:0,e:"The Haber-Bosch ammonia synthesis process uses massive global energy, making the simulation of relevant molecules highly valuable."},
  {s:"Part 10 · Quantum Machine Learning & Real-World Applications",p:"Beyond agriculture, modeling the selectivity of molecules like CO₂, N₂O, and H₂O is critical for environmental sustainability.",q:"Modeling these molecules is a primary application for which critical global challenge?",o:["High-temperature superconductors","Trading algorithm accuracy","Carbon capture and climate modeling","Vehicle fleet routing"],a:2,e:"Understanding molecule selectivity for CO₂ and H₂O provides critical insights into carbon capture and climate modeling."},

let qi=0,step='intro',score=0,answered=0;
const slot=document.getElementById('slot'),fill=document.getElementById('prog-fill'),barLbl=document.getElementById('bar-label'),scorEl=document.getElementById('score-tag');

function updateBar(){
  fill.style.width=(answered/50*100)+'%';
  scorEl.textContent=score+' / 50';
  barLbl.textContent=step==='intro'?'Quantum Devices':step==='summary'?'Complete':`Q${qi+1} of 50`;
}
function swap(fn){
  const cur=slot.firstChild;
  if(cur){cur.classList.add('out');setTimeout(()=>{slot.innerHTML='';fn();},220);}
  else fn();
}
function showIntro(){
  step='intro';updateBar();
  const d=document.createElement('div');d.className='intro';
  d.innerHTML=`
    <div class="intro-tag">Module 08 · 50 Questions</div>
    <h1>Quantum Algorithms on Current Devices —<br><em>State of the Art &amp; Challenges</em></h1>
    <p>From hardware fundamentals and qubit topology through QAOA, VQE, SQD, quantum kernels, and real-world applications in chemistry, finance, and climate.</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn" onclick="startQuiz()">Begin <span class="arr">→</span></button>
    </div>`;
  slot.appendChild(d);
}
function startQuiz(){qi=0;score=0;answered=0;swap(()=>showPreview());}
function showPreview(){
  step='preview';updateBar();
  const d=document.createElement('div');d.className='card';
  d.innerHTML=`
    <div class="card-header">
      <span class="dot preview-dot"></span>
      <span class="card-kind preview-kind">Preview</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    <div class="section-label">${data[qi].s}</div>
    <div class="preview-body">${data[qi].p}</div>
    <div class="btn-row"><button class="btn" onclick="swap(showQuestion)">Question <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}
function showQuestion(){
  step='question';updateBar();
  const item=data[qi];
  const d=document.createElement('div');d.className='card';
  const optHtml=item.o.map((o,oi)=>`<button class="option" id="opt${oi}" onclick="pick(${oi})"><span class="opt-letter">${L[oi]}</span><span>${o}</span></button>`).join('');
  d.innerHTML=`
    <div class="card-header">
      <span class="dot question-dot"></span>
      <span class="card-kind question-kind">Question ${qi+1} of 50</span>
    </div>
    <div class="question-body">${item.q}</div>
    <div class="options">${optHtml}</div>`;
  slot.appendChild(d);
}
function pick(oi){
  const item=data[qi];
  document.querySelectorAll('.option').forEach(b=>b.disabled=true);
  const correct=item.a;
  document.querySelectorAll('.option')[correct].classList.add(oi===correct?'opt-correct':'opt-reveal');
  if(oi!==correct) document.querySelectorAll('.option')[oi].classList.add('opt-wrong');
  setTimeout(()=>swap(()=>showResult(oi)),480);
}
function showResult(oi){
  const item=data[qi];const ok=oi===item.a;
  if(ok)score++;answered++;step='result';updateBar();
  const d=document.createElement('div');d.className='card';
  const dotCls=ok?'result-dot-correct':'result-dot-wrong';
  const kindCls=ok?'result-kind-correct':'result-kind-wrong';
  let rowsHtml=`<div class="chosen-row ${ok?'correct':'wrong'}"><span class="row-icon">${ok?'✓':'✗'}</span><span>${item.o[oi]}</span></div>`;
  if(!ok) rowsHtml+=`<div class="chosen-row reveal"><span class="row-icon">✓</span><span><strong>Correct:</strong> ${item.o[item.a]}</span></div>`;
  const isLast=qi===49;
  d.innerHTML=`
    <div class="card-header">
      <span class="dot ${dotCls}"></span>
      <span class="card-kind ${kindCls}">${ok?'Correct!':'Incorrect'}</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    ${rowsHtml}
    <div class="exp-wrap">
      <div class="exp-label">Explanation</div>
      <div class="exp-text">${item.e}</div>
    </div>
    <div class="btn-row"><button class="btn" onclick="advance()">${isLast?'See Results':'Next'} <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}
function advance(){
  if(qi===49){swap(showSummary);return;}
  qi++;swap(showPreview);
}
function showSummary(){
  step='summary';updateBar();
  const pct=Math.round(score/50*100);
  const msgs=[
    [80,"Outstanding. From Josephson junctions and qubit topology all the way to quantum kernels and SQD — you have fully mapped the state of the art in quantum devices."],
    [60,"Excellent work. The core hardware and QAOA mechanics are solid. Revisit Parts 9–10 on SQD, quantum-centric supercomputing, and real-world applications on your next pass."],
    [40,"Good progress. Focus on Parts 7–8 — the QUBO→Hamiltonian→QAOA pipeline is the backbone of this module and worth cementing before tackling the applications."],
    [20,"A solid start. Begin with the hardware fundamentals (Parts 1–3) and trace each layer upward — the algorithm structure builds directly on the physics."],
    [-1,"This lecture is broad and rigorous. Take it one part at a time and anchor each concept to a real device or use case — every pass through will reveal deeper connections."]
  ];
  const msg=msgs.find(([t])=>pct>t)[1];
  const d=document.createElement('div');d.className='summary';
  d.innerHTML=`
    <div class="sum-tag">Module 08 Complete · Quantum Devices: State of the Art</div>
    <div class="sum-score">${score}<span>/50</span></div>
    <div class="sum-pct">${pct}% correct</div>
    <div class="sum-msg">${msg}</div>
    <div class="sum-btns">
      <a class="btn-home" href="index.html">← All Modules</a>
      <button class="btn-reset" onclick="swap(showIntro)">↺ Retake</button>
    </div>`;
  slot.appendChild(d);
}
showIntro();
</script>
