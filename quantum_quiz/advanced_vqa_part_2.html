<title>Adv VQE Part 2 — Quantum Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#050a12; --surface:#0a1525; --border:#1a3050;
    --accent:#38bdf8; --accent-dim:#0369a1; --gold:#f0c040;
    --green:#39e07a; --red:#ff5566;
    --text:#c8dff0; --text-dim:#6a8aaa; --text-bright:#e8f4ff;
    --mono:'Space Mono',monospace; --serif:'Crimson Pro',Georgia,serif;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{background:var(--bg);color:var(--text);font-family:var(--serif);font-size:18px;line-height:1.7;min-height:100vh;overflow-x:hidden;display:flex;flex-direction:column;align-items:center}

  .bg-grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(56,189,248,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(56,189,248,.02) 1px,transparent 1px);background-size:60px 60px;pointer-events:none}
  .bg-glow{position:fixed;z-index:0;pointer-events:none;border-radius:50%;filter:blur(130px)}
  .bg-glow-1{width:700px;height:700px;background:radial-gradient(circle,rgba(3,105,161,.14),transparent 70%);top:-250px;left:-250px}
  .bg-glow-2{width:500px;height:500px;background:radial-gradient(circle,rgba(56,189,248,.07),transparent 70%);bottom:0;right:-150px;animation:bgPulse 9s ease-in-out infinite alternate}
  @keyframes bgPulse{from{opacity:.5}to{opacity:1}}

  .topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(5,10,18,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:11px 28px;display:flex;align-items:center;gap:16px}
  .home-btn{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--text-dim);text-decoration:none;padding:4px 10px;border:1px solid var(--border);border-radius:2px;white-space:nowrap;transition:all .15s;flex-shrink:0}
  .home-btn:hover{color:var(--accent);border-color:rgba(56,189,248,.4)}
  .bar-label{font-family:var(--mono);font-size:10px;color:var(--accent);letter-spacing:.15em;text-transform:uppercase;white-space:nowrap;min-width:110px}
  .progress-track{flex:1;height:2px;background:var(--border);border-radius:2px;overflow:hidden}
  .progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent-dim),var(--accent));transition:width .5s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(56,189,248,.5)}
  .score-tag{font-family:var(--mono);font-size:10px;color:var(--gold);white-space:nowrap;min-width:55px;text-align:right}

  .stage{position:relative;z-index:1;width:100%;max-width:660px;padding:110px 24px 60px;min-height:100vh;display:flex;flex-direction:column;justify-content:center}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:36px 36px 28px;animation:cardIn .32s cubic-bezier(.4,0,.2,1)}
  @keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .card.out{animation:cardOut .22s cubic-bezier(.4,0,.2,1) forwards}
  @keyframes cardOut{to{opacity:0;transform:translateY(-14px)}}

  .card-header{display:flex;align-items:center;gap:10px;margin-bottom:22px}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .card-kind{font-family:var(--mono);font-size:10px;letter-spacing:.18em;text-transform:uppercase}
  .card-num{font-family:var(--mono);font-size:10px;color:var(--text-dim);margin-left:auto}

  .preview-dot{background:var(--accent);box-shadow:0 0 8px var(--accent)}
  .preview-kind{color:var(--accent)}
  .section-label{font-family:var(--mono);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);opacity:.6;margin-bottom:10px}
  .preview-body{font-family:var(--serif);font-size:1.08rem;font-style:italic;color:var(--text);line-height:1.75;margin-bottom:28px}

  .question-dot{background:var(--gold);box-shadow:0 0 8px var(--gold)}
  .question-kind{color:var(--gold)}
  .question-body{font-family:var(--serif);font-size:1.1rem;color:var(--text-bright);line-height:1.65;margin-bottom:22px}

  .options{display:flex;flex-direction:column;gap:9px;margin-bottom:6px}
  .option{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border:1px solid var(--border);border-radius:4px;cursor:pointer;background:transparent;color:var(--text);font-family:var(--serif);font-size:.97rem;text-align:left;line-height:1.5;width:100%;transition:border-color .14s,background .14s,color .14s}
  .option:hover:not(:disabled){border-color:rgba(56,189,248,.5);background:rgba(56,189,248,.05);color:var(--text-bright)}
  .option:disabled{cursor:default}
  .opt-letter{font-family:var(--mono);font-size:10px;color:var(--text-dim);border:1px solid var(--border);border-radius:2px;padding:2px 7px;flex-shrink:0;margin-top:2px;transition:all .14s}
  .option:hover:not(:disabled) .opt-letter{border-color:var(--accent);color:var(--accent)}
  .option.opt-correct{border-color:var(--green);background:rgba(57,224,122,.09);color:var(--text-bright)}
  .option.opt-correct .opt-letter{border-color:var(--green);color:var(--green);background:rgba(57,224,122,.15)}
  .option.opt-wrong{border-color:var(--red);background:rgba(255,85,102,.09);color:var(--text-bright)}
  .option.opt-wrong .opt-letter{border-color:var(--red);color:var(--red);background:rgba(255,85,102,.15)}
  .option.opt-reveal{border-color:rgba(57,224,122,.4);background:rgba(57,224,122,.04)}
  .option.opt-reveal .opt-letter{border-color:var(--green);color:var(--green)}

  .result-dot-correct{background:var(--green);box-shadow:0 0 8px var(--green)}
  .result-dot-wrong{background:var(--red);box-shadow:0 0 8px var(--red)}
  .result-kind-correct{color:var(--green)}
  .result-kind-wrong{color:var(--red)}
  .chosen-row{display:flex;align-items:flex-start;gap:12px;padding:13px 16px;border-radius:4px;border:1px solid;margin-bottom:12px;font-family:var(--serif);font-size:.97rem;line-height:1.5}
  .chosen-row.correct{border-color:var(--green);background:rgba(57,224,122,.08);color:var(--text-bright)}
  .chosen-row.wrong{border-color:var(--red);background:rgba(255,85,102,.08);color:var(--text-bright)}
  .chosen-row.reveal{border-color:rgba(57,224,122,.4);background:rgba(57,224,122,.05);color:var(--text-bright)}
  .row-icon{flex-shrink:0;font-size:.95rem;margin-top:1px}
  .exp-wrap{margin-top:18px;padding-top:18px;border-top:1px solid var(--border)}
  .exp-label{font-family:var(--mono);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);margin-bottom:8px;display:flex;align-items:center;gap:6px}
  .exp-label::before{content:'∿'}
  .exp-text{font-size:.93rem;color:var(--text);font-style:italic;line-height:1.65}

  .btn-row{display:flex;justify-content:flex-end;margin-top:26px}
  .btn{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:11px 24px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer;transition:all .18s;display:flex;align-items:center;gap:8px}
  .btn:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px rgba(56,189,248,.35)}
  .btn .arr{transition:transform .18s}
  .btn:hover .arr{transform:translateX(4px)}

  .intro{text-align:center;animation:cardIn .35s ease}
  .intro-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px;display:flex;align-items:center;justify-content:center;gap:12px}
  .intro-tag::before,.intro-tag::after{content:'';display:block;width:28px;height:1px;background:var(--accent)}
  .intro h1{font-family:var(--serif);font-weight:300;font-size:clamp(1.9rem,5vw,3rem);color:var(--text-bright);line-height:1.2;margin-bottom:14px;letter-spacing:-.01em}
  .intro h1 em{color:var(--accent);font-style:normal;font-weight:600}
  .intro p{font-size:.9rem;color:var(--text-dim);font-family:var(--mono);margin-bottom:36px;line-height:1.7;max-width:420px;margin-left:auto;margin-right:auto}

  .summary{text-align:center;animation:cardIn .4s ease}
  .sum-tag{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--accent);margin-bottom:20px}
  .sum-score{font-family:var(--serif);font-weight:300;font-size:clamp(3.5rem,12vw,5.5rem);color:var(--text-bright);line-height:1;margin-bottom:6px}
  .sum-score span{color:var(--accent)}
  .sum-pct{font-family:var(--mono);font-size:11px;color:var(--text-dim);margin-bottom:28px}
  .sum-msg{font-size:1.03rem;font-style:italic;color:var(--text);line-height:1.7;max-width:440px;margin:0 auto 36px}
  .sum-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
  .btn-reset{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 28px;border:1px solid var(--accent);background:transparent;color:var(--accent);border-radius:3px;cursor:pointer;transition:all .2s}
  .btn-reset:hover{background:var(--accent);color:var(--bg);box-shadow:0 0 20px rgba(56,189,248,.35)}
  .btn-home{font-family:var(--mono);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:12px 28px;border:1px solid var(--border);background:transparent;color:var(--text-dim);border-radius:3px;cursor:pointer;transition:all .2s;text-decoration:none;display:inline-block}
  .btn-home:hover{border-color:var(--text-dim);color:var(--text)}
</style>

<script>
const L=['A','B','C','D'];
const data=[
  /* ── Part 1: The Hamiltonian ── */
  {s:"Part 1 · The Hamiltonian",p:"In the previous lecture, we established that our classical optimizer updates the θ parameters to minimize a mathematical target. This target is fundamentally driven by a specific quantum operator.",q:"In the context of quantum computing and physics, what does the Hamiltonian operator fundamentally describe?",o:["The speed of the quantum circuit.","The total energy of the system or the specific constraints of an optimization problem.","The amount of decoherence occurring in the hardware.","The number of gates present in the Ansatz."],a:1,e:"The Hamiltonian is an operator originally from physics that describes the total energy of a system. In optimization tasks, it encodes the different constraints of the problem, such as specific routes in a truck routing problem."},
  {s:"Part 1 · The Hamiltonian",p:"To ensure that the answers we extract from our quantum computer make logical sense in the real world, the Hamiltonian must possess a specific mathematical property.",q:"A Hamiltonian must strictly be a Hermitian matrix. What crucial mathematical guarantee does a Hermitian matrix provide?",o:["Its trace is always zero.","It can only be factored by complex imaginary numbers.","Its eigenvalues are strictly real numbers, ensuring our solutions are real physical values.","It converts continuous values into binary."],a:2,e:"A Hermitian matrix ensures that if you solve for its eigenvalues, they are always real numbers. This is critical because our solution — whether it is a physical energy or a specific truck route — must be a real, tangible value."},
  {s:"Part 1 · The Hamiltonian",p:"A Hamiltonian's eigenvalues are discrete and can be ordered mathematically from lowest to highest.",q:"What does the smallest eigenvalue (E₀) of a Hamiltonian represent?",o:["The maximum error rate.","The highest energy excited state.","The ground state energy, which is usually the exact solution to the problem we are trying to find.","The point of total decoherence."],a:2,e:"The smallest eigenvalue, E₀, is the ground state energy, which represents the ultimate solution to the problem we are attempting to solve."},

  /* ── Part 2: Expectation Value & Cost Function ── */
  {s:"Part 2 · Expectation Value & Cost Function",p:"Now that we know our goal is finding the lowest eigenvalue, we must establish how we actually calculate the energy from our quantum circuit.",q:"What mathematical operation do we use to extract the energy estimate using our Hamiltonian and our Ansatz?",o:["We calculate the cross product of the state vector.","We find the expectation value, which is the inner product of the Hamiltonian operator with the Ansatz state.","We simply measure the Z-axis of a single qubit.","We divide the Hamiltonian by the number of θ parameters."],a:1,e:"We calculate the expectation value of the Hamiltonian, which is fundamentally the inner product of the Hamiltonian operator with the parameterized Ansatz state."},
  {s:"Part 2 · Expectation Value & Cost Function",p:"Quantum mechanics operates on probabilities, meaning a single execution of our circuit will not give us the full picture.",q:"Why must we evaluate the circuit thousands of times to determine the expectation value?",o:["To warm up the quantum processor physically.","Because classical computers are slow at reading single numbers.","Because quantum mechanics is inherently probabilistic, so we must measure many times and calculate the average outcome.","To deliberately induce a Barren Plateau."],a:2,e:"Because quantum mechanics is inherently probabilistic, you cannot just measure once. You must measure the circuit many times (e.g., 10,000 times) and average the outcomes to find the expectation value."},
  {s:"Part 2 · Expectation Value & Cost Function",p:"The classical optimizer needs a clean, numerical score to judge whether the current θ parameters are good or bad.",q:"In Variational Quantum Algorithms, what machine learning term is used to describe the mapping of θ parameters to this single estimated energy number?",o:["The Activation Field","The Cost Function (or objective/loss function)","The Gradient Array","The Bias Node"],a:1,e:"This concept is borrowed from classical machine learning and is called the Cost Function (or objective/loss function). It takes the θ variables as inputs and outputs a single number representing the energy estimate."},

  /* ── Part 3: The Variational Principle ── */
  {s:"Part 3 · The Variational Principle in VQE",p:"We are blindly tweaking θ parameters to lower this cost function. However, we have a firm scientific guarantee that our numbers won't spiral into impossible physics.",q:"What historical scientific rule guarantees that the energy we calculate will never fall below the true ground state energy?",o:["Schrödinger's Cat Theorem","The Variational Principle","The Heisenberg Uncertainty Principle","The Pauli Exclusion Principle"],a:1,e:"The Variational Principle, which has been a powerful tool since the 1900s, mathematically guarantees that the calculated energy will always be greater than or equal to the true ground state."},
  {s:"Part 3 · The Variational Principle in VQE",p:"Knowing the boundaries set by the Variational Principle gives us a strict rule for our cost function.",q:"If your classical optimizer ever evaluates a cost function value that is mathematically lower than the true ground state, what has definitely happened?",o:["You have achieved quantum supremacy.","You have successfully solved the algorithm.","You have encountered a hardware error, or you are solving for a totally different Hamiltonian.","The qubits have become un-entangled."],a:2,e:"The Variational Principle strictly prohibits going below the ground state; therefore, if you ever go below it, it means you are solving for a totally different Hamiltonian and not the actual problem."},
  {s:"Part 3 · The Variational Principle in VQE",p:"The Variational Principle turns an incredibly complex physics calculation into a simple iterative game.",q:"How does the classical optimizer essentially play this 'game' utilizing the Variational Principle?",o:["By measuring all states to infinite precision.","By guessing parameters randomly and continually changing θ to push the cost function lower and lower.","By running the circuit backward in time.","By increasing the system's total energy to the maximum."],a:1,e:"The optimizer relies on the fact that you can start with a random guess and keep varying the θ parameters to minimize the energy, shooting 'darts in the darkness' to get closer to the ground state."},
  {s:"Part 3 · The Variational Principle in VQE",p:"Suppose the optimizer successfully minimizes the cost function to a complete halt, but the final value is still significantly higher than the true ground state energy.",q:"What component of the algorithm is primarily at fault if the minimized cost function cannot reach the true ground state?",o:["The quality and expressibility of the initial Ansatz.","The physical temperature of the quantum room.","The speed of the classical CPU.","The phase of the measurement gates."],a:0,e:"The gap between the final cost function and the true ground state heavily depends on the quality of the Ansatz you started with. If the Ansatz lacks the parameters to reach the state, the cost function will never hit the true minimum."},

  /* ── Part 4: The Hybrid VQE Loop ── */
  {s:"Part 4 · The Hybrid VQE Loop",p:"This back-and-forth communication defines the architecture of the algorithm.",q:"In the full hybrid variational loop, what specific tasks are strictly offloaded to the classical computer?",o:["Preparing the superpositions and entangling qubits.","Applying Hadamard gates and running native basis sets.","Evaluating the cost function and updating the θ parameters using an optimizer.","Measuring the final quantum state amplitudes."],a:2,e:"The classical computer evaluates the cost function from the measured expectation value and updates the θ parameters."},
  {s:"Part 4 · The Hybrid VQE Loop",p:"Conversely, the quantum hardware performs only the tasks it natively excels at.",q:"In the full hybrid variational loop, what specific tasks are strictly assigned to the quantum computer?",o:["Running the classical gradient descent algorithm.","Evaluating the objective loss function.","Preparing complex entangled states and estimating the Hamiltonian by measurement sampling.","Storing the θ parameter history."],a:2,e:"The quantum computer excels at preparing complex entangled states in the exponentially large Hilbert space and estimating the Hamiltonian by sampling."},
  {s:"Part 4 · The Hybrid VQE Loop",p:"The design philosophy of offloading heavy mathematical optimization to a classical machine is highly intentional for today's technology.",q:"Why is keeping the quantum workload strictly minimal essential for current quantum computing?",o:["Because quantum bits are currently too slow.","Because today's quantum computers are noisy (NISQ) and can only reliably execute short circuits before decoherence ruins the data.","Because classical computers can simulate Hilbert space perfectly anyway.","Because quantum computers cannot perform rotations."],a:1,e:"Today's quantum computers are noisy and can only execute short circuits reliably due to gate errors and decoherence, so the hybrid approach minimizes the quantum requirement while offloading optimization to mature classical algorithms."},
  {s:"Part 4 · The Hybrid VQE Loop",p:"The most famous implementation of this hybrid loop was introduced around 2018.",q:"What is the specific name of the foundational variational algorithm used to find the ground state energy of a given Hamiltonian?",o:["Quantum Phase Estimation (QPE)","Variational Quantum Eigensolver (VQE)","Shor's Algorithm","Grover's Search"],a:1,e:"This famous algorithm is called the Variational Quantum Eigensolver (VQE), designed to find the ground state energy of a Hamiltonian."},
  {s:"Part 4 · The Hybrid VQE Loop",p:"At the very start of the VQE process, before the first loop begins, we must choose our initial θ values.",q:"How does a 'warm start' drastically improve the VQE initialization process compared to random guessing?",o:["It physically heats up the quantum processor to reduce errors.","It sets all parameters to absolute zero.","It involves smartly guessing initial θ parameters that are already close to the true ground state.","It completely bypasses the classical optimizer."],a:2,e:"A 'warm start' means guessing initial θ parameters that are already close to the ground state, which immensely helps the optimizer compared to initializing the parameters purely at random."},
  {s:"Part 4 · The Hybrid VQE Loop",p:"Once initialized, the VQE loop spins continuously.",q:"How does the classical optimizer determine that it is finally time to break the loop and stop updating θ?",o:["The quantum computer runs out of qubits.","The cost function remains consistent across iterations and stops changing significantly, signaling convergence.","The gradient reaches an infinite positive value.","The Hamiltonian operator resets itself to zero."],a:1,e:"Convergence is reached when the cost function stops changing significantly and remains consistent across multiple iterations, indicating the ground state minimum has been found."},
  {s:"Part 4 · The Hybrid VQE Loop",p:"VQE has been widely utilized because of its incredible flexibility.",q:"What is considered the main advantage of the standard VQE algorithm framework?",o:["It strictly runs only on classical hardware.","It can practically be used to formulate and solve almost any given problem.","It requires absolutely no classical optimization.","It solves problems instantly without iteration."],a:1,e:"The distinct advantage of VQE is that it can be used to solve almost any given problem."},
  {s:"Part 4 · The Hybrid VQE Loop",p:"However, this flexibility comes with a distinct penalty as problems scale up.",q:"What is the primary disadvantage of VQE's highly generic nature?",o:["It consumes too much electricity.","It frequently fails to reach the true ground state when the problem size or complexity increases.","It can only handle 2 qubits maximum.","It forces the Hamiltonian to become non-Hermitian."],a:1,e:"Because it is too generic, the disadvantage is that when the problem gets tougher or increases in size, it will often fail to reach the true ground state."},

  /* ── Part 5: Gradient-Free Optimizers ── */
  {s:"Part 5 · Gradient-Free Optimizers",p:"To navigate the cost function landscape successfully, we rely heavily on the type of classical optimizer we choose. We group these into two main paradigms.",q:"What are the two primary categories of classical optimizers used in VQE?",o:["Linear and Non-Linear","Gradient-Free and Gradient-Based","Entangled and Superpositioned","Deterministic and Probabilistic"],a:1,e:"The two different approaches for traversing the landscape are gradient-free approaches and gradient-based approaches."},
  {s:"Part 5 · Gradient-Free Optimizers",p:"Imagine navigating a hilly terrain while completely blindfolded.",q:"How does a Gradient-Free optimizer fundamentally choose which direction to move?",o:["It calculates the exact mathematical derivative of the entire landscape.","It takes a few random steps, 'feels' which direction goes downhill, and moves that way.","It uses a laser to map the entire terrain before moving.","It steps randomly in every direction forever."],a:1,e:"A gradient-free optimizer operates by taking a few steps in random directions, feeling which one goes downhill, and moving that way."},
  {s:"Part 5 · Gradient-Free Optimizers",p:"Because they don't calculate precise mathematical slopes, gradient-free optimizers have a distinct survival trait.",q:"What makes gradient-free optimizers highly valuable for today's near-term hardware?",o:["They operate at the speed of light.","They are highly robust and still work well even when the cost landscape is bumpy and filled with hardware noise.","They require zero measurement shots.","They automatically correct quantum decoherence."],a:1,e:"Gradient-free optimizers are best used when the noise is high or gradients are unreliable, because they don't rely on precise slope calculations that noise would disrupt."},
  {s:"Part 5 · Gradient-Free Optimizers",p:"A very popular gradient-free optimizer is COBYLA.",q:"How does COBYLA computationally determine where the minimum is?",o:["It draws a continuous exact curve.","It randomly guesses single points without memory.","It evaluates random points, fits a flat mathematical plane to them within a 'trust region', and calculates the downward slope of that plane.","It calculates the exact second derivative of the Hamiltonian."],a:2,e:"COBYLA works by randomly guessing points to fit a plane, and then finding the gradient of that plane within a specific 'trust radius' to move downhill."},
  {s:"Part 5 · Gradient-Free Optimizers",p:"COBYLA features an adaptive mechanism to speed up or slow down its search.",q:"In COBYLA, what triggers the 'expand' procedure for the trust region?",o:["Hitting a barren plateau.","Encountering too much hardware noise.","Moving in a successful downhill direction, allowing the algorithm to widen the circle and move faster.","Reaching the absolute minimum energy."],a:2,e:"If the optimizer is moving in a good direction, it will 'expand' the trust region (circle) so it can move faster toward the solution."},
  {s:"Part 5 · Gradient-Free Optimizers",p:"Another popular gradient-free algorithm is Nelder-Mead.",q:"What geometric shape does the Nelder-Mead algorithm rely on to optimize parameters in 2D space?",o:["A Parabola","A Simplex (Triangle)","A Sphere","A Hypercube"],a:1,e:"Nelder-Mead relies on a simplex method, typically forming a triangle in 2D parameter space."},
  {s:"Part 5 · Gradient-Free Optimizers",p:"Nelder-Mead operates on a very simple replacement logic.",q:"How does Nelder-Mead update the points of its triangle to find the solution?",o:["It mathematically rotates the triangle 90 degrees.","It measures the gradient of the centroid.","It constantly moves the worst-performing corner of the triangle toward the best-performing corners.","It continually expands the triangle until it covers the whole space."],a:2,e:"Nelder-Mead optimizes by repeatedly moving the worst corner of the triangle toward the best corners to step closer to the ground state."},
  {s:"Part 5 · Gradient-Free Optimizers",p:"While Nelder-Mead and COBYLA use geometry, SPSA takes a more aggressive gradient-free approach.",q:"How does SPSA approximate the downhill direction while remaining highly efficient per step?",o:["It evaluates every single θ parameter individually.","It uses a complex 10-point mathematical plane.","It picks a random direction and evaluates the cost function at just two shifted points (θ + Δ and θ − Δ).","It relies entirely on classical momentum."],a:2,e:"SPSA picks a random direction and only needs to evaluate the cost function at two points (θ + Δ and θ − Δ) to approximate the difference and update the parameters."},

  /* ── Part 6: Gradient-Based Optimizers ── */
  {s:"Part 6 · Gradient-Based Optimizers",p:"In contrast to these guessing methods, Gradient-Based optimizers use exact math.",q:"How does a Gradient-Based optimizer navigate the parameter landscape?",o:["It guesses randomly and shrinks its trust radius.","It acts like a 'compass', directly computing the exact slope and stepping straight downhill.","It moves the worst point of a triangle to the center.","It evaluates two random shifts."],a:1,e:"Gradient-based optimizers act like a compass; they compute the exact slope (gradient) and step directly in the downhill direction."},
  {s:"Part 6 · Gradient-Based Optimizers",p:"The update rule for a gradient descent algorithm multiplies the calculated gradient by a crucial hyperparameter.",q:"In gradient descent, what is the role of the learning rate (η)?",o:["It determines the number of qubits used.","It controls the size of the step the optimizer takes downhill.","It measures the physical temperature of the system.","It dictates the amount of hardware noise."],a:1,e:"The learning rate (η) controls the step size the optimizer takes when updating the parameters."},
  {s:"Part 6 · Gradient-Based Optimizers",p:"Setting this hyperparameter is notoriously tricky and requires careful balancing.",q:"What happens to the optimization process if the learning rate (η) is set significantly too large?",o:["The algorithm converges instantly.","The optimizer wastes time taking tiny steps in irrelevant areas.","The optimizer drastically overshoots the minimum and violently oscillates back and forth.","The quantum circuit depth physically doubles."],a:2,e:"If the learning rate is too large, it actually overshoots the target and oscillates a lot, preventing it from reaching the ground state."},
  {s:"Part 6 · Gradient-Based Optimizers",p:"While standard gradient descent is powerful, a more sophisticated version is currently the gold standard for low-noise environments.",q:"What is the name of the advanced gradient-based optimizer that uses momentum and is the default choice for quantum simulators?",o:["ADAM (Adaptive Moment Estimation)","EVE (Evaluated Variance Estimation)","SPSA","COBYLA"],a:0,e:"ADAM (Adaptive Moment Estimation) improves on standard gradient descent and is often the default choice, especially on simulators with low noise."},
  {s:"Part 6 · Gradient-Based Optimizers",p:"ADAM utilizes historical data to smooth out its descent.",q:"How does ADAM implement 'momentum' to prevent wild oscillations?",o:["By increasing the mass of the quantum hardware.","By taking a running average of all past gradients so it knows the history of its path.","By dropping random parameters.","By expanding the trust radius linearly."],a:1,e:"ADAM maintains momentum by using the running average of all past gradients, which smooths out noise and prevents wild oscillations because it incorporates historical path data."},
  {s:"Part 6 · Gradient-Based Optimizers",p:"Furthermore, ADAM doesn't use a single blanket rule for its step size.",q:"How does ADAM dynamically handle the learning rate for the various parameters in the circuit?",o:["It completely disables the learning rate.","It forces all parameters to have an identical step size.","It individually adapts the learning rate for each specific parameter, giving smaller steps to volatile parameters and larger steps to stable ones.","It relies on Nelder-Mead to set the rate."],a:2,e:"ADAM adapts the learning rate of each parameter individually, applying smaller steps to parameters that change wildly and larger steps to stable parameters."},

  /* ── Part 7: Scaling & Shot Budgets ── */
  {s:"Part 7 · Scaling & Measurement Shot Budgets",p:"We now must look at how these optimizers scale computationally.",q:"As we add more θ parameters to our Ansatz, what happens to the performance scaling of gradient-free optimizers like COBYLA or Nelder-Mead?",o:["They scale incredibly well and get faster.","They scale very poorly as the number of parameters grows.","Their scaling remains completely static.","They stop requiring function evaluations altogether."],a:1,e:"Gradient-free methods like Nelder-Mead and COBYLA scale very poorly as the number of parameters grows."},
  {s:"Part 7 · Scaling & Measurement Shot Budgets",p:"To evaluate the cost function even once, we have to run the quantum circuit multiple times to average the probability.",q:"In VQE terminology, what is a single execution and measurement of a quantum circuit called?",o:["A Burst","A Quantum Run","A Measurement Shot","An Ansatz Evaluation"],a:2,e:"Every time the system measures the expectation value through a single circuit execution, it is referred to as one measurement shot."},
  {s:"Part 7 · Scaling & Measurement Shot Budgets",p:"This requirement creates a massive bottleneck as we scale to solve larger real-world problems.",q:"As the system size (number of qubits) increases, how does the required total number of measurement shots generally scale?",o:["It decreases linearly.","It remains perfectly constant.","It scales exponentially.","It only increases by a factor of 2."],a:2,e:"For all optimizers, as the number of qubits grows, the total shot budget scales exponentially to pull the signal out of the noise."},
  {s:"Part 7 · Scaling & Measurement Shot Budgets",p:"Even though gradient-free optimizers are fantastic at ignoring noise, they demand an extreme penalty in execution time.",q:"Compare the shot requirements between a gradient-based method (Gradient Descent) and a gradient-free method (SPSA) for a 10-qubit system.",o:["They require exactly the same number of shots.","SPSA requires significantly more shots (e.g., 10⁷ vs 10⁶).","Gradient descent requires significantly more shots.","SPSA requires zero shots."],a:1,e:"Gradient-free methods require vastly more measurements; for instance, at 10 qubits, SPSA needs approximately 10⁷ shots compared to gradient descent's 10⁶ shots."},

  /* ── Part 8: Barren Plateaus ── */
  {s:"Part 8 · Barren Plateaus",p:"The exponential need for measurement shots is merely a symptom of a much larger, catastrophic mathematical problem in scaling VQAs.",q:"What is the technical term for the phenomenon where the cost landscape becomes exponentially flat as the number of qubits increases?",o:["The Bloch Sphere Collapse","The Barren Plateau problem","The Hilbert Desert","The Optimizer Trap"],a:1,e:"As system size grows, the cost landscape becomes exponentially flat, a phenomenon known as the Barren Plateau problem."},
  {s:"Part 8 · Barren Plateaus",p:"A completely flat landscape means the optimizer is literally blind.",q:"Mathematically, what specific property of the cost function plummets exponentially to zero in a Barren Plateau?",o:["The absolute energy","The Variance of the cost function (the gradient signal)","The number of gates","The learning rate η"],a:1,e:"Inside a barren plateau, the variance of the cost function goes exponentially down towards zero, taking the gradient signal with it."},
  {s:"Part 8 · Barren Plateaus",p:"To put this into perspective, if the signal vanishes, our computers literally cannot calculate the math.",q:"In a 15-qubit system trapped in a Barren Plateau, the gradient signal is approximately 10⁻¹⁵. Why is this practically unsolvable?",o:["Because quantum computers cannot calculate negative exponents.","Because it completely exceeds the speed of light.","Because 10⁻¹⁵ is at the limit of standard machine precision, making the signal entirely undetectable to a classical computer.","Because 15 qubits automatically trigger an error code."],a:2,e:"A gradient of 10⁻¹⁵ is completely undetectable because it hits the absolute limit of classical machine precision, leaving no reasonable signal to extract."},
  {s:"Part 8 · Barren Plateaus",p:"Algorithm designers found that the choices made when building the Ansatz drastically influence the onset of Barren Plateaus.",q:"What specific type of architectural Ansatz is notoriously known for causing Barren Plateaus quickly?",o:["Highly tailored physics-informed circuits.","Generic, random quantum circuits without problem awareness (like deep Hardware Efficient Ansätze).","Circuits strictly utilizing only 2 qubits.","Simplex triangles."],a:1,e:"Generic random quantum circuits without problem awareness are primarily responsible for causing barren plateaus."},

  /* ── Part 9: Mitigating Barren Plateaus ── */
  {s:"Part 9 · Mitigating Barren Plateaus",p:"Therefore, avoiding Barren Plateaus is one of the most active research areas in quantum computing today.",q:"Which of the following is a leading strategy to actively mitigate Barren Plateaus?",o:["Using a Problem-Inspired Ansatz instead of a generic one.","Decreasing the trust radius of COBYLA.","Always setting the learning rate η to infinity.","Only measuring state zero."],a:0,e:"Using a problem-inspired (physics-informed) Ansatz helps avoid them by keeping the search space highly constrained to relevant states."},
  {s:"Part 9 · Mitigating Barren Plateaus",p:"Beyond changing the Ansatz, researchers can also change how they mathematically evaluate the measurement.",q:"Instead of using a Global Cost Function that measures all qubits at once, what alternative approach can sometimes preserve a meaningful gradient signal?",o:["A Null Cost Function","A Local Cost Function, measuring only a few qubits at a time.","A Variance Cost Function","An Exponential Cost Function"],a:1,e:"Using a local cost function, where you measure only very few qubits at a time instead of all at once, can sometimes preserve meaningful gradient signals."},
  {s:"Part 9 · Mitigating Barren Plateaus",p:"The way we optimize the parameters can also be adjusted to fight the flat landscape.",q:"What training technique attempts to avoid Barren Plateaus by optimizing the parameters sequentially rather than all simultaneously?",o:["Simultaneous Perturbation","Layer-by-layer adaptive training","Deep random guessing","The Adam initialization"],a:1,e:"You can adaptively train your circuit layer by layer, meaning you optimize one section at a time instead of trying to simultaneously turn thousands of knobs."},
  {s:"Part 9 · Mitigating Barren Plateaus",p:"Finally, how we start the algorithm heavily dictates if we fall into a plateau.",q:"How does 'Smart Initialization' help prevent the algorithm from getting stuck in a Barren Plateau?",o:["It resets the hardware to absolute zero temperature.","It randomly distributes parameters globally.","It starts the θ parameters extremely close to the ground state, bypassing the flat regions of the landscape entirely.","It relies on gradient-free optimizers entirely."],a:2,e:"Smart initialization gives a starting θ value that is already close to the true ground state, avoiding the flat regions of the landscape and making optimization much easier."},

  /* ── Part 10: The Full VQE Pipeline & Synthesis ── */
  {s:"Part 10 · The Full VQE Pipeline & Synthesis",p:"Let us zoom out and review the entire VQE pipeline from start to finish.",q:"What is the very first step required before building the quantum circuit in a VQE algorithm?",o:["Running the classical optimizer.","Measuring the expectation value.","Defining the problem by formulating its specific Hamiltonian.","Calculating the Barren Plateau."],a:2,e:"The complete VQE pipeline starts by first defining the problem, which means formulating the Hamiltonian."},
  {s:"Part 10 · The Full VQE Pipeline & Synthesis",p:"Once the Hamiltonian is defined, we must choose the quantum circuit that will interact with it.",q:"In step two of the VQE pipeline, what must the algorithm developer explicitly select and initialize?",o:["The Cost Function limits.","The chosen Ansatz and its initial θ values.","The classical machine code.","The local gradient."],a:1,e:"After defining the Hamiltonian, you must choose an Ansatz and initialize its parameters."},
  {s:"Part 10 · The Full VQE Pipeline & Synthesis",p:"After the loop executes its final optimization step, the algorithm halts.",q:"What determines the final outcome of the Variational Quantum Eigensolver?",o:["The highest possible energy measured.","The state of the control qubit.","The parameter vector θ that converged at the lowest cost function value.","The amount of noise generated."],a:2,e:"The loop repeats until convergence, finally yielding the variational parameters that produce a cost function closest to the ground state."},
  {s:"Part 10 · The Full VQE Pipeline & Synthesis",p:"Bringing everything together reveals the elegant three-part structure of modern quantum algorithms.",q:"What are the three foundational pillars that define any complete Variational Quantum Algorithm?",o:["Superposition, Entanglement, and Measurement.","The Ansatz, the Cost Function, and the Optimizer.","Hardware, Software, and Middleware.","The Bloch Sphere, the X Gate, and the CNOT Gate."],a:1,e:"The three core pillars holding up the algorithm are the Ansatz (what states we explore), the Cost Function (how we score the state), and the Optimizer (how we improve)."},
  {s:"Part 10 · The Full VQE Pipeline & Synthesis",p:"VQAs are not perfect, but they serve a critical role in the current timeline of quantum development.",q:"Why are VQAs heavily utilized today despite their scaling issues?",o:["They are perfectly fault-tolerant.","They are the only algorithms that run on classical computers.","They represent one of our best current shots at creating a proof-of-concept for solving problems on near-term, noisy hardware.","They have completely solved the Barren Plateau problem."],a:2,e:"While they won't solve everything, they represent one of the best leading strategies to establish proof-of-concepts on near-term quantum computers."},
  {s:"Part 10 · The Full VQE Pipeline & Synthesis",p:"VQAs perfectly bridge the gap between classical and quantum computing mentalities.",q:"Why is learning the VQA pipeline considered an excellent intuitive jump for someone moving from classical ML to quantum computing?",o:["Because it requires learning complex hardware physics.","Because at least half of the algorithm relies on familiar classical optimization, only requiring the user to learn how to prepare states and measure expectation values.","Because it removes the need for linear algebra.","Because it avoids quantum mechanics entirely."],a:1,e:"It is an intuitive jump because at least half of it is already classical optimization; once you understand state preparation and expectation values, you understand the entire algorithm."},
];

let qi=0,step='intro',score=0,answered=0;
const slot=document.getElementById('slot'),fill=document.getElementById('prog-fill'),barLbl=document.getElementById('bar-label'),scorEl=document.getElementById('score-tag');

function updateBar(){
  fill.style.width=(answered/50*100)+'%';
  scorEl.textContent=score+' / 50';
  barLbl.textContent=step==='intro'?'Adv VQE · Part 2':step==='summary'?'Complete':`Q${qi+1} of 50`;
}
function swap(fn){
  const cur=slot.firstChild;
  if(cur){cur.classList.add('out');setTimeout(()=>{slot.innerHTML='';fn();},220);}
  else fn();
}
function showIntro(){
  step='intro';updateBar();
  const d=document.createElement('div');d.className='intro';
  d.innerHTML=`
    <div class="intro-tag">Module 05 · 50 Questions</div>
    <h1>Advanced VQA —<br><em>Part 2: Hamiltonians, Optimizers &amp; Barren Plateaus</em></h1>
    <p>From the Hamiltonian and cost function through gradient-free and gradient-based optimizers, measurement scaling, and barren plateau mitigation.</p>
    <div class="btn-row" style="justify-content:center">
      <button class="btn" onclick="startQuiz()">Begin <span class="arr">→</span></button>
    </div>`;
  slot.appendChild(d);
}
function startQuiz(){qi=0;score=0;answered=0;swap(()=>showPreview());}
function showPreview(){
  step='preview';updateBar();
  const d=document.createElement('div');d.className='card';
  d.innerHTML=`
    <div class="card-header">
      <span class="dot preview-dot"></span>
      <span class="card-kind preview-kind">Preview</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    <div class="section-label">${data[qi].s}</div>
    <div class="preview-body">${data[qi].p}</div>
    <div class="btn-row"><button class="btn" onclick="swap(showQuestion)">Question <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}
function showQuestion(){
  step='question';updateBar();
  const item=data[qi];
  const d=document.createElement('div');d.className='card';
  const optHtml=item.o.map((o,oi)=>`<button class="option" id="opt${oi}" onclick="pick(${oi})"><span class="opt-letter">${L[oi]}</span><span>${o}</span></button>`).join('');
  d.innerHTML=`
    <div class="card-header">
      <span class="dot question-dot"></span>
      <span class="card-kind question-kind">Question ${qi+1} of 50</span>
    </div>
    <div class="question-body">${item.q}</div>
    <div class="options">${optHtml}</div>`;
  slot.appendChild(d);
}
function pick(oi){
  const item=data[qi];
  document.querySelectorAll('.option').forEach(b=>b.disabled=true);
  const correct=item.a;
  document.querySelectorAll('.option')[correct].classList.add(oi===correct?'opt-correct':'opt-reveal');
  if(oi!==correct) document.querySelectorAll('.option')[oi].classList.add('opt-wrong');
  setTimeout(()=>swap(()=>showResult(oi)),480);
}
function showResult(oi){
  const item=data[qi];const ok=oi===item.a;
  if(ok)score++;answered++;step='result';updateBar();
  const d=document.createElement('div');d.className='card';
  const dotCls=ok?'result-dot-correct':'result-dot-wrong';
  const kindCls=ok?'result-kind-correct':'result-kind-wrong';
  let rowsHtml=`<div class="chosen-row ${ok?'correct':'wrong'}"><span class="row-icon">${ok?'✓':'✗'}</span><span>${item.o[oi]}</span></div>`;
  if(!ok) rowsHtml+=`<div class="chosen-row reveal"><span class="row-icon">✓</span><span><strong>Correct:</strong> ${item.o[item.a]}</span></div>`;
  const isLast=qi===49;
  d.innerHTML=`
    <div class="card-header">
      <span class="dot ${dotCls}"></span>
      <span class="card-kind ${kindCls}">${ok?'Correct!':'Incorrect'}</span>
      <span class="card-num">Q${qi+1} of 50</span>
    </div>
    ${rowsHtml}
    <div class="exp-wrap">
      <div class="exp-label">Explanation</div>
      <div class="exp-text">${item.e}</div>
    </div>
    <div class="btn-row"><button class="btn" onclick="advance()">${isLast?'See Results':'Next'} <span class="arr">→</span></button></div>`;
  slot.appendChild(d);
}
function advance(){
  if(qi===49){swap(showSummary);return;}
  qi++;swap(showPreview);
}
function showSummary(){
  step='summary';updateBar();
  const pct=Math.round(score/50*100);
  const msgs=[
    [80,"Outstanding. Hamiltonians, cost functions, every optimizer, barren plateaus, and the full VQE pipeline — you have mastered the complete second half of Advanced VQA."],
    [60,"Excellent. The hybrid loop and optimizer mechanics are solid. Revisit Parts 8–9 on barren plateaus and their mitigation strategies on your next pass."],
    [40,"Good progress. Focus on the optimizer comparison (Parts 5–6) and the barren plateau section (Parts 8–9) — these are the most exam-critical concepts."],
    [20,"A solid start. Return to the Hamiltonian and cost function fundamentals first, then trace the full VQE loop before tackling the scaling issues."],
    [-1,"This is the hardest part of the series. Take it one section at a time and connect each concept back to the hybrid loop — it will all click with repetition."]
  ];
  const msg=msgs.find(([t])=>pct>t)[1];
  const d=document.createElement('div');d.className='summary';
  d.innerHTML=`
    <div class="sum-tag">Module 05 Complete · Adv VQE Part 2</div>
    <div class="sum-score">${score}<span>/50</span></div>
    <div class="sum-pct">${pct}% correct</div>
    <div class="sum-msg">${msg}</div>
    <div class="sum-btns">
      <a class="btn-home" href="index.html">← All Modules</a>
      <button class="btn-reset" onclick="swap(showIntro)">↺ Retake</button>
    </div>`;
  slot.appendChild(d);
}
showIntro();
</script>
